services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 80:80
      - 443:443       #for AdguardHome over HTTPS, UI
      - 53:53/tcp     #for AdguardHome
      - 53:53/udp     #for AdguardHome
      # - 853:853/tcp   #for AdguardHome over TLS
      # - 389:389     #for LDAP
      # - 636:636     #for LDAP/S
    volumes:
      - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Custom config
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro # For Certbot
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro #o For Certbot
    restart: unless-stopped

  # adguardhome:
  #   image: adguard/adguardhome:latest
  #   container_name: adguardhome
  #   restart: unless-stopped
  #   ports:
  #     - 3000:3000
  #   volumes:
  #     - adguardhome-work:/opt/adguardhome/work
  #     - /opt/adguardhome/config/:/opt/adguardhome/conf
  #     - /etc/letsencrypt/live/adguard.internal:/etc/letsencrypt/live/adguard.internal:ro
  #     - /etc/letsencrypt/archive/adguard.internal:/etc/letsencrypt/archive/adguard.internal:ro
  #   environment:
  #     - TZ=America/New_York

  bind9:
    image: ubuntu/bind9:latest
    container_name: bind9
    environment:
      - BIND9_USER=root
 
  step-ca:
    image: smallstep/step-ca
    container_name: stepca
    depends_on:
      bind9:
        # Ensures _acme_dns challenges can be resolved
        condition: service_healthy

  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    depends_on:
      bind9:
        # Ensures _acme_dns challenges can be resolved
        condition: service_healthy
      step-ca:
        condition: service_healthy

volumes:
  adguardhome-work: