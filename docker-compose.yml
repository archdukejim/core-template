services:
  nginx:
    image: nginx:latest
    container_name: nginx
    user: "2000:2000"
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - 80:80
      - 443:443       #for AdguardHome over HTTPS, UI
      - 53:53/tcp     #for AdguardHome
      - 53:53/udp     #for AdguardHome
      - 853:853/tcp   #for AdguardHome over TLS
      - 389:389       #for LDAP
      - 636:636       #for LDAP/S
    volumes:
      - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Custom config
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro # For Certbot
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro #o For Certbot
    networks:
      core_net:
        ipv4_address: 172.31.255.10
    restart: unless-stopped

  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    user: "2700:2700"
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - /opt/adguardhome/work:/opt/adguardhome/work
      - /opt/adguardhome/config:/opt/adguardhome/conf
      - /opt/certbot/etc/letsencrypt/live/adguard.internal:/etc/letsencrypt/live/adguard.internal:ro
      - /opt/certbot/etc/letsencrypt/archive/adguard.internal:/etc/letsencrypt/archive/adguard.internal:ro
    networks:
      core_net:
        ipv4_address: 172.31.255.20
    environment:
      - TZ=America/New_York

  bind9:
    image: internetsystemsconsortium/bind9:9.20
    container_name: bind9
    user: "2001:2001"
    ports: 
      - "5353:53/tcp"
      - "5353:53/udp"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - /opt/bind9/config:/etc/bind:ro
      - /opt/bind9/zones/static:/etc/bind/static:ro
      - /opt/bind9/zones/dynamic:/var/lib/bind:rw
      - /opt/bind9/cache:/var/cache/bind:rw
      - /opt/bind9/cache:/var/run/named:rw
      - /opt/certbot/etc/letsencrypt:/etc/letsencrypt:ro
    command: ["/usr/sbin/named", "-g", "-c", "/etc/bind/named.conf"]
    networks:
      core_net:
        ipv4_address: 172.31.255.30
    restart: unless-stopped

 
