# ============================================================
# CORE TEMPLATE — CONFIGURATION
# ============================================================
domain: example.com
hostname: core-server
friendly_name: "Example Org"

# ============================================================
# NETWORK & DNS
# ============================================================
lan_cidr: 192.168.4.0/22
lan_gateway: 192.168.4.1
host_ip: 192.168.7.102

dns:
  dynamic_zone_var:
    zone_authority: true
    A:
    - { ip: 192.168.7.101, name: host-1 }

tsig_keys:
- { name: acme_apps, algorithm: hmac-sha256, domain: '{{ domain }}', record_types: [TXT] }

# ============================================================
# CERTIFICATES / PKI
# ============================================================
ca_name: Example Org CA
cert_country: US
cert_province: FL
cert_city: Tampa
cert_org: Example
cert_ou: IT

# Uncomment to use your own pre-generated root/intermediate CAs instead of letting Step-CA mint one
# byoc: true
# root_cert_name: root_ca
# ca_crt_path: "/path/to/root_ca.crt"
# ica_crt_path: "/path/to/ica.crt"
# ica_key_path: "/path/to/ica.key"

# ============================================================
# FEATURE FLAGS
# ============================================================
install_ldap: true
install_keycloak: true
enforce_ldaps: true
