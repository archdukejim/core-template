acme_email: admin@email.{{domain}}
adguard_bootstrap_dns:
- 8.8.8.8
- 8.8.4.4
- 1.1.1.1
adguard_dhcp_enabled: false
adguard_dhcp_interface: eth0
adguard_dhcp_lease_duration: 86400
adguard_dhcp_range_end: 192.168.4.200
adguard_dhcp_range_start: 192.168.4.20
adguard_dhcp_subnet_mask: 255.255.252.0
adguard_ratelimit: 300
adguard_rewrites:
- answer: 192.168.7.11
  domain: portainer.j-j.family
- answer: 192.168.7.12
  domain: apps.j-j.family
- answer: 192.168.7.10
  domain: nas25.j-j.family
- answer: apps.j-j.family
  domain: '*.j-j.family'
adguard_upstream_dns:
- '[/{{ domain }}/]{{ ip_bind9 }}:{{ bind_dns_port }}'
- https://dns.google/dns-query
- https://dns.cloudflare.com/dns-query
bind9_doh_port: 8053
bind9_only: False
bind_acls:
  acme-updaters:
  - '{{ core_subnet }}'
  dns-resolvers:
  - 127.0.0.1
  - '{{ lan_cidr }}'
  - '{{ core_subnet }}'
bind_dns_port: 5353
ca_name: Church Family CA
cert_acme_lifetime_hours: 1080h
cert_acme_renew_before_days: 15
cert_bind9_tls_days: 5475
cert_city: Brandon
cert_country: US
cert_intermediate_days: 5475
cert_intermediate_digest: sha256
cert_intermediate_key_param: '4096'
cert_intermediate_key_type: rsa
cert_org: Church Family Network
cert_ou: Infrastructure
cert_province: Florida
cert_renewal_check_hours: 12
cert_root_ca_days: 7300
cert_root_digest: sha256
cert_root_key_param: '4096'
cert_root_key_type: rsa
cert_stepca_allow_subordinate_ca: true
cert_stepca_max_lifetime_hours: 87600h
certbot_domains_bind9_only:
- dns.{{ domain }}
- ldap.{{ domain }}
- ca.{{ domain }}
certbot_domains_full:
- adguard.{{ domain }}
- ldap.{{ domain }}
- ca.{{ domain }}
compose_file: '{{ target_base }}/core/docker-compose.yml'
core_subnet: 172.30.255.0/24
dns:
  '{{ domain }}':
    A:
    - ip: 192.168.7.10
      name: nas25
    - ip: 192.168.7.11
      name: portainer
    - ip: 192.168.7.12
      name: nas25-apps
    - ip: 192.168.7.53
      name: pi-core
    - ip: 192.168.7.80
      name: pi-vpn
    - ip: 192.168.7.0
      name: jetkvm
    - ip: 192.168.7.101
      name: host1
    - ip: 192.168.7.102
      name: host2
    CNAME:
    - canonical: pi-core
      name: ca
    - canonical: pi-core
      name: adguard
    - canonical: pi-core
      name: dns
    - canonical: pi-core
      name: ldap
    - canonical: nas25-apps
      name: calibre
    - canonical: nas25-apps
      name: jellyfin
    - canonical: nas25-apps
      name: lazylibrarian
    - canonical: nas25-apps
      name: lidarr
    - canonical: nas25-apps
      name: nas25-proxy
    - canonical: nas25-apps
      name: prowlarr
    - canonical: nas25-apps
      name: qbitorrent
    - canonical: nas25-apps
      name: radarr
    - canonical: nas25-apps
      name: sabnzbd
    - canonical: nas25-apps
      name: seerr
    - canonical: nas25-apps
      name: sonarr
dns_server: 192.168.4.1
domain: home
ip_adguard: 172.30.255.20
ip_bind9: 172.30.255.30
ip_ldap: 172.30.255.50
ip_nginx: 172.30.255.10
ip_stepca: 172.30.255.40
lan_cidr: 192.168.4.0/22
lan_gateway: 192.168.4.1
ldap_base_dn: ""         # computed by playbook from 'domain'
ldap_domain_components: []  # computed by playbook from 'domain'
ldap_groups:
- gidNumber: 1100
  name: admins
  permissions:
  - read
  - write
  - modify
- gidNumber: 5000
  name: users
  permissions:
  - read
ldap_organizational_units:
- description: User Accounts
  name: accounts
- description: Security Groups
  name: groups
- description: Privileged accounts
  name: admins
  parent: accounts
  uid_range: 1101-1999
- description: Regular User accounts
  name: users
  parent: accounts
  uid_range: 5001-50000
- description: Computer objects
  name: hosts
  uid_range: 2000-4900
mint_certs: []
nginx_backend_adguard_dns: adguardhome:53
nginx_backend_adguard_http: http://adguardhome:80
nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}
ns_host_ip: 192.168.7.53
project_containers:
- nginx
- adguardhome
- certbot
- step-ca
- openldap
- bind9
repo_source: '{{ playbook_dir | dirname }}'
service_dirs:
- folder: nginx
  owner: nginx
- folder: adguardhome
  owner: adguard
- folder: bind9
  owner: bind
- folder: stepca
  owner: step
- folder: openldap
  owner: ldap
- folder: certbot
  owner: certbot
- folder: easyrsa
  owner: root
service_users:
  adguard:
    gid: 153
    uid: 153
  bind:
    gid: 53
    uid: 53
  certbot:
    gid: 0
    uid: 0
  ldap:
    gid: 389
    uid: 389
  nginx:
    gid: 443
    uid: 443
  step:
    gid: 135
    uid: 135
stepca_port: 9000
system_timezone: America/New_York
target_base: /opt
tsig_algorithm: hmac-sha256
tsig_extra_keys:
- domain: home
  name: acme_nas25-proxy
  records:
  - nas25-apps
  - calibre
  - jellyfin
  - lazylibrarian
  - lidar
  - nas25-proxy
  - prowlarr
  - qbitorrent
  - radarr
  - sabnzbd
  - seerr
  - sonarr
tsig_key_name: acme_dns-01
url_adguard: adguard.{{ domain }}
url_bind9: dns.{{ domain }}
url_ldap: ldap.{{ domain }}
url_nginx: core-proxy.{{ domain }}
url_stepca: ca.{{ domain }}
