# ============================================================
# GLOBAL
# ============================================================
domain: home
system_timezone: America/New_York
deploy_base_dir: /opt
repo_source: '{{ playbook_dir | dirname }}'

# ============================================================
# NETWORK
# ============================================================
lan_cidr: 10.0.0.0/22
lan_gateway: 10.0.0.1
dns_server: 10.0.0.1
core_subnet: 10.255.0.0/24
pi_core_ip: 10.0.3.53

# ============================================================
# SERVICE IPs  (Docker container addresses on core_subnet)
# ============================================================
ip_nginx: 10.255.0.10
ip_adguard: 10.255.0.20
ip_bind9: 10.255.0.30
ip_stepca: 10.255.0.40
ip_ldap: 10.255.0.50

# ============================================================
# SERVICE HOSTNAMES
# ============================================================
hostname_nginx: core-proxy.{{ domain }}
hostname_adguard: adguard.{{ domain }}
hostname_bind9: dns.{{ domain }}
hostname_stepca: ca.{{ domain }}
hostname_ldap: ldap.{{ domain }}

# ============================================================
# DOCKER / SERVICE INFRASTRUCTURE
# ============================================================
compose_file: '{{ deploy_base_dir }}/core/docker-compose.yml'
project_containers:
- nginx
- adguardhome
- certbot
- step-ca
- openldap
- bind9
service_dirs:
- folder: nginx
  owner: nginx
- folder: adguardhome
  owner: adguard
- folder: bind9
  owner: bind
- folder: stepca
  owner: step
- folder: openldap
  owner: ldap
- folder: certbot
  owner: certbot
- folder: easyrsa
  owner: root
service_users:
  adguard:
    gid: 153
    uid: 153
  bind:
    gid: 53
    uid: 53
  certbot:
    gid: 0
    uid: 0
  ldap:
    gid: 389
    uid: 389
  nginx:
    gid: 443
    uid: 443
  step:
    gid: 135
    uid: 135

# ============================================================
# CERTIFICATES / PKI
# ============================================================
ca_name: Home Lab CA
cert_country: US
cert_province: Your State
cert_city: Your City
cert_org: Home Lab
cert_ou: Infrastructure
cert_root_ca_days: 7300
cert_root_digest: sha256
cert_root_key_type: rsa
cert_root_key_param: '4096'
cert_intermediate_days: 5475
cert_intermediate_digest: sha256
cert_intermediate_key_type: rsa
cert_intermediate_key_param: '4096'
cert_renewal_check_hours: 12

# ============================================================
# STEP-CA
# ============================================================
stepca_port: 9000
stepca_cert_allow_subordinate_ca: true
stepca_cert_max_lifetime_hours: 87600h

# ============================================================
# CERTBOT / ACME
# ============================================================
acme_email: admin@email.{{domain}}
bind9_only: False
cert_acme_lifetime_hours: 1080h
cert_acme_renew_before_days: 15
cert_bind9_tls_days: 5475
certbot_domains_bind9_only:
- dns.{{ domain }}
- ldap.{{ domain }}
- ca.{{ domain }}
certbot_domains_full:
- adguard.{{ domain }}
- ldap.{{ domain }}
- ca.{{ domain }}
extra_certs: []

# ============================================================
# DNS — BIND9
# ============================================================
bind_dns_port: 5353
bind9_doh_port: 8053
bind_acls:
  acme-updaters:
  - '{{ core_subnet }}'
  dns-resolvers:
  - 127.0.0.1
  - '{{ lan_cidr }}'
  - '{{ core_subnet }}'
dns:
  '{{ domain }}':
    A:
    - ip: 10.0.3.10
      name: nas
    - ip: 10.0.3.11
      name: portainer
    - ip: 10.0.3.12
      name: nas-apps
    - ip: 10.0.3.53
      name: pi-core
    - ip: 10.0.3.80
      name: pi-vpn
    - ip: 10.0.3.1
      name: kvm
    - ip: 10.0.3.101
      name: host1
    - ip: 10.0.3.102
      name: host2
    CNAME:
    - canonical: pi-core
      name: ca
    - canonical: pi-core
      name: adguard
    - canonical: pi-core
      name: dns
    - canonical: pi-core
      name: ldap
    - canonical: nas-apps
      name: calibre
    - canonical: nas-apps
      name: jellyfin
    - canonical: nas-apps
      name: lazylibrarian
    - canonical: nas-apps
      name: lidarr
    - canonical: nas-apps
      name: nas-proxy
    - canonical: nas-apps
      name: prowlarr
    - canonical: nas-apps
      name: qbitorrent
    - canonical: nas-apps
      name: radarr
    - canonical: nas-apps
      name: sabnzbd
    - canonical: nas-apps
      name: seerr
    - canonical: nas-apps
      name: sonarr
tsig_algorithm: hmac-sha256
tsig_primary_key_name: acme_dns-01
tsig_extra_keys:
- domain: home
  name: acme_nas-proxy
  records:
  - nas-apps
  - calibre
  - jellyfin
  - lazylibrarian
  - lidar
  - nas-proxy
  - prowlarr
  - qbitorrent
  - radarr
  - sabnzbd
  - seerr
  - sonarr

# ============================================================
# DNS — ADGUARD
# ============================================================
adguard_ratelimit: 300
adguard_upstream_dns:
- '[/{{ domain }}/]{{ ip_bind9 }}:{{ bind_dns_port }}'
- https://dns.google/dns-query
- https://dns.cloudflare.com/dns-query
adguard_bootstrap_dns:
- 8.8.8.8
- 8.8.4.4
- 1.1.1.1
adguard_rewrites:
- answer: 10.0.3.10
  domain: nas.example.local
- answer: 10.0.3.11
  domain: portainer.example.local
- answer: 10.0.3.12
  domain: apps.example.local
- answer: apps.example.local
  domain: '*.example.local'
adguard_dhcp_enabled: false
adguard_dhcp_interface: eth0
adguard_dhcp_lease_duration: 86400
adguard_dhcp_range_start: 10.0.0.20
adguard_dhcp_range_end: 10.0.0.200
adguard_dhcp_subnet_mask: 255.255.252.0

# ============================================================
# NGINX BACKENDS
# ============================================================
nginx_backend_adguard_dns: adguardhome:53
nginx_backend_adguard_http: http://adguardhome:80
nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}

# ============================================================
# LDAP / OPENLDAP
# ============================================================
ldap_base_dn: ""         # computed by playbook from 'domain'
ldap_domain_components: []  # computed by playbook from 'domain'
ldap_groups:
- gidNumber: 1100
  name: admins
  permissions:
  - read
  - write
  - modify
- gidNumber: 5000
  name: users
  permissions:
  - read
ldap_organizational_units:
- description: User Accounts
  name: accounts
- description: Security Groups
  name: groups
- description: Privileged accounts
  name: admins
  parent: accounts
  uid_range: 1101-1999
- description: Regular User accounts
  name: users
  parent: accounts
  uid_range: 5001-50000
- description: Computer objects
  name: hosts
  uid_range: 2000-4900
