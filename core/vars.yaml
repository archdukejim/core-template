# ============================================================
# GLOBAL
# ============================================================
domain: home
system_timezone: America/New_York
deploy_base_dir: /opt
repo_source: '{{ playbook_dir | dirname }}'
hostname: core

# ============================================================
# NETWORK
# ============================================================
lan_cidr: 10.0.0.0/22
lan_gateway: 10.0.0.1
dns_server: 10.0.0.1
core_subnet: 10.255.0.0/24
pi_core_ip: 10.0.3.53

# ============================================================
# SERVICE IPs  (Docker container addresses on core_subnet)
# ============================================================
ip_nginx: 10.255.0.10
ip_bind9: 10.255.0.30
ip_stepca: 10.255.0.40
ip_ldap: 10.255.0.50

# ============================================================
# SERVICE HOSTNAMES
# ============================================================
hostname_nginx: core-proxy.{{ domain }}
hostname_bind9: dns.{{ domain }}
hostname_stepca: ca.{{ domain }}
hostname_ldap: ldap.{{ domain }}

# ============================================================
# DOCKER IMAGES
# ============================================================
image_nginx: nginx:latest
image_bind9: ubuntu/bind9:latest
image_stepca: smallstep/step-ca:latest
image_alpine_tools: core-alpine-tools:latest

# ============================================================
# DOCKER / SERVICE INFRASTRUCTURE
# ============================================================
compose_file: '{{ deploy_base_dir }}/core/docker-compose.yml'
project_containers:
- nginx
- step-ca
- openldap
- bind9
service_dirs:
- folder: nginx
  owner: nginx
- folder: bind9
  owner: bind
- folder: stepca
  owner: step
- folder: openldap
  owner: ldap
- folder: easyrsa
  owner: root
service_users:
  bind:
    gid: 53
    uid: 53
  ldap:
    gid: 389
    uid: 389
  nginx:
    gid: 443
    uid: 443
  step:
    gid: 135
    uid: 135

# ============================================================
# CERTIFICATES / PKI
# ============================================================
ca_name: Home Lab CA
cert_country: US
cert_province: Your State
cert_city: Your City
cert_org: Home Lab
cert_ou: Infrastructure
cert_root_ca_days: 7300
cert_root_digest: sha256
cert_root_key_type: rsa
cert_root_key_param: '4096'
cert_intermediate_days: 5475
cert_intermediate_digest: sha256
cert_intermediate_key_type: rsa
cert_intermediate_key_param: '4096'
cert_service_days: 5475           # 15-year leaf TLS certs for all service-tier nginx endpoints (dns, ldap, ca)

# ============================================================
# STEP-CA
# ============================================================
stepca_port: 9000
stepca_cert_allow_subordinate_ca: true
stepca_cert_max_lifetime_hours: 87600h
cert_acme_lifetime_hours: 2160h        # default lifetime for Step-CA ACME-issued leaf certs (90 days)

# ============================================================
# DNS — BIND9
# ============================================================
bind_dns_port: 5353
bind9_doh_port: 8053
bind_acls:
  acme-updaters:
  - '{{ core_subnet }}'
  dns-resolvers:
  - 127.0.0.1
  - '{{ lan_cidr }}'
  - '{{ core_subnet }}'
dns:
  '{{ domain }}':
    A:
    - ip: 10.0.3.53
      name: "{{ hostname }}"
    CNAME:
    - canonical: "{{ hostname }}"
      name: ca
    - canonical: "{{ hostname }}"
      name: dns
    - canonical: "{{ hostname }}"
      name: ldap
tsig_keys:
- name: acme_dns-01
  algorithm: hmac-sha256
  domain: '{{ domain }}'
  primary: true
- name: acme_nas-proxy
  algorithm: hmac-sha256
  domain: home
  records:
  - nas-apps
  - calibre
  - jellyfin
  - lazylibrarian
  - lidar
  - nas-proxy
  - prowlarr
  - qbitorrent
  - radarr
  - sabnzbd
  - seerr
  - sonarr

# ============================================================
# NGINX BACKENDS
# ============================================================
nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}

# ============================================================
# LDAP / OPENLDAP
# ============================================================
ldap_base_dn: ""         # computed by playbook from 'domain'
ldap_domain_components: []  # computed by playbook from 'domain'
ldap_groups:
- gidNumber: 1100
  name: admins
  permissions:
  - read
  - write
  - modify
- gidNumber: 5000
  name: users
  permissions:
  - read
ldap_organizational_units:
- description: User Accounts
  name: accounts
- description: Security Groups
  name: groups
- description: Privileged accounts
  name: admins
  parent: accounts
  uid_range: 1101-1999
- description: Regular User accounts
  name: users
  parent: accounts
  uid_range: 5001-50000
- description: Computer objects
  name: hosts
  uid_range: 2000-4900
