# ===================================================================
# Core Infrastructure Variables
# ===================================================================
# Organized: Global → Network → per-service (alphabetical)
# ===================================================================

# ===================================================================
# Global
# ===================================================================

repo_source: "{{ playbook_dir | dirname }}"
target_base: "/opt"
compose_file: "{{ target_base }}/core/docker-compose.yml"
system_timezone: "America/New_York"

# --- Service User Mapping (UID:GID) ---
# These map to container-internal user expectations.
# Chosen to avoid conflicts with system accounts and
# align with well-known port numbers where practical.
service_users:
  nginx:   { uid: 443, gid: 443 }
  bind:    { uid: 53, gid: 53 }
  step:    { uid: 135, gid: 135 }
  ldap:    { uid: 389, gid: 389 }
  certbot: { uid: 0,   gid: 0 }
  adguard: { uid: 153, gid: 153 }

# --- Directory-to-Owner Mapping ---
# 'folder' matches the repo subdirectory name
# 'owner' matches a key in service_users above
service_dirs:
  - { folder: "nginx", owner: "nginx" }
  - { folder: "adguardhome", owner: "adguard" }
  - { folder: "bind9", owner: "bind" }
  - { folder: "stepca", owner: "step" }
  - { folder: "openldap", owner: "ldap" }
  - { folder: "certbot", owner: "certbot" }
  - { folder: "easyrsa", owner: "root" }

# Containers to stop during setup
project_containers:
  - nginx
  - adguardhome
  - certbot
  - step-ca
  - openldap
  - bind9

# ===================================================================
# Network & Domain
# ===================================================================

domain_top: "internal"
lan_cidr: "192.168.4.0/22"
core_subnet: "172.30.255.0/24"
dns_server: "192.168.4.1"             # Host DNS (bootstrap, before BIND9 runs)

# --- Container IPs ---
ip_nginx: "172.30.255.10"
ip_adguard: "172.30.255.20"
ip_bind9: "172.30.255.30"
ip_stepca: "172.30.255.40"
ip_ldap: "172.30.255.50"

# --- Service Hostnames ---
url_nginx: "core-proxy.{{ domain_top }}"
url_adguard: "adguard.{{ domain_top }}"
url_bind9: "dns.{{ domain_top }}"
url_stepca: "ca.{{ domain_top }}"
url_ldap: "ldap.{{ domain_top }}"

# ===================================================================
# Certificates (EasyRSA / Step-CA / Certbot)
# ===================================================================

# --- X.509 Distinguished Name ---
cert_country: "US"
cert_province: "Florida"
cert_city: "Brandon"
cert_org: "Church Family Network"
cert_ou: "Infrastructure"

# --- Lifetimes ---
cert_root_ca_days: 7300              # Root CA validity (~20 years)
cert_intermediate_days: 5475         # Intermediate CA validity (~15 years)
cert_bind9_tls_days: 5475            # BIND9 static TLS cert validity (~15 years)
cert_acme_lifetime_hours: 1080h      # ACME default cert lifetime issued by Step-CA (45 days)
cert_stepca_max_lifetime_hours: 87600h  # Max cert lifetime Step-CA will issue (10 years, for subordinate CAs)
cert_stepca_allow_subordinate_ca: true  # Allow issuing subordinate intermediate CA certs
cert_acme_renew_before_days: 15      # Renew when fewer than this many days remain
cert_renewal_check_hours: 12         # How often certbot checks for pending renewals

# --- Certbot / ACME ---
tsig_key_name: "acme_dns-01"
tsig_algorithm: "hmac-sha256"
acme_email: "admin@email.{{domain_top}}"
certbot_domains:
  - "adguard.{{ domain_top }}"
  - "ldap.{{ domain_top }}"
  - "ca.{{ domain_top }}"

# ===================================================================
# BIND9
# ===================================================================

bind_dns_port: 5353

bind_acls:
  dns-resolvers:
    - "127.0.0.1"
    - "{{ lan_cidr }}"
    - "{{ core_subnet }}"
  acme-updaters:
    - "{{ core_subnet }}"

# --- DNS Records ---
# Each top-level key is a zone name; records are grouped by type.
dns:
  {{ domain_top }}:
    A:
      - name: nas25
        ip: 192.168.7.10
      - name: portainer
        ip: 192.168.7.11
      - name: nas25-apps
        ip: 192.168.7.12
      - name: pi-core
        ip: 192.168.7.53
      - name: pi-vpn
        ip: 192.168.7.80
      - name: jetkvm
        ip: 192.168.7.0
      - name: host1
        ip: 192.168.7.101
      - name: host2
        ip: 192.168.7.102
    CNAME:
      - name: ca
        canonical: pi-core
      - name: adguard
        canonical: pi-core
      - name: dns
        canonical: pi-core
      - name: ldap
        canonical: pi-core
      - name: calibre
        canonical: nas25-apps
      - name: jellyfin
        canonical: nas25-apps
      - name: lazylibrarian
        canonical: nas25-apps
      - name: lidarr
        canonical: nas25-apps
      - name: nas25-proxy
        canonical: nas25-apps
      - name: prowlarr
        canonical: nas25-apps
      - name: qbitorrent
        canonical: nas25-apps
      - name: radarr
        canonical: nas25-apps
      - name: sabnzbd
        canonical: nas25-apps
      - name: seerr
        canonical: nas25-apps
      - name: sonarr
        canonical: nas25-apps
  family:
    CNAME:
      - name: j-j
        canonical: pi-vpn

# ===================================================================
# Nginx
# ===================================================================

nginx_backend_adguard_dns: "adguardhome:53"
nginx_backend_adguard_http: "http://adguardhome:80"
nginx_backend_ldap: "openldap:389"
nginx_backend_stepca: "https://step-ca:{{ stepca_port }}"

# ===================================================================
# Step-CA
# ===================================================================

ca_name: "Church Family CA"
stepca_port: 9000

# ===================================================================
# OpenLDAP
# ===================================================================

ldap_domain_components:
  - "{{ domain_top }}"
ldap_base_dn: "dc={{ domain_top }}"

ldap_organizational_units:
  - name: accounts
    description: User Accounts
  - name: groups
    description: Security Groups
  - name: admins
    description: Privileged accounts
    parent: accounts
    uid_range: "1101-1999"
  - name: users
    description: Regular User accounts
    parent: accounts
    uid_range: "5001-50000"
  - name: hosts
    description: Computer objects
    uid_range: "2000-4900"

ldap_groups:
  - name: admins
    gidNumber: 1100
    permissions: [read, write, modify]
  - name: users
    gidNumber: 5000
    permissions: [read]
