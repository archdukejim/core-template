services:
  nginx:
    image: nginx:latest
    container_name: nginx
    user: "2000:2000"
    security_opt:
      - apparmor:unconfined 
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - 80:80
      - 443:443       #for AdguardHome over HTTPS, UI
      - 53:53/tcp     #for AdguardHome
      - 53:53/udp     #for AdguardHome
      - 853:853/tcp   #for AdguardHome over TLS
      - 389:389       #for LDAP
      - 636:636       #for LDAP/S
    volumes:
      - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/certbot/etc/letsencrypt/live:/etc/letsencrypt/live:ro
      - /opt/certbot/etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
    networks:
      core_net:
        ipv4_address: "172.30.255.10"
        aliases: 
          - "core-proxy.internal"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    user: "2700:2700"
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - /opt/adguardhome/work:/opt/adguardhome/work
      - /opt/adguardhome/config:/opt/adguardhome/conf
      - /opt/certbot/etc/letsencrypt/live/adguard.internal:/etc/letsencrypt/live/adguard.internal:ro
      - /opt/certbot/etc/letsencrypt/archive/adguard.internal:/etc/letsencrypt/archive/adguard.internal:ro
    networks:
      core_net:
        ipv4_address: "172.30.255.20"
        aliases: 
          - "adguard.internal"
    environment:
      - TZ=America/New_York
    healthcheck:
      # Checks if the AdGuard Web UI is responding
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  bind9:
    image: internetsystemsconsortium/bind9:9.20
    container_name: bind9
    ports: 
      - "5353:5353/tcp"
      - "5353:5353/udp"
    volumes:
      - /opt/bind9/config:/etc/bind:ro
      - /opt/bind9/var/lib/bind:/var/lib/bind
      - /opt/bind9/var/log:/var/log
      - /opt/bind9/var/cache/bind:/var/cache/bind
      - /opt/certbot/etc/letsencrypt/live/dns.internal:/etc/letsencrypt/live/dns.internal:ro
      - /opt/certbot/etc/letsencrypt/archive/dns.internal:/etc/letsencrypt/archive/dns.internal:ro
    command: ["-g", "-u", "bind", "-c", "/etc/bind/named.conf"]
    networks:
      core_net:
        ipv4_address: "172.30.255.30"
        aliases: 
          - "dns.internal"
    restart: unless-stopped
    healthcheck:
      # Checks if BIND is responding to DNS queries on its internal port
      test: ["CMD", "dig", "@127.0.0.1", "-p", "5353", "localhost"]
      interval: 40s
      timeout: 5s
      retries: 3

  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    user: "2002:2002"
    restart: unless-stopped
    volumes:
      - /opt/stepca/data:/home/step
    # Point explicitly to the config generated by the install script
    command: /usr/local/bin/step-ca /home/step/config/ca.json
    networks:
      core_net:
        ipv4_address: "172.30.255.40"
        aliases: 
          - "ca.internal"
    healthcheck:
      # Step-CA has a built-in health endpoint
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # openldap:
  #   image: osixia/openldap:latest
  #   container_name: openldap
  #   user: "2003:2003"
  #   networks:
  #     core_net:
  #       ipv4_address: 172.30.255.50

  certbot:
    image: certbot/dns-rfc2136:latest
    container_name: certbot
    depends_on:
      bind9:
        condition: service_healthy
    volumes:
      - /opt/certbot/etc/letsencrypt:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock # Allows container to run docker commands
      - /opt/certbot/hooks:/etc/letsencrypt/renewal-hooks/deploy
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      core_net:
    healthcheck:
      # Since certbot is a sleeping loop, we check if the process is alive
      test: ["CMD", "pgrep", "-f", "certbot"]
      interval: 1m
      timeout: 5s
      retries: 2

volumes:
  adguard-work:

networks:
  core_net:
    driver: bridge
    ipam:
      config:
        - subnet: "172.30.255.0/24"