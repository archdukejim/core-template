---
- name: Section 14 - Verification and Cleanup
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml


  tasks:
    - name: Section 14 - Verification and Cleanup
      tags: [verify]
      block:
        - name: Wait for certificate propagation
          ansible.builtin.pause:
            seconds: 3

        - name: Verify service certificates
          ansible.builtin.shell:
            cmd: >-
              openssl verify
              -CAfile {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              -untrusted {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              {{ deploy_base_dir }}/nginx/certs/{{ item }}/fullchain.pem
          loop:
            - "{{ hostname_bind9 }}"
            - "{{ hostname_ldap }}"
            - "{{ hostname_stepca }}"
          register: cert_verify
          changed_when: false
          failed_when: cert_verify.rc != 0

        - name: Shut down bootstrap stack
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} down"

        - name: Clean up any orphaned Step-CA containers
          ansible.builtin.shell:
            cmd: "docker ps -q --filter 'ancestor={{ image_stepca }}' | xargs -r docker stop"
          changed_when: false
          failed_when: false

        - name: Installation complete
          ansible.builtin.debug:
            msg: "Core infrastructure installation complete. Run 'docker compose up -d' from {{ deploy_base_dir }}/core/ to start services."
