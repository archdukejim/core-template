---
- name: Section 9 - BIND9 Infrastructure
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  pre_tasks:
    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ deploy_base_dir }}/vars.yaml"


  tasks:
    - name: Section 9 - BIND9 Infrastructure
      tags: [pki, bind9, tsig]
      block:
        - name: Set primary TSIG key fact
          ansible.builtin.set_fact:
            tsig_primary: "{{ tsig_keys | selectattr('primary', 'defined') | selectattr('primary', 'equalto', true) | first }}"

        - name: Generate shared TSIG secret
          ansible.builtin.command:
            cmd: openssl rand -base64 32
          register: tsig_secret
          changed_when: false

        - name: Write BIND9 TSIG key file
          ansible.builtin.copy:
            dest: "{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            content: |
              key "{{ tsig_primary.name }}" {
                  algorithm {{ tsig_primary.algorithm }};
                  secret "{{ tsig_secret.stdout }}";
              };
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'

        - name: Ensure BIND9 TLS directory exists
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/bind9/ssl"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0700'

        - name: Mint static TLS certificate for BIND9
          community.docker.docker_container:
            name: bind9_tls_mint
            image: "{{ image_stepca }}"
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
            entrypoint: /usr/local/bin/step
            command: >
              certificate create "{{ hostname_bind9 }}"
              "/home/step/artifacts/bind9.crt" "/home/step/artifacts/bind9.key"
              --ca "/home/step/certs/intermediate_ca.crt"
              --ca-key "/home/step/secrets/intermediate_ca_key"
              --no-password --insecure --force
              --not-after {{ cert_service_days * 24 }}h
              --template /home/step/templates/certs/leaf.tpl
              --san {{ hostname_bind9 }} --san ns.{{ domain }} --san 127.0.0.1
            detach: false
            cleanup: true

        - name: Move BIND9 TLS key
          ansible.builtin.command:
            cmd: >
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9.key
              {{ deploy_base_dir }}/bind9/ssl/privkey.pem

        - name: Move BIND9 TLS cert
          ansible.builtin.command:
            cmd: >
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9.crt
              {{ deploy_base_dir }}/bind9/ssl/cert.pem

        - name: Build BIND9 fullchain
          ansible.builtin.shell:
            cmd: >
              cat {{ deploy_base_dir }}/bind9/ssl/cert.pem
              {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              > {{ deploy_base_dir }}/bind9/ssl/fullchain.pem

        - name: Remove standalone cert (fullchain replaces it)
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/bind9/ssl/cert.pem"
            state: absent

        - name: Distribute Root CA to BIND9 TLS dir
          ansible.builtin.copy:
            src: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            dest: "{{ deploy_base_dir }}/bind9/ssl/root_ca.crt"
            remote_src: true
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0644'

        - name: Set BIND9 TLS file permissions
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: "{{ item.mode }}"
          loop:
            - { path: "{{ deploy_base_dir }}/bind9/ssl/privkey.pem", mode: "0600" }
            - { path: "{{ deploy_base_dir }}/bind9/ssl/fullchain.pem", mode: "0644" }
