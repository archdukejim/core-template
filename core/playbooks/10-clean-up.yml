---
# Section 10 — Clean Up
#
# Removes the /tmp/core-template-render render directory from the controller.
# Only runs if 09-deploy-checks.yml set deploy_checks_passed=true.
# If checks failed, temp files are preserved for troubleshooting.
#
# Replaces: 09-clean-up.yml
- name: Section 10 - Clean Up
  hosts: "{{ target_host }}"
  become: false
  gather_facts: false
  vars_files:
    - /tmp/core-template-render/vars.yaml

  tasks:
    - name: Section 10 - Conditional Teardown
      become: true
      tags: [teardown, cleanup-temp]
      block:
        - name: Bring down stack
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} down"
          when: no_start | default(false) | bool

        - name: Report running containers
          ansible.builtin.shell:
            cmd: >
              docker ps --filter "label=com.docker.compose.project=core"
              --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
          register: running_containers
          changed_when: false
          when: not (no_start | default(false) | bool)

        - name: Show running containers
          ansible.builtin.debug:
            msg: "{{ running_containers.stdout_lines }}"
          when: not (no_start | default(false) | bool)

    - name: Section 10 - Remove render temp directory
      tags: [cleanup-temp]
      block:
        - name: Skip cleanup if deploy checks did not pass
          ansible.builtin.debug:
            msg: >-
              Skipping cleanup — deploy_checks_passed is not set.
              Temp files preserved at /tmp/core-template-render for troubleshooting.
          when: not (deploy_checks_passed | default(false) | bool)

        - name: Remove /tmp/core-template-render from controller
          ansible.builtin.file:
            path: /tmp/core-template-render
            state: absent
          delegate_to: localhost
          when: deploy_checks_passed | default(false) | bool
