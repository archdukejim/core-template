---
# vars-copy.yml — Export resolved vars as a static snapshot
#
# NOT imported by core-config.yml — does not run through setup.sh.
# Run explicitly to export a static copy of the resolved configuration:
#
#   ansible-playbook core/playbooks/vars-copy.yml \
#     -e target_host=localhost \
#     -e export_path=/path/to/output
#
# Defaults:
#   export_path: {{ repo_source }}/builds/vars
#
# Produces:
#   <export_path>/vars.yaml       — fully resolved vars (rendered by 01-render-jinja)
#   <export_path>/custom-vars.yaml — raw user config snapshot
- name: Vars Copy - Export resolved vars as static snapshot
  hosts: "{{ target_host }}"
  become: false
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"
  vars:
    export_path: "{{ repo_source }}/builds/vars"

  tasks:
    - name: Vars Copy - Export resolved vars snapshot
      tags: [vars-copy]
      block:
        - name: Ensure export directory exists
          ansible.builtin.file:
            path: "{{ export_path }}"
            state: directory
            mode: '0750'
          delegate_to: localhost

        - name: Copy resolved vars.yaml to export path
          ansible.builtin.copy:
            src: "{{ deploy_base_dir }}/vars.yaml"
            dest: "{{ export_path }}/vars.yaml"
            mode: '0640'
          delegate_to: localhost

        - name: Copy custom-vars.yaml to export path
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../custom-vars.yaml"
            dest: "{{ export_path }}/custom-vars.yaml"
            mode: '0640'
          delegate_to: localhost
