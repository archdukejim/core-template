---
# Section 4 — Target File Structure and Deployment
#
# Tags:
#   file-structure — Create full directory tree and copy all rendered outputs.
#                    Use for initial install or full redeployment.
#   update         — Safe subset: scripts and static pages only.
#                    Does NOT redeploy service configs. Safe on live systems.
#   dns-record     — Re-deploy BIND9 zone and zones config, then reload BIND9.
#   bind9          — BIND9 directories and runtime dirs (data, log, cache).
#   stepca         — Step-CA directory structure.
#   nginx          — nginx directories.
#   openldap       — OpenLDAP directories.
#   easyrsa        — EasyRSA directories.
#
# Copies pre-rendered files from /tmp/core-template-render (localhost) to target.
# /tmp/core-template-render is populated by 02-render-jinja.yml before this runs.
#
# Replaces: 03-file-structure.yml (+ merges 11-runtime-dirs.yml)
- name: Section 4 - Target File Structure and Deployment
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "/tmp/core-template-render/vars.yaml"

  tasks:
    # ----------------------------------------------------------------
    # 4a — Scripts and meta (safe to auto-update)
    # ----------------------------------------------------------------
    - name: Section 4a - Ensure base destination directories exist
      tags: [file-structure, update, easyrsa, nginx]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
      loop:
        - "{{ deploy_base_dir }}/easyrsa"
        - "{{ deploy_base_dir }}/nginx/pki"

    - name: Section 4a - Sync core project files to target
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ repo_source }}/core/"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: '0750'
        directory_mode: '0750'

    - name: Section 4a - Copy resolved vars.yaml to target core dir
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/vars.yaml"
        dest: "{{ deploy_base_dir }}/core/vars.yaml"
        owner: root
        group: root
        mode: '0640'

    - name: Section 4a - Copy root-level project files to core dir
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: preserve
      with_fileglob:
        - "{{ repo_source }}/*"

    - name: Section 4a - Deploy rendered nginx PKI page
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/pki/index.html"
        dest: "{{ deploy_base_dir }}/nginx/pki/index.html"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'

    # ----------------------------------------------------------------
    # 4e — BIND9 runtime writable directories
    #      (runs before 4b/4c so bind9/data exists for zone deploys)
    # ----------------------------------------------------------------
    - name: Section 4e - Ensure BIND9 runtime directories exist
      tags: [file-structure, bind9]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0750'
      loop:
        - "{{ deploy_base_dir }}/bind9/config"
        - "{{ deploy_base_dir }}/bind9/data"
        - "{{ deploy_base_dir }}/bind9/log"
        - "{{ deploy_base_dir }}/bind9/cache"

    # ----------------------------------------------------------------
    # 4b — Service directory tree and config files
    #      Requires review on operational systems — tagged files only
    # ----------------------------------------------------------------
    - name: Section 4b - Service directory and config deployment
      tags: [file-structure]
      block:
        - name: Check which service directories exist in repo
          ansible.builtin.stat:
            path: "{{ repo_source }}/{{ item.folder }}"
          loop: "{{ service_dirs }}"
          register: service_dir_stats
          delegate_to: localhost

        - name: Sync service directories that exist in repo
          ansible.builtin.copy:
            src: "{{ repo_source }}/{{ item.item.folder }}/"
            dest: "{{ deploy_base_dir }}/{{ item.item.folder }}/"
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0640'
            directory_mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: item.stat.exists and item.stat.isdir

        - name: Create service directories missing from repo
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/{{ item.item.folder }}"
            state: directory
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: not item.stat.exists

        - name: Deploy rendered nginx.conf
          ansible.builtin.copy:
            src: "/tmp/core-template-render/nginx/nginx.conf"
            dest: "{{ deploy_base_dir }}/nginx/nginx.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'



        - name: Deploy rendered BIND9 config files
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/{{ item }}"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones

        - name: Deploy rendered BIND9 keys config (restricted)
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/{{ item }}"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'
          loop:
            - named.conf.keys
            - rndc.key



        - name: Ensure RFC2136 credential directories exist
          tags: [bind9]
          ansible.builtin.file:
            path: "{{ (item.out | default('/opt/' + item.name + '/rfc2136.ini')) | dirname }}"
            state: directory
            owner: root
            group: root
            mode: '0700'
          loop: "{{ tsig_keys | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | rejectattr('primary', 'defined') | list | length > 0

        - name: Deploy RFC2136 INI credentials for non-primary TSIG keys
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/rfc2136/{{ item.name }}/rfc2136.ini"
            dest: "{{ item.out | default('/opt/' + item.name + '/rfc2136.ini') }}"
            owner: root
            group: root
            mode: '0600'
          loop: "{{ tsig_keys | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | rejectattr('primary', 'defined') | list | length > 0

    # ----------------------------------------------------------------
    # 4c — DNS zones (safe to re-deploy on update or dns-record)
    # ----------------------------------------------------------------
    - name: Section 4c - Deploy rendered BIND9 zone data files
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/data/db.{{ item.key }}"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ item.key }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Section 4c - Deploy rendered BIND9 reverse zone files
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/data/db.{{ item }}"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ item }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      loop: "{{ reverse_zone_names }}"
      loop_control:
        label: "{{ item }}"

    - name: Section 4c - Deploy rendered named.conf.zones (dns-record)
      tags: [dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/config/named.conf.zones"
        dest: "{{ deploy_base_dir }}/bind9/config/named.conf.zones"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'

    - name: Section 4c - Reload BIND9 zones after dns-record update
      tags: [dns-record]
      block:
        - name: Check if bind9 container is running
          ansible.builtin.command:
            cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
          register: bind9_running
          failed_when: false
          changed_when: false

        - name: Reload BIND9 zones via rndc
          ansible.builtin.command:
            cmd: "docker exec bind9 rndc reload"
          when:
            - bind9_running.rc == 0
            - bind9_running.stdout | trim == 'true'
          changed_when: true

    # ----------------------------------------------------------------
    # 4d — Step-CA directory structure
    #      (moved from 06-pki.yml — must exist before PKI bootstrap)
    # ----------------------------------------------------------------
    - name: Section 4d - Ensure Step-CA directory structure exists
      tags: [file-structure, stepca]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ service_users.step.uid }}"
        group: "{{ service_users.step.gid }}"
        mode: '0700'
      loop:
        - "{{ deploy_base_dir }}/stepca/data"
        - "{{ deploy_base_dir }}/stepca/data/secrets"
        - "{{ deploy_base_dir }}/stepca/data/artifacts"
        - "{{ deploy_base_dir }}/stepca/data/certs"
        - "{{ deploy_base_dir }}/stepca/data/config"
        - "{{ deploy_base_dir }}/stepca/data/templates/certs"

    - name: Section 4d - Deploy rendered Step-CA certificate templates
      tags: [file-structure, stepca]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/stepca/templates/certs/{{ item }}"
        dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/{{ item }}"
        owner: "{{ service_users.step.uid }}"
        group: "{{ service_users.step.gid }}"
        mode: '0640'
      loop:
        - leaf.tpl
        - subca.tpl

    # ----------------------------------------------------------------
    # 4f — Root CA container persistent dirs
    # ----------------------------------------------------------------
    - name: Section 4f - Ensure root CA history and revoke dirs exist
      tags: [file-structure, stepca]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      loop:
        - "{{ deploy_base_dir }}/root-ca/history"
        - "{{ deploy_base_dir }}/root-ca/revokes"

    # ----------------------------------------------------------------
    # 4g — LDAP and Docker Compose explicit deployment
    # ----------------------------------------------------------------
    - name: Section 4g - Deploy OpenLDAP and docker-compose
      tags: [file-structure, add-ldap]
      block:
        - name: Deploy rendered docker-compose.yml
          ansible.builtin.copy:
            src: "/tmp/core-template-render/core/docker-compose.yml"
            dest: "{{ compose_file }}"
            owner: root
            group: root
            mode: '0640'

        - name: Deploy rendered OpenLDAP files
          tags: [openldap]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/openldap/{{ item }}"
            dest: "{{ deploy_base_dir }}/openldap/{{ item }}"
            owner: "{{ service_users.ldap.uid }}"
            group: "{{ service_users.ldap.gid }}"
            mode: '0640'
          loop:
            - ous.ldif
            - groups.ldif
            - acl.ldif
            - admins.ldif
          when: install_ldap | default(false) | bool
