---
# Section 4 — Target File Structure and Deployment
#
# Tags:
#   file-structure — Create full directory tree and copy all rendered outputs.
#                    Use for initial install or full redeployment.
#   update         — Safe subset: scripts and static pages only.
#                    Does NOT redeploy service configs. Safe on live systems.
#   dns-record     — Re-deploy BIND9 zone and zones config, then reload BIND9.
#   bind9          — BIND9 directories and runtime dirs (data, log, cache).
#   stepca         — Step-CA directory structure.
#   nginx          — nginx directories.
#   openldap       — OpenLDAP directories.
#
# Copies pre-rendered files from /tmp/core-template-render (localhost) to target.
# /tmp/core-template-render is populated by 02-render-jinja.yml before this runs.
#
# Replaces: 03-file-structure.yml (+ merges 11-runtime-dirs.yml)
- name: Section 4 - Target File Structure and Deployment
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "/tmp/core-template-render/vars.yaml"

  tasks:
    # ----------------------------------------------------------------
    # 4a — Scripts and meta (safe to auto-update)
    # ----------------------------------------------------------------
    - name: Section 4a - Ensure base destination directories exist
      tags: [file-structure, update]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
      loop:
        - "{{ deploy_base_dir }}/core"
        - "{{ deploy_base_dir }}/core/config"
        - "{{ deploy_base_dir }}/core/config/certs"
        - "{{ deploy_base_dir }}/nginx/www/certificates"
        - "{{ deploy_base_dir }}/nginx/www/shared"
        - "{{ deploy_base_dir }}/nginx/www/landing"
        - "{{ deploy_base_dir }}/nginx/www/manual"
        - "{{ deploy_base_dir }}/nginx/www/manual/docs"
        - "{{ deploy_base_dir }}/nginx/www/ldap"
        - "{{ deploy_base_dir }}/nginx/config/conf.d"

    - name: Section 4a - Ensure nginx web directories have correct ownership
      tags: [file-structure, update, nginx]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0755'
        recurse: yes
      loop:
        - "{{ deploy_base_dir }}/nginx/www"
        - "{{ deploy_base_dir }}/nginx/config"

    - name: Section 4a - Sync repository core directory
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ repo_source }}/core/"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: '0750'
        directory_mode: '0750'

    - name: Section 4a - Copy setup.sh, README, LICENSE to core root
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: preserve
      with_fileglob:
        - "{{ repo_source }}/setup.sh"
        - "{{ repo_source }}/README.md"
        - "{{ repo_source }}/LICENSE"

    - name: Section 4a - Copy core-secrets.yml to core config
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ repo_source }}/core-secrets.yml"
        dest: "{{ deploy_base_dir }}/core/config/core-secrets.yml"
        owner: root
        group: root
        mode: '0600'
      ignore_errors: true

    - name: Section 4a - Copy resolved vars.yaml to core config
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/vars.yaml"
        dest: "{{ deploy_base_dir }}/core/config/vars.yaml"
        owner: root
        group: root
        mode: '0640'

    - name: Section 4a - Deploy rendered nginx PKI page
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/certificates/{{ item }}"
        dest: "{{ deploy_base_dir }}/nginx/www/certificates/{{ item }}"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - index.html

    - name: Section 4a - Deploy rendered nginx shared web assets
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/shared/{{ item }}"
        dest: "{{ deploy_base_dir }}/nginx/www/shared/{{ item }}"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - style.css

    - name: Section 4a - Deploy rendered nginx landing page
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/landing/{{ item }}"
        dest: "{{ deploy_base_dir }}/nginx/www/landing/{{ item }}"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - index.html

    - name: Section 4a - Deploy rendered nginx manual page
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/manual/{{ item }}"
        dest: "{{ deploy_base_dir }}/nginx/www/manual/{{ item }}"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - index.html
        - marked.min.js

    - name: Section 4a - Deploy rendered nginx ldap client files
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/ldap/{{ item }}"
        dest: "{{ deploy_base_dir }}/nginx/www/ldap/{{ item }}"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - index.html
        - install-ldap.sh

    - name: Section 4a - Deploy nginx manual documentation markdown files
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "{{ repo_source }}/docs/"
        dest: "{{ deploy_base_dir }}/nginx/www/manual/docs/"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
        directory_mode: '0755'

    - name: Section 4a - Deploy rendered nginx install scripts
      tags: [file-structure, update, nginx]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/www/certificates/install-{{ item }}-{{ domain_file }}.sh"
        dest: "{{ deploy_base_dir }}/nginx/www/certificates/install-{{ item }}-{{ domain_file }}.sh"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'
      loop:
        - certs
        - firefox
        - chrome
        - all
        - python


    # ----------------------------------------------------------------
    # 4e — BIND9 runtime writable directories
    #      (runs before 4b/4c so bind9/data exists for zone deploys)
    # ----------------------------------------------------------------
    - name: Section 4e - Ensure runtime data directories exist
      tags: [file-structure]
      ansible.builtin.file:
        path: "{{ item.path | default(deploy_base_dir ~ '/' ~ item.dir) }}"
        state: directory
        owner: "{{ service_users[item.user].uid }}"
        group: "{{ service_users[item.user].gid }}"
        mode: '0750'
      loop:
        - { dir: "bind9/config", user: "bind" }
        - { dir: "bind9/data", user: "bind" }
        - { dir: "bind9/log", user: "bind" }
        - { dir: "bind9/cache", user: "bind" }
        - { dir: "openldap/data", user: "ldap" }
        - { dir: "stepca/data", user: "step" }
        - { dir: "postgres/data", path: "{{ postgres_data_dir }}", user: "postgres" }
        - { dir: "keycloak/data", path: "{{ keycloak_data_dir }}", user: "keycloak" }

    # ----------------------------------------------------------------
    # 4b — Service directory tree and config files
    #      Requires review on operational systems — tagged files only
    # ----------------------------------------------------------------
    - name: Section 4b - Service directory and config deployment
      tags: [file-structure]
      block:
        - name: Check which service directories exist in repo
          ansible.builtin.stat:
            path: "{{ repo_source }}/{{ item.folder }}"
          loop: "{{ service_dirs }}"
          register: service_dir_stats
          delegate_to: localhost

        - name: Sync service directories that exist in repo
          ansible.builtin.copy:
            src: "{{ repo_source }}/{{ item.item.folder }}/"
            dest: "{{ deploy_base_dir }}/{{ item.item.folder }}/"
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0640'
            directory_mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: item.stat.exists and item.stat.isdir

        - name: Create service directories missing from repo
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/{{ item.item.folder }}"
            state: directory
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: not item.stat.exists

        - name: Deploy rendered nginx.conf
          ansible.builtin.copy:
            src: "/tmp/core-template-render/nginx/nginx.conf"
            dest: "{{ deploy_base_dir }}/nginx/config/nginx.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'

        - name: Deploy rendered bind9.conf as dns.conf
          ansible.builtin.copy:
            src: "/tmp/core-template-render/nginx/bind9.conf"
            dest: "{{ deploy_base_dir }}/nginx/config/dns.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'
          when: bind9_dns_resolver | default(true) | bool

        - name: Ensure an empty dns.conf exists to prevent Nginx crash if no resolver deployed
          ansible.builtin.copy:
            content: "# DNS routing managed externally or disabled."
            dest: "{{ deploy_base_dir }}/nginx/config/dns.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'
            force: false
          when: not (bind9_dns_resolver | default(true) | bool)



        - name: Deploy rendered BIND9 config files
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/{{ item }}"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones

        - name: Deploy rendered BIND9 keys config (restricted)
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/{{ item }}"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'
          loop:
            - named.conf.keys
            - rndc.key



        - name: Ensure RFC2136 credential directories exist
          tags: [bind9]
          ansible.builtin.file:
            path: "{{ (item.out | default('/opt/' + item.name + '/rfc2136.ini')) | dirname }}"
            state: directory
            owner: root
            group: root
            mode: '0700'
          loop: "{{ tsig_keys | default([]) | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | default([]) | rejectattr('primary', 'defined') | list | length > 0

        - name: Deploy RFC2136 INI credentials for non-primary TSIG keys
          tags: [bind9]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/rfc2136/{{ item.name }}/rfc2136.ini"
            dest: "{{ item.out | default('/opt/' + item.name + '/rfc2136.ini') }}"
            owner: root
            group: root
            mode: '0600'
          loop: "{{ tsig_keys | default([]) | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | default([]) | rejectattr('primary', 'defined') | list | length > 0

    # ----------------------------------------------------------------
    # 4c — DNS zones (safe to re-deploy on update or dns-record)
    # ----------------------------------------------------------------
    - name: Section 4c - Check if bind9 container is running
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.command:
        cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
      register: bind9_running_pre
      failed_when: false
      changed_when: false

    - name: Section 4c - Freeze BIND9 zones before update
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.command:
        cmd: "docker exec -u bind bind9 rndc freeze {{ domain if item.key == 'dynamic_zone_var' else item.key }}"
      when:
        - bind9_running_pre.rc == 0
        - bind9_running_pre.stdout | trim == 'true'
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      ignore_errors: true
      changed_when: true
    - name: Section 4c - Deploy rendered BIND9 zone data files
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/data/db.{{ domain if item.key == 'dynamic_zone_var' else item.key }}"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ domain if item.key == 'dynamic_zone_var' else item.key }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Section 4c - Deploy rendered BIND9 reverse zone files
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/data/db.{{ item }}"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ item }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      loop: "{{ reverse_zone_names }}"
      loop_control:
        label: "{{ item }}"

    - name: Section 4c - Thaw BIND9 zones after update
      tags: [file-structure, update, dns-record, bind9]
      ansible.builtin.command:
        cmd: "docker exec -u bind bind9 rndc thaw {{ domain if item.key == 'dynamic_zone_var' else item.key }}"
      when:
        - bind9_running_pre.rc == 0
        - bind9_running_pre.stdout | trim == 'true'
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      ignore_errors: true
      changed_when: true

    - name: Section 4c - Deploy rendered named.conf.zones (dns-record)
      tags: [dns-record, bind9]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/config/named.conf.zones"
        dest: "{{ deploy_base_dir }}/bind9/config/named.conf.zones"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'

    - name: Section 4c - Reload BIND9 zones after dns-record update
      tags: [dns-record]
      block:
        - name: Check if bind9 container is running
          ansible.builtin.command:
            cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
          register: bind9_running
          failed_when: false
          changed_when: false

        - name: Reload BIND9 zones via rndc
          ansible.builtin.command:
            cmd: "docker exec -u bind bind9 rndc reload"
          when:
            - bind9_running.rc == 0
            - bind9_running.stdout | trim == 'true'
          changed_when: true

    # ----------------------------------------------------------------
    # 4d — Step-CA directory structure
    #      (moved from 06-pki.yml — must exist before PKI bootstrap)
    # ----------------------------------------------------------------
    - name: Section 4d - Ensure Step-CA directory structure exists
      tags: [file-structure, stepca]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ service_users.step.uid }}"
        group: "{{ service_users.step.gid }}"
        mode: '0700'
      loop:
        - "{{ deploy_base_dir }}/stepca/data"
        - "{{ deploy_base_dir }}/stepca/data/secrets"
        - "{{ deploy_base_dir }}/stepca/data/artifacts"
        - "{{ deploy_base_dir }}/stepca/data/certs"
        - "{{ deploy_base_dir }}/stepca/data/config"
        - "{{ deploy_base_dir }}/stepca/data/templates/certs"

    - name: Section 4d - Deploy rendered Step-CA certificate templates
      tags: [file-structure, stepca]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/stepca/templates/certs/{{ item }}"
        dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/{{ item }}"
        owner: "{{ service_users.step.uid }}"
        group: "{{ service_users.step.gid }}"
        mode: '0640'
      loop:
        - leaf.tpl
        - subca.tpl

    # ----------------------------------------------------------------
    # 4f — Root CA container persistent dirs
    # ----------------------------------------------------------------
    - name: Section 4f - Ensure root CA history and revoke dirs exist
      tags: [file-structure, stepca]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      loop:
        - "{{ deploy_base_dir }}/root-ca/history"
        - "{{ deploy_base_dir }}/root-ca/revokes"

    # ----------------------------------------------------------------
    # 4g — LDAP and Docker Compose explicit deployment
    # ----------------------------------------------------------------
    - name: Section 4g - Deploy OpenLDAP and docker-compose
      tags: [file-structure, add-ldap]
      block:
        - name: Deploy separate docker-compose.yml files
          ansible.builtin.copy:
            src: "/tmp/core-template-render/{{ item }}/docker-compose.yml"
            dest: "{{ deploy_base_dir }}/{{ item }}/docker-compose.yml"
            owner: root
            group: root
            mode: '0640'
          loop:
            - nginx
            - bind9
            - stepca
            - openldap
            - postgres
            - keycloak
          ignore_errors: true

        - name: Ensure OpenLDAP custom_ldif directory exists
          tags: [openldap]
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/openldap/custom_ldif"
            state: directory
            owner: "{{ service_users.ldap.uid }}"
            group: "{{ service_users.ldap.gid }}"
            mode: '0750'
          when: install_ldap | default(false) | bool

        - name: Deploy rendered OpenLDAP files
          tags: [openldap]
          ansible.builtin.copy:
            src: "/tmp/core-template-render/openldap/{{ item }}"
            dest: "{{ deploy_base_dir }}/openldap/custom_ldif/{{ item }}"
            owner: "{{ service_users.ldap.uid }}"
            group: "{{ service_users.ldap.gid }}"
            mode: '0640'
          loop:
            - 02-ous.ldif
            - 03-groups.ldif
            - 05-admins.ldif
            - 06-acl.ldif
          when: install_ldap | default(false) | bool

    - name: Section 4a - Deploy Systemd wrappers
      tags: [file-structure, update, systemd]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../jinja/systemd/wrapper.service.j2"
        dest: "/etc/systemd/system/{{ item.service }}.service"
        owner: root
        group: root
        mode: "0644"
      loop:
        - service: nginx
          compose: nginx
          folder: nginx
          requires: []
        - service: bind9
          compose: bind9
          folder: bind9
          requires: []
        - service: stepca
          compose: step-ca
          folder: stepca
          requires: []
        - service: ldap
          compose: openldap
          folder: openldap
          requires: []
        - service: postgres
          compose: postgres
          folder: postgres
          requires: []
        - service: keycloak
          compose: keycloak
          folder: keycloak
          requires: ["postgres"]
      when: >
        (item.service not in ['postgres', 'keycloak'] or (install_keycloak | default(false) | bool)) and
        (item.service != 'ldap' or (install_ldap | default(false) | bool))
      register: systemd_wrappers

    - name: Reload systemd daemon
      tags: [file-structure, update, systemd]
      ansible.builtin.systemd:
        daemon_reload: true
      when: systemd_wrappers.changed

    - name: Section 4c - Global Executable
      tags: [file-structure]
      block:
        - name: Create core-mgr wrapper
          ansible.builtin.copy:
            dest: "/usr/local/bin/core-mgr"
            content: |
              #!/bin/bash
              # -------------------------------------------------------------------------
              # core-mgr - Global wrapper for Antigravity Core interactive manager
              # -------------------------------------------------------------------------
              if [[ " $* " == *" --version "* ]]; then
                echo "core-mgr version 1.2.2"
                echo "Last Modified: 2026-04-30"
                exit 0
              fi
              if [[ "$EUID" -ne 0 ]]; then
                echo "Please run as root (sudo core-mgr)"
                exit 1
              fi
              bash "{{ deploy_base_dir }}/core/lib/manage.sh" "$@"
            mode: '0755'
            owner: root
            group: root

    # ----------------------------------------------------------------
    # 4h — Restore Reinstall Backup
    # ----------------------------------------------------------------
    - name: Section 4h - Restore certificates and CA from backup if reinstalling
      tags: [file-structure]
      ansible.builtin.command:
        cmd: "bash {{ deploy_base_dir }}/core/lib/reinstall_restore.sh {{ reinstall_backup_dir }} {{ deploy_base_dir }}"
      when: reinstall_backup_dir is defined
      changed_when: true
