---
- name: Section 3 - System Dependencies and Docker
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  pre_tasks:
    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ deploy_base_dir }}/vars.yaml"

  tasks:
    # ----------------------------------------------------------------
    # 3a — System packages
    # ----------------------------------------------------------------
    - name: Section 3a - Core Dependency Setup
      tags: [preconditioning, pkg_mgmt]
      block:
        - name: Install prerequisite packages from offline bundle
          when: offline_prereqs_dir is defined
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              DEB_DIR="{{ offline_prereqs_dir }}/apt"
              mapfile -t _debs < <(find "$DEB_DIR" -name "*.deb" 2>/dev/null | sort)
              [ "${#_debs[@]}" -gt 0 ] || { echo "No .deb files found in ${DEB_DIR}"; exit 1; }
              echo "Installing ${#_debs[@]} packages from bundle..."
              dpkg -i --force-depends "${_debs[@]}" 2>&1 | \
                grep -v '^\(Reading database\|Preparing to unpack\|Unpacking\|Setting up\|Processing triggers\)' || true
              apt-get install -f -y --no-install-recommends \
                -o Dir::Cache::Archives="${DEB_DIR}" \
                -o APT::Get::AllowUnauthenticated=true 2>/dev/null || true
            executable: /bin/bash
          changed_when: true

        - name: Install prerequisite system packages
          when: offline_prereqs_dir is not defined
          ansible.builtin.apt:
            name:
              - acl
              - openssl
              - ca-certificates
              - curl
              - gnupg
              - ufw
              - libssl-dev
            state: present
            update_cache: true

    # ----------------------------------------------------------------
    # 3b — Docker Engine
    # ----------------------------------------------------------------
    - name: Section 3b - Docker Engine Installation
      tags: [preconditioning, docker_engine]
      block:
        - name: Check if Docker is installed
          ansible.builtin.command: docker --version
          register: docker_installed
          ignore_errors: true
          changed_when: false

        - name: Install Docker from official repository
          when: docker_installed.rc != 0 and offline_prereqs_dir is not defined
          block:
            - name: Create keyrings directory
              ansible.builtin.file:
                path: /etc/apt/keyrings
                state: directory
                mode: '0755'

            - name: Download Docker GPG key
              ansible.builtin.get_url:
                url: https://download.docker.com/linux/ubuntu/gpg
                dest: /etc/apt/keyrings/docker.asc
                mode: '0644'

            - name: Add Docker repository
              ansible.builtin.apt_repository:
                repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
                state: present

            - name: Install Docker Engine and Python SDK
              ansible.builtin.apt:
                name:
                  - docker-ce
                  - docker-ce-cli
                  - containerd.io
                  - docker-buildx-plugin
                  - docker-compose-plugin
                  - python3-docker
                state: present
                update_cache: true

        - name: Ensure Docker service is running and enabled
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Verify Docker API responsiveness
          ansible.builtin.command: docker info
          changed_when: false
          register: docker_info
          failed_when: "'Containers' not in docker_info.stdout"

        - name: Load Docker images from offline bundle
          when: offline_prereqs_dir is defined
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              IMG_DIR="{{ offline_prereqs_dir }}/images"
              loaded=0
              for tar in "${IMG_DIR}"/*.tar; do
                [ -f "$tar" ] || continue
                echo "Loading $(basename "$tar")..."
                docker load -i "$tar"
                (( loaded++ )) || true
              done
              echo "Loaded ${loaded} image(s) from bundle."
            executable: /bin/bash
          changed_when: true
