---
# core/playbooks/upgrade.yml
# Orchestrates the upgrade process.

- import_playbook: 00-controller-check.yml
- import_playbook: 01-gen-vars-and-render-jinja.yml

- name: Section UPGRADE - Prepare and merge vars
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../../core-secrets.yml"
  tasks:
    - name: Fetch existing vars.yaml from target
      ansible.builtin.slurp:
        src: "{{ deploy_base_dir | default('/opt') }}/core/vars.yaml"
      register: old_vars_b64
      failed_when: false

    - name: Fail if existing vars.yaml is missing
      ansible.builtin.fail:
        msg: "Cannot perform upgrade: existing vars.yaml not found on target {{ target_host }}"
      when: not old_vars_b64.content is defined

    - name: Ensure archive directory exists on target
      ansible.builtin.file:
        path: "{{ deploy_base_dir | default('/opt') }}/core/archive"
        state: directory
        mode: '0750'

    - name: Archive existing vars.yaml
      ansible.builtin.copy:
        content: "{{ old_vars_b64.content | b64decode }}"
        dest: "{{ deploy_base_dir | default('/opt') }}/core/archive/{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}-vars.yaml"
        mode: '0640'
        owner: root

    - name: Ensure temp directory exists on local
      ansible.builtin.file:
        path: "/tmp/core-template-render"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false

    - name: Render fresh vars.yaml to localhost
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../jinja/vars.yaml.j2"
        dest: "/tmp/core-template-render/fresh-vars.yaml"
      delegate_to: localhost
      become: false

    - name: Read fresh vars into memory
      ansible.builtin.include_vars:
        file: "/tmp/core-template-render/fresh-vars.yaml"
        name: fresh_vars

    - name: Parse old vars
      ansible.builtin.set_fact:
        old_vars: "{{ old_vars_b64.content | b64decode | from_yaml }}"

    - name: Extract image variables from fresh vars
      ansible.builtin.set_fact:
        fresh_images: "{{ fresh_vars | dict2items | selectattr('key', 'match', '^image_.*') | list | items2dict }}"

    - name: Merge vars giving old vars priority but taking images from fresh vars
      ansible.builtin.set_fact:
        merged_vars: "{{ fresh_vars | combine(old_vars, recursive=True) | combine(fresh_images) }}"

    - name: Write merged vars to /tmp/core-template-render/vars.yaml
      ansible.builtin.copy:
        content: "{{ merged_vars | to_nice_yaml }}"
        dest: "/tmp/core-template-render/vars.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

- import_playbook: 01-gen-vars-and-render-jinja.yml
  vars:
    is_upgrade: true

- import_playbook: 02-target-system-conditioning.yml

- name: Section UPGRADE - Images and Stack Management
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "/tmp/core-template-render/vars.yaml"
  tasks:
    # -------------------------------------------------------------------------
    # Image Checks
    # -------------------------------------------------------------------------
    - name: Extract image variables from merged vars for stack management
      ansible.builtin.set_fact:
        target_images: "{{ merged_vars | dict2items | selectattr('key', 'match', '^image_.*') | list | items2dict }}"

    - name: Check missing images (Offline mode)
      ansible.builtin.command: docker images -q {{ item.value }}
      register: image_check
      loop: "{{ target_images | dict2items }}"
      when: offline | default(false) | bool
      changed_when: false

    - name: Fail if images missing in offline mode
      ansible.builtin.fail:
        msg: "Missing image {{ item.item.value }} on host in offline mode. Please load it before upgrading."
      loop: "{{ image_check.results }}"
      when: 
        - offline | default(false) | bool
        - item.stdout == ""

    - name: Pull new images
      ansible.builtin.command: docker pull {{ item.value }}
      loop: "{{ target_images | dict2items }}"
      when: not offline | default(false) | bool
      failed_when: false
      # Only fail if really unable to pull, maybe no network. 
      # With offline normally they'd use offline flag.

    # -------------------------------------------------------------------------
    # Stack Diff and Teardown
    # -------------------------------------------------------------------------
    - name: Ensure target core folder exists
      ansible.builtin.file:
        path: "{{ deploy_base_dir | default('/opt') }}/core"
        state: directory
        mode: '0750'

    - name: Check if docker-compose.yml changes
      ansible.builtin.copy:
        src: "/tmp/core-template-render/core/docker-compose.yml"
        dest: "{{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml"
        mode: '0640'
      check_mode: true
      register: compose_diff

    - name: Check if stack is currently running
      ansible.builtin.command:
        cmd: "docker compose -f {{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml ps -q"
      register: compose_ps
      changed_when: false
      failed_when: false

    - name: Set stack_dropped fact
      ansible.builtin.set_fact:
        stack_dropped: false

    - name: Drop stack (if compose values change)
      ansible.builtin.command:
        cmd: "docker compose -f {{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml down -v"
      when: 
        - compose_diff.changed
        - compose_ps.stdout != ""
      register: drop_changed

    - name: Set stack_dropped fact to true if dropped
      ansible.builtin.set_fact:
        stack_dropped: true
      when: drop_changed.changed

- import_playbook: 04-target-file-structure.yml

- name: Section UPGRADE - Final Stack Spin Up
  hosts: "{{ target_host }}"
  become: true
  tasks:
    - name: Check if stack is currently running
      ansible.builtin.command:
        cmd: "docker compose -f {{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml ps -q"
      register: compose_ps_final
      changed_when: false
      failed_when: false

    - name: Drop stack (if not already dropped)
      ansible.builtin.command:
        cmd: "docker compose -f {{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml down -v"
      when: 
        - not stack_dropped | default(false) | bool
        - compose_ps_final.stdout != ""

    - name: Compose the upgraded stack
      ansible.builtin.command:
        cmd: "docker compose -f {{ deploy_base_dir | default('/opt') }}/core/docker-compose.yml up -d"
