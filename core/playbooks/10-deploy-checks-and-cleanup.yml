---
# Section 10 — Deploy Checks and Cleanup
#
# Runs integration checks against the running services:
#   - DNS resolution via dig from the host
#   - nginx HTTP reachability
#   - nginx HTTPS + TLS chain verification via curl for each service cert
#   - CA certificate download verification
#   - LDAP validation checks (super_admin and group_admin)
#   - 30-second log export for each service
#
# By default the stack is brought down after checks pass.
# Pass -e start=true to leave the stack running.
#
- name: Section 10 - Deploy Checks and Cleanup
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml
    - "{{ playbook_dir }}/../../core-secrets.yml"

  tasks:
    - name: Section 10 - Deploy Checks and Cleanup
      tags: [verify, deploy-checks, cleanup]
      block:
        # ----------------------------------------------------------------
        # 10a — DNS checks from host
        # ----------------------------------------------------------------
        - name: Check DNS resolution for certificates hostname
          ansible.builtin.shell:
            cmd: >
              dig +short A {{ hostname_landing }} @{{ host_ip }} -p {{ bind_dns_port | default(53) }} | grep -q "{{ host_ip }}"
          register: dns_certificates
          changed_when: false
          failed_when: dns_certificates.rc != 0

        - name: Check DNS resolution for ns hostname
          ansible.builtin.shell:
            cmd: >
              dig +short A ns.{{ domain }} @{{ host_ip }} -p {{ bind_dns_port | default(53) }} | grep -q "{{ host_ip }}"
          register: dns_ns
          changed_when: false
          failed_when: dns_ns.rc != 0

        - name: Check DNS records from dns variable
          ansible.builtin.shell:
            cmd: >
              dig +short A {{ item.name }}.{{ domain }} @{{ host_ip }} -p {{ bind_dns_port | default(53) }} | grep -q "{{ item.ip }}"
          register: dns_records
          changed_when: false
          failed_when: false
          loop: "{{ dns[domain].A | default([]) }}"
          loop_control:
            label: "{{ item.name }}.{{ domain }}"

        # ----------------------------------------------------------------
        # 10b — nginx HTTP check
        # ----------------------------------------------------------------
        - name: Check nginx HTTP redirects
          ansible.builtin.uri:
            url: "http://{{ host_ip }}/"
            follow_redirects: none
            validate_certs: false
            status_code: [200, 301, 302]
          register: nginx_http
          changed_when: false

        # ----------------------------------------------------------------
        # 10c — TLS certificate verification via curl
        # ----------------------------------------------------------------
        - name: Verify TLS certificate chain for nginx service vhosts via curl
          ansible.builtin.shell:
            cmd: >
              curl --silent --max-time 10
              --cacert {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              --resolve {{ item.cn }}:{{ item.port }}:{{ ip_nginx }}
              {{ item.scheme }}://{{ item.cn }}:{{ item.port }}/
              -o /dev/null
              -w "{{ item.scheme }} output — TLS Checked — %{url_effective}\n"
          register: curl_tls_check
          changed_when: false
          failed_when: curl_tls_check.rc in [35, 51, 60] or (item.scheme == 'https' and curl_tls_check.rc != 0)
          loop:
            - { cn: "{{ hostname_bind9 }}", port: 443, scheme: "https" }
            - { cn: "{{ hostname_ldap }}", port: 636, scheme: "ldaps" }
            - { cn: "{{ hostname_stepca }}", port: 443, scheme: "https" }
            - { cn: "{{ hostname_landing }}", port: 443, scheme: "https" }
          loop_control:
            label: "{{ item.cn }}"

        - name: Report TLS verification results
          ansible.builtin.debug:
            msg: "{{ item.stdout }}"
          loop: "{{ curl_tls_check.results }}"
          loop_control:
            label: "{{ item.item.cn }}"

        # ----------------------------------------------------------------
        # 10d — CA PKI page reachability via curl
        # ----------------------------------------------------------------
        - name: Check nginx PKI page via HTTPS (using root CA)
          ansible.builtin.shell:
            cmd: >
              curl --silent --fail --max-time 10
              --cacert {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              --resolve {{ hostname_landing }}:443:{{ ip_nginx }}
              https://{{ hostname_landing }}/
              -o /dev/null
              -w "HTTP %{http_code} — PKI page OK\n"
          register: pki_page
          changed_when: false
          failed_when: pki_page.rc != 0

        # ----------------------------------------------------------------
        # 10e — Export 30-second service logs
        # ----------------------------------------------------------------
        - name: Ensure log export directory exists
          ansible.builtin.file:
            path: /tmp/core-deploy-logs
            state: directory
            mode: '0750'

        - name: Export 30 seconds of logs for each service
          ansible.builtin.shell:
            cmd: "docker logs --since 30s {{ item }} > /tmp/core-deploy-logs/{{ item }}.log 2>&1 || true"
          loop: "{{ project_containers }}"
          loop_control:
            label: "{{ item }}"
          changed_when: false

        - name: Report log file locations
          ansible.builtin.debug:
            msg: "Service logs exported to /tmp/core-deploy-logs/"

        # ----------------------------------------------------------------
        # 10f — Validate LDAP Deployment
        # ----------------------------------------------------------------
        - name: Wait for OpenLDAP container to be healthy
          when: install_ldap | default(false) | bool
          ansible.builtin.command:
            cmd: "docker inspect --format='{{ '{{' }}.State.Health.Status{{ '}}' }}' openldap"
          register: ldap_health
          until: ldap_health.stdout == 'healthy'
          retries: 12
          delay: 5
          changed_when: false

        - name: Query LDAP as super_admin to verify privileges and existence
          when: install_ldap | default(false) | bool
          ansible.builtin.command:
            cmd: >
              docker exec openldap ldapwhoami -x
              -D "cn=super_admin,ou=admins,ou=accounts,{{ ldap_base_dn }}"
              -w "initialpassword123"
              -H ldapi:///
          register: ldap_query_super_admin
          changed_when: false
          failed_when: "'dn:cn=super_admin' not in ldap_query_super_admin.stdout"

        - name: Query LDAP as group_admin to verify privileges and existence
          when: install_ldap | default(false) | bool
          ansible.builtin.command:
            cmd: >
              docker exec openldap ldapwhoami -x
              -D "cn=group_admin,ou=admins,ou=accounts,{{ ldap_base_dn }}"
              -w "initialpassword123"
              -H ldapi:///
          register: ldap_query_group_admin
          changed_when: false
          failed_when: "'dn:cn=group_admin' not in ldap_query_group_admin.stdout"

        # ----------------------------------------------------------------
        # 10g — Cleanup and Teardown
        # ----------------------------------------------------------------
        - name: Set deploy_checks_passed fact
          ansible.builtin.set_fact:
            deploy_checks_passed: true

        - name: Bring down stack via systemd
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
          loop:
            - nginx
            - keycloak
            - postgres
            - ldap
            - stepca
            - bind9
          ignore_errors: true
          when: (no_start | default(false) | bool)

        - name: Report running containers
          ansible.builtin.shell:
            cmd: >
              docker ps --filter "label=com.docker.compose.project=core"
              --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
          register: running_containers
          changed_when: false
          when: not (no_start | default(false) | bool)

        - name: Show running containers
          ansible.builtin.debug:
            msg: "{{ running_containers.stdout_lines }}"
          when: not (no_start | default(false) | bool)

        - name: Remove /tmp/core-template-render from controller
          ansible.builtin.file:
            path: /tmp/core-template-render
            state: absent
          delegate_to: localhost
          when: deploy_checks_passed | default(false) | bool
