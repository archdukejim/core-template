---
# Section 1 — Generate Vars and Render Jinja2
#
# Runs entirely on the controller (localhost).
# 1. Generates secrets that must exist BEFORE Jinja2 rendering.
# 2. Renders vars.yaml.j2 → /tmp/core-template-render/vars.yaml and reloads it
# 3. Renders every service config template into /tmp/core-template-render,
#    mirroring the deployment directory structure.
#
# Secrets are stored in core-secrets.yml at the repo root (git-ignored).
# On subsequent runs, existing secrets are preserved — never rotated.
#
# Replaces: 01-handle-vars.yml and 02-render-jinja.yml
- name: Section 1 - Generate Vars and Render Jinja2
  hosts: "{{ target_host }}"
  become: false
  gather_facts: false
  vars_files:
    - "{{ custom_vars_path | default(playbook_dir ~ '/../../custom-vars.yaml') }}"

  tasks:
    - name: Section 1 - Pre-generate secrets for rendering
      tags: [always, handle-vars]
      block:
        # ----------------------------------------------------------------
        # Certificate path validation — fail early with a clear message
        # ----------------------------------------------------------------
        - name: Fail if ca_crt_path is not configured
          ansible.builtin.fail:
            msg: |
              ca_crt_path is required when byoc is enabled.
              Please provide it by setting the variable in custom-vars.yaml:
              
                ca_crt_path: /path/to/root_ca.crt
                
              Or pass it as a flag to setup.sh:
                sudo ./setup.sh --byoc --ca-crt /path/to/root_ca.crt
          when: (byoc | default(false) | bool) and (ca_crt_path is not defined or ca_crt_path | string | trim | length == 0)
          delegate_to: localhost

        - name: Fail if ica_crt_path is not configured
          ansible.builtin.fail:
            msg: |
              ica_crt_path is required when byoc is enabled.
              Please provide it by setting the variable in custom-vars.yaml:
              
                ica_crt_path: /path/to/intermediate_ca.crt
                
              Or pass it as a flag to setup.sh:
                sudo ./setup.sh --byoc --ica-crt /path/to/intermediate_ca.crt
          when: (byoc | default(false) | bool) and (ica_crt_path is not defined or ica_crt_path | string | trim | length == 0)
          delegate_to: localhost

        - name: Check if root CA cert file exists
          ansible.builtin.stat:
            path: "{{ ca_crt_path }}"
          register: root_cert_stat
          delegate_to: localhost
          become: false
          when: byoc | default(false) | bool

        - name: Check intermediate CA certificate file exists
          ansible.builtin.stat:
            path: "{{ ica_crt_path }}"
          register: int_cert_stat
          delegate_to: localhost
          when: byoc | default(false) | bool

        - name: Fail if certificates do not exist
          ansible.builtin.fail:
            msg: |
              Missing PKI artifacts!
              {% if not root_cert_stat.stat.exists %}File not found: {{ ca_crt_path }}
              {% endif %}{% if not int_cert_stat.stat.exists %}File not found: {{ ica_crt_path }}
              {% endif %}Please provide the correct paths in 
              custom-vars.yaml or pass --ca-crt / --ica-crt to setup.sh.
          when: >
            (byoc | default(false) | bool) and
            (not root_cert_stat.stat.exists or not int_cert_stat.stat.exists)
          delegate_to: localhost

        # ----------------------------------------------------------------
        # Secrets
        # ----------------------------------------------------------------
        - name: Set secrets file path
          ansible.builtin.set_fact:
            secrets_file: "{{ secrets_file_override | default(playbook_dir ~ '/../../core-secrets.yml') }}"

        - name: Check if core-secrets.yml exists
          ansible.builtin.stat:
            path: "{{ secrets_file }}"
          register: secrets_stat
          delegate_to: localhost

        - name: Load existing secrets
          ansible.builtin.include_vars:
            file: "{{ secrets_file }}"
          when: secrets_stat.stat.exists
          delegate_to: localhost

        # ----------------------------------------------------------------
        # CA password
        # ----------------------------------------------------------------
        - name: Generate CA password if missing
          ansible.builtin.shell:
            cmd: openssl rand -base64 32 | tr -d '\n'
          register: generated_ca_password
          changed_when: false
          when: ca_password is not defined
          delegate_to: localhost

        - name: Set CA password fact
          ansible.builtin.set_fact:
            ca_password: "{{ generated_ca_password.stdout }}"
          when: ca_password is not defined

        - name: Generate rndc secret
          ansible.builtin.shell:
            cmd: openssl rand -base64 32 | tr -d '\n'
          register: generated_rndc_secret
          changed_when: false
          when: rndc_secret is not defined
          delegate_to: localhost

        - name: Set rndc secret fact
          ansible.builtin.set_fact:
            rndc_secret: "{{ generated_rndc_secret.stdout }}"
          when: rndc_secret is not defined

        - name: Generate LDAP admin password if missing
          ansible.builtin.shell:
            cmd: openssl rand -base64 24 | tr -d '\n'
          register: generated_ldap_admin_password
          changed_when: false
          when: ldap_admin_password is not defined
          delegate_to: localhost

        - name: Set LDAP admin password fact
          ansible.builtin.set_fact:
            ldap_admin_password: "{{ generated_ldap_admin_password.stdout }}"
          when: ldap_admin_password is not defined

        - name: Generate LDAP Keycloak password if missing
          ansible.builtin.shell:
            cmd: openssl rand -base64 24 | tr -d '\n'
          register: generated_ldap_keycloak_password
          changed_when: false
          when: ldap_keycloak_password is not defined
          delegate_to: localhost

        - name: Set LDAP Keycloak password fact
          ansible.builtin.set_fact:
            ldap_keycloak_password: "{{ generated_ldap_keycloak_password.stdout }}"
          when: ldap_keycloak_password is not defined

        # ----------------------------------------------------------------
        # Keycloak Secrets
        # ----------------------------------------------------------------
        - name: Set Keycloak Admin User if missing
          ansible.builtin.set_fact:
            keycloak_admin_user: "admin"
          when: keycloak_admin_user is not defined

        - name: Generate Keycloak Admin Password if missing
          ansible.builtin.shell:
            cmd: openssl rand -base64 24 | tr -d '\n'
          register: generated_kc_admin_password
          changed_when: false
          when: keycloak_admin_password is not defined
          delegate_to: localhost

        - name: Set Keycloak Admin Password fact
          ansible.builtin.set_fact:
            keycloak_admin_password: "{{ generated_kc_admin_password.stdout }}"
          when: keycloak_admin_password is not defined

        - name: Generate Keycloak DB Password if missing
          ansible.builtin.shell:
            cmd: openssl rand -base64 32 | tr -d '\n'
          register: generated_kc_db_password
          changed_when: false
          when: keycloak_db_password is not defined
          delegate_to: localhost

        - name: Set Keycloak DB Password fact
          ansible.builtin.set_fact:
            keycloak_db_password: "{{ generated_kc_db_password.stdout }}"
          when: keycloak_db_password is not defined

        # ----------------------------------------------------------------
        # TSIG secrets — one per key in tsig_keys[]
        # ----------------------------------------------------------------
        - name: Initialise tsig_secrets dict if absent
          ansible.builtin.set_fact:
            tsig_secrets: "{{ tsig_secrets | default({}) }}"

        - name: Generate missing TSIG secrets
          ansible.builtin.shell:
            cmd: openssl rand -base64 32 | tr -d '\n'
          register: _tsig_gen
          changed_when: false
          when: item.name not in (tsig_secrets | default({}))
          loop: "{{ tsig_keys | default([]) }}"
          loop_control:
            label: "{{ item.name }}"
          delegate_to: localhost

        - name: Merge new TSIG secrets into dict
          ansible.builtin.set_fact:
            tsig_secrets: >-
              {{
                tsig_secrets | combine(
                  { item.item.name: item.stdout }
                )
              }}
          loop: "{{ _tsig_gen.results }}"
          loop_control:
            label: "{{ item.item.name }}"
          when: not item.skipped | default(false)

        # ----------------------------------------------------------------
        # Write / update core-secrets.yml
        # ----------------------------------------------------------------
        - name: Write core-secrets.yml
          ansible.builtin.copy:
            dest: "{{ secrets_file }}"
            content: |
              # core-secrets.yml — AUTO-GENERATED. DO NOT COMMIT.
              # Secrets are stable across runs; delete this file only to rotate all credentials.
              ca_password: "{{ ca_password }}"
              rndc_secret: "{{ rndc_secret }}"
              ldap_admin_password: "{{ ldap_admin_password }}"
              ldap_keycloak_password: "{{ ldap_keycloak_password }}"
              keycloak_admin_user: "{{ keycloak_admin_user }}"
              keycloak_admin_password: "{{ keycloak_admin_password }}"
              keycloak_db_password: "{{ keycloak_db_password }}"
              tsig_secrets:
              {% for key in tsig_keys | default([]) %}
                {{ key.name }}: "{{ tsig_secrets[key.name] }}"
              {% endfor %}
            mode: '0600'
          delegate_to: localhost
    - name: Section 2 - Render vars and all service Jinja2 templates
      tags: [always, render-jinja]
      block:

        # ----------------------------------------------------------------
        # 2a — Vars: fetch old, render fresh, and merge
        # ----------------------------------------------------------------
        - name: Ensure /tmp/core-template-render exists
          ansible.builtin.file:
            path: "/tmp/core-template-render"
            state: directory
            mode: '0755'
          delegate_to: localhost

        - name: Check if existing vars.yaml exists on target
          ansible.builtin.stat:
            path: "{{ deploy_base_dir | default('/opt') }}/core/config/vars.yaml"
          register: old_vars_stat
          delegate_to: "{{ target_host }}"
          become: true

        - name: Fetch existing vars.yaml from target
          ansible.builtin.slurp:
            src: "{{ old_vars_stat.stat.path }}"
          register: old_vars_b64
          failed_when: false
          delegate_to: "{{ target_host }}"
          become: true
          when: old_vars_stat.stat.exists

        - name: Render fresh vars.yaml.j2 locally for merge/initial
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/vars.yaml.j2"
            dest: "/tmp/core-template-render/fresh-vars.yaml"
            mode: '0600'
          delegate_to: localhost

        - name: Set is_upgrade fact
          ansible.builtin.set_fact:
            is_upgrade: "{{ old_vars_stat.stat.exists }}"

        - name: Handle Upgrade/Merge Vars
          when: is_upgrade
          block:
            - name: Ensure archive directory exists on target
              ansible.builtin.file:
                path: "{{ deploy_base_dir | default('/opt') }}/core/archive"
                state: directory
                mode: '0750'
              delegate_to: "{{ target_host }}"
              become: true

            - name: Archive existing vars.yaml
              ansible.builtin.copy:
                content: "{{ old_vars_b64.content | b64decode }}"
                dest: "{{ deploy_base_dir | default('/opt') }}/core/archive/{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}-vars.yaml"
                mode: '0640'
                owner: root
              delegate_to: "{{ target_host }}"
              become: true

            - name: Read fresh vars into memory
              ansible.builtin.include_vars:
                file: "/tmp/core-template-render/fresh-vars.yaml"
                name: fresh_vars

            - name: Parse old vars
              ansible.builtin.set_fact:
                old_vars: "{{ old_vars_b64.content | b64decode | from_yaml }}"

            - name: Clean up legacy domain key in old_vars dns
              ansible.builtin.set_fact:
                old_vars: >-
                  {%- set _old = old_vars -%}
                  {%- set _dns = _old.dns | default({}) -%}
                  {%- if fresh_vars.domain is defined and fresh_vars.domain in _dns and fresh_vars.dns is defined and 'dynamic_zone_var' in fresh_vars.dns -%}
                    {%- set _legacy = _dns.pop(fresh_vars.domain) -%}
                    {%- set _dyn = _dns.get('dynamic_zone_var', {}) -%}
                    {%- for record_type in ['A', 'AAAA', 'CNAME', 'MX', 'TXT', 'SRV'] -%}
                      {%- if record_type in _legacy -%}
                        {%- set _ = _dyn.update({record_type: (_dyn.get(record_type, []) + _legacy[record_type]) | unique | list}) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if 'zone_authority' in _legacy -%}
                      {%- set _ = _dyn.update({'zone_authority': _legacy.zone_authority}) -%}
                    {%- endif -%}
                    {%- set _ = _dns.update({'dynamic_zone_var': _dyn}) -%}
                  {%- endif -%}
                  {%- set _ = _old.update({'dns': _dns}) -%}
                  {{ _old }}

            - name: Extract image variables from fresh vars
              ansible.builtin.set_fact:
                fresh_images: "{{ fresh_vars | dict2items | selectattr('key', 'match', '^image_.*') | list | items2dict }}"

            - name: Merge vars giving old vars priority but taking images from fresh vars
              ansible.builtin.set_fact:
                merged_vars: "{{ fresh_vars | combine(old_vars, recursive=True) | combine(fresh_images) }}"

            - name: Write merged vars to /tmp/core-template-render/vars.yaml
              ansible.builtin.copy:
                content: "{{ merged_vars | to_nice_yaml }}"
                dest: "/tmp/core-template-render/vars.yaml"
                mode: '0600'
              delegate_to: localhost

        - name: Handle Fresh Install Vars
          when: not is_upgrade
          ansible.builtin.copy:
            src: "/tmp/core-template-render/fresh-vars.yaml"
            dest: "/tmp/core-template-render/vars.yaml"
            mode: '0600'
          delegate_to: localhost

        - name: Re-read resolved vars into play
          ansible.builtin.include_vars:
            file: "/tmp/core-template-render/vars.yaml"

        - name: Validate host_ram_capacity minimum threshold
          ansible.builtin.fail:
            msg: "Installation aborted. host_ram_capacity is set to {{ host_ram_capacity }}. The absolute minimum is 3GB to safely run Keycloak and Postgres. Set it to 0 for unlimited, or >= 3."
          when: host_ram_capacity | default(0) | int > 0 and host_ram_capacity | default(0) | int < 3

        # ----------------------------------------------------------------
        # 2b — Prepare render tmp directory tree
        # ----------------------------------------------------------------
        - name: Ensure render tmp subdirectories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "/tmp/core-template-render/nginx"
            - "/tmp/core-template-render/nginx/www/certificates"
            - "/tmp/core-template-render/nginx/www/landing"
            - "/tmp/core-template-render/nginx/www/manual"
            - "/tmp/core-template-render/nginx/www/shared"
            - "/tmp/core-template-render/core"
            - "/tmp/core-template-render/bind9"
            - "/tmp/core-template-render/bind9/config"
            - "/tmp/core-template-render/bind9/data"
            - "/tmp/core-template-render/openldap"
            - "/tmp/core-template-render/stepca"
            - "/tmp/core-template-render/stepca/templates/certs"
            - "/tmp/core-template-render/keycloak"
            - "/tmp/core-template-render/postgres"
            - "/tmp/core-template-render/docs"
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 2c - Removed
        # ----------------------------------------------------------------

        # ----------------------------------------------------------------
        # 2d — nginx
        # ----------------------------------------------------------------
        - name: Render nginx.conf
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/nginx.conf.j2"
            dest: "/tmp/core-template-render/nginx/nginx.conf"
            mode: '0640'
          delegate_to: localhost

        - name: Render bind9.conf
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/bind9.conf.j2"
            dest: "/tmp/core-template-render/nginx/bind9.conf"
            mode: '0640'
          delegate_to: localhost

        - name: Render nginx PKI info page
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/index.html.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/index.html"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx landing page
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/landing/index.html.j2"
            dest: "/tmp/core-template-render/nginx/www/landing/index.html"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx manual page
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/manual/index.html.j2"
            dest: "/tmp/core-template-render/nginx/www/manual/index.html"
            mode: '0644'
          delegate_to: localhost

        - name: Copy nginx shared style.css
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../jinja/nginx/www/shared/style.css"
            dest: "/tmp/core-template-render/nginx/www/shared/style.css"
            mode: '0644'
          delegate_to: localhost

        - name: Copy nginx manual marked.min.js
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../jinja/nginx/www/manual/marked.min.js"
            dest: "/tmp/core-template-render/nginx/www/manual/marked.min.js"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx PKI install script
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/install-certs.sh.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/install-certs-{{ domain_file }}.sh"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx PKI firefox script
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/install-firefox-ubuntu.sh.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/install-firefox-{{ domain_file }}.sh"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx PKI chrome script
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/install-chrome-ubuntu.sh.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/install-chrome-{{ domain_file }}.sh"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx PKI all wrapper script
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/install-all-ubuntu.sh.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/install-all-{{ domain_file }}.sh"
            mode: '0644'
          delegate_to: localhost

        - name: Render nginx PKI python script
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/www/certificates/install-python-ubuntu.sh.j2"
            dest: "/tmp/core-template-render/nginx/www/certificates/install-python-{{ domain_file }}.sh"
            mode: '0644'
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 2e — Core (docker-compose)
        # ----------------------------------------------------------------
        - name: Render separate docker-compose.yml templates
          tags: [add-ldap]
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/{{ item }}/docker-compose.yml.j2"
            dest: "/tmp/core-template-render/{{ item }}/docker-compose.yml"
            mode: '0640'
          loop:
            - nginx
            - bind9
            - stepca
            - openldap
            - keycloak
            - postgres
          when: >
            (item not in ['postgres', 'keycloak'] or (install_keycloak | default(false) | bool)) and
            (item != 'openldap' or (install_ldap | default(false) | bool))
          delegate_to: localhost



        # ----------------------------------------------------------------
        # 2f — BIND9 config
        # ----------------------------------------------------------------
        - name: Render BIND9 config templates
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/config/{{ item }}.j2"
            dest: "/tmp/core-template-render/bind9/config/{{ item }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones
          delegate_to: localhost

        - name: Render BIND9 keys config (with real secrets from core-secrets.yml)
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/config/named.conf.keys.j2"
            dest: "/tmp/core-template-render/bind9/config/named.conf.keys"
            mode: '0600'
          delegate_to: localhost

        - name: Render BIND9 command keys config (rndc)
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/config/rndc.key.j2"
            dest: "/tmp/core-template-render/bind9/config/rndc.key"
            mode: '0600'
          delegate_to: localhost

        - name: Render BIND9 zone data files
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/data/zone.j2"
            dest: "/tmp/core-template-render/bind9/data/db.{{ domain if item.key == 'dynamic_zone_var' else item.key }}"
            mode: '0640'
          vars:
            zone_name: "{{ domain if item.key == 'dynamic_zone_var' else item.key }}"
            zone_records: "{{ item.value }}"
          loop: "{{ dns | dict2items }}"
          loop_control:
            label: "{{ item.key }}"
          delegate_to: localhost

        - name: Render BIND9 reverse zone files
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/data/reverse-zone.j2"
            dest: "/tmp/core-template-render/bind9/data/db.{{ item }}"
            mode: '0640'
          vars:
            reverse_zone_name: "{{ item }}"
          loop: "{{ reverse_zone_names }}"
          loop_control:
            label: "{{ item }}"
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 2g — OpenLDAP
        # ----------------------------------------------------------------
        - name: Render OpenLDAP templates
          tags: [add-ldap]
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/openldap/{{ item }}"
            dest: "/tmp/core-template-render/openldap/{{ item | regex_replace('\\.j2$', '') }}"
            mode: '0640'
          loop:
            - 02-ous.ldif.j2
            - 03-groups.ldif.j2
            - 05-admins.ldif.j2
            - 06-acl.ldif.j2
          delegate_to: localhost
          when: install_ldap | default(false) | bool

        # ----------------------------------------------------------------
        # 2h — Step-CA certificate templates
        # ----------------------------------------------------------------
        - name: Render Step-CA leaf certificate template
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/stepca/leaf.tpl.j2"
            dest: "/tmp/core-template-render/stepca/templates/certs/leaf.tpl"
            mode: '0640'
          delegate_to: localhost

        - name: Render Step-CA subordinate CA certificate template
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/stepca/subca.tpl.j2"
            dest: "/tmp/core-template-render/stepca/templates/certs/subca.tpl"
            mode: '0640'
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 2i — RFC2136 INI files for non-primary TSIG keys
        # ----------------------------------------------------------------
        - name: Ensure RFC2136 output directories exist in render tmp
          ansible.builtin.file:
            path: "/tmp/core-template-render/rfc2136/{{ item.name }}"
            state: directory
            mode: '0700'
          loop: "{{ tsig_keys | default([]) | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | default([]) | rejectattr('primary', 'defined') | list | length > 0
          delegate_to: localhost

        - name: Render RFC2136 INI credentials for non-primary TSIG keys
          ansible.builtin.copy:
            dest: "/tmp/core-template-render/rfc2136/{{ item.name }}/rfc2136.ini"
            content: |
              # RFC2136 credentials for TSIG key: {{ item.name }}
              # Generated by core-template — do not edit manually.
              dns_rfc2136_server = {{ ip_bind9 }}
              dns_rfc2136_port = {{ bind_dns_port }}
              dns_rfc2136_name = {{ item.name }}
              dns_rfc2136_secret = {{ tsig_secrets[item.name] }}
              dns_rfc2136_algorithm = HMAC-SHA256
              dns_rfc2136_base_domain = {{ item.domain | default(domain) }}
            mode: '0600'
          loop: "{{ tsig_keys | default([]) | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          when: tsig_keys | default([]) | rejectattr('primary', 'defined') | list | length > 0
          delegate_to: localhost
