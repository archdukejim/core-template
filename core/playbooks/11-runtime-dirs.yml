---
- name: Section 11 - Service Runtime Directories
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  pre_tasks:
    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ repo_source }}/.internal/vars.yaml"


  tasks:
    - name: Section 11 - Service Runtime Directories
      tags: [files]
      block:
        - name: Ensure BIND9 writable directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0750'
          loop:
            - "{{ deploy_base_dir }}/bind9/data"
            - "{{ deploy_base_dir }}/bind9/log"
            - "{{ deploy_base_dir }}/bind9/cache"
