---
# Section 1 — Vars Resolution and Jinja2 Rendering
#
# Runs entirely on the controller (localhost).
# 1. Loads custom-vars.yaml + advanced-vars.yaml
# 2. Renders vars.yaml.j2 → deploy_base_dir/vars.yaml and reloads it
# 3. Renders every service config template into /tmp/core-template-render,
#    mirroring the deployment directory structure.
# 02-file-structure.yml copies the rendered outputs from there to the target.
- name: Section 1 - Vars Resolution and Jinja2 Rendering
  hosts: "{{ target_host }}"
  become: false
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  tasks:
    - name: Section 1 - Render vars and all service Jinja2 templates
      tags: [always, render-jinja]
      block:

        # ----------------------------------------------------------------
        # 1a — Vars: render and reload
        # ----------------------------------------------------------------
        - name: Render merged vars to /tmp/core-template-render/vars.yaml
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/vars.yaml.j2"
            dest: "/tmp/core-template-render/vars.yaml"
            mode: '0600'
          delegate_to: localhost

        - name: Re-read resolved vars into play
          ansible.builtin.include_vars:
            file: "/tmp/core-template-render/vars.yaml"

        # ----------------------------------------------------------------
        # 1b — Prepare render tmp directory tree
        # ----------------------------------------------------------------
        - name: Ensure render tmp subdirectories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "/tmp/core-template-render/easyrsa"
            - "/tmp/core-template-render/nginx/pki"
            - "/tmp/core-template-render/core"
            - "/tmp/core-template-render/bind9/config"
            - "/tmp/core-template-render/bind9/data"
            - "/tmp/core-template-render/openldap"
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 1c — EasyRSA
        # ----------------------------------------------------------------
        - name: Render sign-certs.sh
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/easyrsa/sign-certs.sh.j2"
            dest: "/tmp/core-template-render/easyrsa/sign-certs.sh"
            mode: '0750'
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 1d — nginx
        # ----------------------------------------------------------------
        - name: Render nginx.conf
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/nginx.conf.j2"
            dest: "/tmp/core-template-render/nginx/nginx.conf"
            mode: '0640'
          delegate_to: localhost

        - name: Render nginx PKI info page
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/nginx/pki/index.html.j2"
            dest: "/tmp/core-template-render/nginx/pki/index.html"
            mode: '0644'
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 1e — Core (docker-compose)
        # ----------------------------------------------------------------
        - name: Render docker-compose.yml
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/docker-compose.yml.j2"
            dest: "/tmp/core-template-render/core/docker-compose.yml"
            mode: '0640'
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 1f — BIND9 config
        # ----------------------------------------------------------------
        - name: Render BIND9 config templates
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/config/{{ item }}.j2"
            dest: "/tmp/core-template-render/bind9/config/{{ item }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones
          delegate_to: localhost

        - name: Render BIND9 keys config
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/config/named.conf.keys.j2"
            dest: "/tmp/core-template-render/bind9/config/named.conf.keys"
            mode: '0600'
          delegate_to: localhost

        - name: Render BIND9 zone data files
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/bind9/data/zone.j2"
            dest: "/tmp/core-template-render/bind9/data/db.{{ item.key }}"
            mode: '0640'
          vars:
            zone_name: "{{ item.key }}"
            zone_records: "{{ item.value }}"
          loop: "{{ dns | dict2items }}"
          loop_control:
            label: "{{ item.key }}"
          delegate_to: localhost

        # ----------------------------------------------------------------
        # 1g — OpenLDAP
        # ----------------------------------------------------------------
        - name: Render OpenLDAP templates
          ansible.builtin.template:
            src: "{{ playbook_dir }}/../jinja/openldap/{{ item }}.j2"
            dest: "/tmp/core-template-render/openldap/{{ item }}"
            mode: '0640'
          loop:
            - base.ldif
            - ous.ldif
            - groups.ldif
            - acl.ldif
          delegate_to: localhost
