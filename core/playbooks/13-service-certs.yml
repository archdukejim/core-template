---
- name: Section 13 - Service Certificate Issuance
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  pre_tasks:
    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ repo_source }}/.internal/vars.yaml"


  tasks:
    - name: Section 13 - Service Certificate Issuance
      tags: [pki, bootstrap]
      block:
        - name: Start BIND9 and Step-CA for bootstrap
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} up -d bind9 step-ca"

        - name: Wait for BIND9 and Step-CA to become healthy
          ansible.builtin.shell:
            cmd: >
              test "$(docker inspect -f '{{ '{{' }}.State.Health.Status{{ '}}' }}' bind9)" = "healthy" &&
              test "$(docker inspect -f '{{ '{{' }}.State.Health.Status{{ '}}' }}' step-ca)" = "healthy"
          register: health_check
          until: health_check.rc == 0
          retries: 30
          delay: 5
          changed_when: false

        - name: Verify BIND9 zone file syntax
          ansible.builtin.command:
            cmd: docker exec -u {{ service_users.bind.uid }} bind9 named-checkzone {{ item }} /var/lib/bind/db.{{ item }}
          register: bind9_zone_check
          changed_when: false
          loop: "{{ dns.keys() | list }}"
          loop_control:
            label: "{{ item }}"

        - name: Define service certificate targets
          ansible.builtin.set_fact:
            service_cert_targets:
              - { cn: "{{ hostname_bind9 }}", safe: "bind9_svc" }
              - { cn: "{{ hostname_ldap }}",  safe: "ldap_svc"  }
              - { cn: "{{ hostname_stepca }}", safe: "stepca_svc" }

        - name: Ensure nginx cert directories exist
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}"
            state: directory
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0750'
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        - name: Mint service TLS certificates offline
          community.docker.docker_container:
            name: "svc_cert_{{ item.safe }}"
            image: "{{ image_stepca }}"
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
            entrypoint: /usr/local/bin/step
            command: >
              certificate create "{{ item.cn }}"
              "/home/step/artifacts/{{ item.safe }}.crt"
              "/home/step/artifacts/{{ item.safe }}.key"
              --ca "/home/step/certs/intermediate_ca.crt"
              --ca-key "/home/step/secrets/intermediate_ca_key"
              --no-password --insecure --force
              --not-after {{ cert_service_days * 24 }}h
              --template /home/step/templates/certs/leaf.tpl
              --san {{ item.cn }}
            detach: false
            cleanup: true
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        - name: Install service certificates for nginx
          ansible.builtin.shell:
            cmd: |
              cat "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.crt" \
                  "{{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt" \
                  > "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
              mv "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.key" \
                 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              rm -f "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.crt"
              chown {{ service_users.nginx.uid }}:{{ service_users.nginx.gid }} \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem" \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 640 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 644 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
            executable: /bin/bash
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"
