---
# Section 7 — Validate LDAP Deployment
#
# Runs a validation test against the LDAP container to ensure it is up
# and responding to queries correctly.
- name: Section 7 - Validate LDAP Deployment
  hosts: "{{ target_host }}"
  become: false
  vars_files:
    - "/tmp/core-template-render/vars.yaml"

  tasks:
    - name: Wait for OpenLDAP container to be healthy
      ansible.builtin.command:
        cmd: "docker inspect --format='{{ '{{' }}.State.Health.Status{{ '}}' }}' openldap"
      register: ldap_health
      until: ldap_health.stdout == 'healthy'
      retries: 20
      delay: 5
      changed_when: false

    - name: Query LDAP as super_admin to verify privileges and existence
      ansible.builtin.command:
        cmd: >
          docker exec openldap ldapwhoami -x
          -D "cn=super_admin,ou=admins,ou=accounts,{{ ldap_base_dn }}"
          -w "initialpassword123"
          -H ldap://localhost:389
      register: ldap_query_super_admin
      changed_when: false
      failed_when: "'dn:cn=super_admin' not in ldap_query_super_admin.stdout"

    - name: Query LDAP as group_admin to verify privileges and existence
      ansible.builtin.command:
        cmd: >
          docker exec openldap ldapwhoami -x
          -D "cn=group_admin,ou=admins,ou=accounts,{{ ldap_base_dn }}"
          -w "initialpassword123"
          -H ldap://localhost:389
      register: ldap_query_group_admin
      changed_when: false
      failed_when: "'dn:cn=group_admin' not in ldap_query_group_admin.stdout"

    - name: Report successful validation
      ansible.builtin.debug:
        msg: "OpenLDAP has been successfully validated. Admins accounts are present."
