---
# Section 6 — Configure Step-CA
#
# Deploys pre-generated PKI artifacts (root CA cert, intermediate CA cert + key)
# from the local PKI output directory to the target, then initializes and
# configures step-ca to use them.
#
# Prerequisites:
#   Run './root-ca.sh init' before executing this playbook.
#   The root CA key is NOT deployed and NOT required by the installer.
#
# PKI artifact paths:
#   Set in custom-vars.yaml:
#     root_cert_path:         /path/to/root_ca.crt
#     intermediate_cert_path: /path/to/intermediate_ca.crt
#   Or pass to setup.sh: --root-cert <path> --intermediate-cert <path>
#
#   intermediate_ca.key is derived from the same directory as intermediate_cert_path.
#   Override with: -e intermediate_key_path=/path/to/intermediate_ca.key
#
# Replaces: 06-build-root-ca.yml + 07-configure-stepca.yml
- name: Section 6 - Configure Step-CA
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml
  vars:
    # Intermediate key is expected alongside the intermediate cert (same directory,
    # named intermediate_ca.key). Override with -e intermediate_key_path=...
    intermediate_key_path: "{{ intermediate_cert_path | dirname }}/intermediate_ca.key"

  tasks:
    - name: Section 6 - Configure Step-CA
      tags: [pki, stepca]
      block:
        # ----------------------------------------------------------------
        # 6a — Assert PKI artifacts exist before doing anything
        # ----------------------------------------------------------------
        - name: Assert root CA certificate file exists
          ansible.builtin.stat:
            path: "{{ root_cert_path }}"
          register: pki_root_crt
          delegate_to: localhost
          become: false

        - name: Assert intermediate CA certificate file exists
          ansible.builtin.stat:
            path: "{{ intermediate_cert_path }}"
          register: pki_int_crt
          delegate_to: localhost
          become: false

        - name: Assert intermediate CA key file exists
          ansible.builtin.stat:
            path: "{{ intermediate_key_path }}"
          register: pki_int_key
          delegate_to: localhost
          become: false

        - name: Fail if any PKI artifact is missing
          ansible.builtin.fail:
            msg: |
              Missing PKI artifacts:
              {% if not pki_root_crt.stat.exists %}  - root cert:         {{ root_cert_path }}{% endif %}
              {% if not pki_int_crt.stat.exists %}  - intermediate cert: {{ intermediate_cert_path }}{% endif %}
              {% if not pki_int_key.stat.exists %}  - intermediate key:  {{ intermediate_key_path }}{% endif %}

              Run './root-ca.sh init' first, then set paths in custom-vars.yaml
              or pass --root-cert / --intermediate-cert to setup.sh.
          when: >
            not pki_root_crt.stat.exists or
            not pki_int_crt.stat.exists or
            not pki_int_key.stat.exists

        # ----------------------------------------------------------------
        # 6b — Write CA password (must exist before step ca init reads it)
        # ----------------------------------------------------------------
        - name: Write CA password from pre-generated secret
          ansible.builtin.copy:
            dest: "{{ deploy_base_dir }}/stepca/data/secrets/password"
            content: "{{ ca_password }}"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0600'

        # ----------------------------------------------------------------
        # 6c — Initialize Step-CA (creates ca.json and temporary certs)
        #
        # PKI artifacts are deployed AFTER init (section 6d) so that
        # step ca init starts with a clean data directory and can write
        # its own temporary certs without conflicting with our real chain.
        # Our certs overwrite step's generated ones once ca.json exists.
        # ----------------------------------------------------------------
        - name: Check if Step-CA is initialized
          ansible.builtin.stat:
            path: "{{ deploy_base_dir }}/stepca/data/config/ca.json"
          register: ca_json

        - name: Initialize Step-CA
          when: not ca_json.stat.exists
          block:
            - name: Run step ca init
              ansible.builtin.command:
                argv:
                  - docker
                  - run
                  - --rm
                  - -t
                  - -v
                  - "{{ deploy_base_dir }}/stepca/data:/home/step"
                  - -u
                  - "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
                  - --entrypoint
                  - /usr/local/bin/step
                  - "{{ image_stepca }}"
                  - ca
                  - init
                  - "--name={{ ca_name }}"
                  - "--dns={{ hostname_stepca }}"
                  - "--address=:{{ stepca_port }}"
                  - --provisioner=admin
                  - --password-file=/home/step/secrets/password
                  - --provisioner-password-file=/home/step/secrets/password
              changed_when: true

            - name: Verify step ca init created ca.json
              ansible.builtin.stat:
                path: "{{ deploy_base_dir }}/stepca/data/config/ca.json"
              register: ca_json_post_init

            - name: Fail if step ca init did not produce ca.json
              ansible.builtin.fail:
                msg: >
                  step ca init exited without error but ca.json was not created at
                  {{ deploy_base_dir }}/stepca/data/config/ca.json —
                  'script' may not be propagating the exit code on this system.
              when: not ca_json_post_init.stat.exists

        # ----------------------------------------------------------------
        # 6d — Deploy real PKI artifacts (overwrites step-generated certs)
        # ----------------------------------------------------------------
        - name: Deploy root CA certificate
          ansible.builtin.copy:
            src: "{{ root_cert_path }}"
            dest: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            owner: root
            group: root
            mode: '0644'

        - name: Deploy intermediate CA certificate
          ansible.builtin.copy:
            src: "{{ intermediate_cert_path }}"
            dest: "{{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0640'

        - name: Deploy intermediate CA private key
          ansible.builtin.copy:
            src: "{{ intermediate_key_path }}"
            dest: "{{ deploy_base_dir }}/stepca/data/secrets/intermediate_ca_key"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0600'

        # ----------------------------------------------------------------
        # 6e — Fix ownership before ca.json update
        # ----------------------------------------------------------------
        - name: Fix Step-CA data ownership
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        # ----------------------------------------------------------------
        # 6f — Update ca.json to use real root + intermediate certs
        # ----------------------------------------------------------------
        - name: Update ca.json certificate paths and dnsNames
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              cfg['root'] = '/home/step/certs/root_ca.crt'
              cfg['crt']  = '/home/step/certs/intermediate_ca.crt'
              cfg['key']  = '/home/step/secrets/intermediate_ca_key'
              cfg['dnsNames'] = ['{{ hostname_stepca }}']
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        - name: Set certificate lifetimes in ca.json
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              auth = cfg['authority']
              {% if stepca_cert_allow_subordinate_ca | bool %}
              auth.setdefault('claims', {})
              auth['claims']['maxTLSCertDuration'] = '{{ stepca_cert_max_lifetime_hours }}'
              {% endif %}
              for p in auth.get('provisioners', []):
                  if p.get('type') == 'ACME':
                      p.setdefault('claims', {})
                      p['claims']['defaultTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p['claims']['maxTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p.setdefault('options', {})
                      p['options']['x509'] = {
                          'templateFile': '/home/step/templates/certs/leaf.tpl'
                      }
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        # ----------------------------------------------------------------
        # 6g — Final ownership pass and chain verification
        # ----------------------------------------------------------------
        - name: Set Step-CA data ownership (final)
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        - name: Verify intermediate certificate chain
          ansible.builtin.command:
            cmd: >
              openssl verify -CAfile {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
          changed_when: false
