---
- name: Section 10d - Certificate Minting
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../custom-vars.yaml"
    - "{{ playbook_dir }}/../advanced-vars.yaml"

  pre_tasks:
    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ repo_source }}/.internal/vars.yaml"


  tasks:
    - name: Section 10d - Certificate Minting
      tags: [mint-certs]
      block:
        - name: Mint certificate
          ansible.builtin.shell: |
            set -euo pipefail
            STEPCA_DATA="{{ deploy_base_dir }}/stepca/data"
            STEPCA_IMAGE="{{ image_stepca }}"
            STEP_UID={{ service_users.step.uid }}
            STEP_GID={{ service_users.step.gid }}

            CN="{{ item.cn }}"
            DAYS="{{ item.days | default(365) }}"
            OUT_DIR="{{ item.out_dir | default('') }}"

            {% if item.is_ca | default(false) %}
            CERT_TEMPLATE="/home/step/templates/certs/subca.tpl"
            SAN_ARGS=()
            EXTRA_ARGS=("--set" "pathLen={{ item.path_len | default(0) }}")
            {% else %}
            CERT_TEMPLATE="/home/step/templates/certs/leaf.tpl"
            SAN_ARGS=("--san" "$CN")
            {% for san in item.sans | default([]) %}
            SAN_ARGS+=("--san" "{{ san }}")
            {% endfor %}
            EXTRA_ARGS=()
            {% endif %}

            [[ "$(id -u)" -eq 0 ]] || { echo "ERROR: must be run as root."; exit 1; }

            if [ -n "$OUT_DIR" ]; then
              TARGET_DIR="$OUT_DIR"
            elif [ -n "${SUDO_USER:-}" ]; then
              TARGET_DIR=$(getent passwd "$SUDO_USER" | cut -d: -f6)
            else
              TARGET_DIR="$HOME"
            fi

            [ -d "$TARGET_DIR" ] || { echo "ERROR: Output directory does not exist: $TARGET_DIR"; exit 1; }

            SAFE_CN=$(echo "$CN" | tr './ ' '---')
            KEY_OUT="${TARGET_DIR}/${SAFE_CN}.key"
            CRT_OUT="${TARGET_DIR}/${SAFE_CN}.crt"

            [ -f "${STEPCA_DATA}/certs/intermediate_ca.crt" ]  || { echo "ERROR: Intermediate CA cert not found."; exit 1; }
            [ -f "${STEPCA_DATA}/secrets/intermediate_ca_key" ] || { echo "ERROR: Intermediate CA key not found."; exit 1; }
            [ -f "$STEPCA_DATA/templates/certs/$(basename "$CERT_TEMPLATE")" ] \
              || { echo "ERROR: Template not found: $CERT_TEMPLATE. Run Ansible Section 8 first."; exit 1; }

            ARTIFACTS="${STEPCA_DATA}/artifacts"
            mkdir -p "$ARTIFACTS"
            chown "${STEP_UID}:${STEP_GID}" "$ARTIFACTS"

            echo "Generating certificate for ${CN} (validity: ${DAYS} days)..."
            docker run --rm \
              -v "${STEPCA_DATA}:/home/step" \
              --user "${STEP_UID}:${STEP_GID}" \
              --entrypoint /usr/local/bin/step \
              "$STEPCA_IMAGE" \
              certificate create "$CN" \
              /home/step/artifacts/leaf.crt /home/step/artifacts/leaf.key \
              --ca /home/step/certs/intermediate_ca.crt \
              --ca-key /home/step/secrets/intermediate_ca_key \
              --no-password --insecure --force \
              --not-after "$(( DAYS * 24 ))h" \
              --template "$CERT_TEMPLATE" \
              "${SAN_ARGS[@]+"${SAN_ARGS[@]}"}" \
              "${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}"

            mv "${ARTIFACTS}/leaf.key" "$KEY_OUT"
            mv "${ARTIFACTS}/leaf.crt" "$CRT_OUT"

            if [ -n "${SUDO_USER:-}" ]; then
              SUDO_GID=$(id -g "$SUDO_USER")
              chown "${SUDO_USER}:${SUDO_GID}" "$KEY_OUT" "$CRT_OUT"
            fi
            chmod 0600 "$KEY_OUT"
            chmod 0644 "$CRT_OUT"

            echo ""
            echo "Certificate minted:"
            echo "  Key:  $KEY_OUT"
            echo "  Cert: $CRT_OUT"
            openssl x509 -in "$CRT_OUT" -noout -subject -dates -ext basicConstraints -ext subjectAltName 2>/dev/null || true
          args:
            executable: /bin/bash
          loop: "{{ extra_certs | default([]) }}"
          loop_control:
            label: "{{ item.cn }}"
          when: extra_certs | default([]) | length > 0
