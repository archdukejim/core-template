---
- name: Section 3 - Identity Preconditioning
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml


  tasks:
    - name: Section 3 - Identity Preconditioning
      tags: [preconditioning, users]
      block:
        - name: Check if UIDs are already in use
          ansible.builtin.command:
            cmd: "getent passwd {{ item.value.uid }}"
          loop: "{{ service_users | dict2items }}"
          register: uid_check
          changed_when: false
          failed_when: false

        - name: Fail if UID is taken by a different user
          ansible.builtin.fail:
            msg: >-
              UID {{ item.item.value.uid }} is already in use by '{{ item.stdout.split(':')[0] }}'
              but service '{{ item.item.key }}' expects to own it.
              Either free the UID or update service_users in vars.yaml.
          loop: "{{ uid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc == 0
            - item.stdout.split(':')[0] != item.item.key

        - name: Check if GIDs are already in use
          ansible.builtin.command:
            cmd: "getent group {{ item.value.gid }}"
          loop: "{{ service_users | dict2items }}"
          register: gid_check
          changed_when: false
          failed_when: false

        - name: Fail if GID is taken by a different group
          ansible.builtin.fail:
            msg: >-
              GID {{ item.item.value.gid }} is already in use by '{{ item.stdout.split(':')[0] }}'
              but service '{{ item.item.key }}' expects to own it.
              Either free the GID or update service_users in vars.yaml.
          loop: "{{ gid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc == 0
            - item.stdout.split(':')[0] != item.item.key

        - name: Ensure service groups exist
          ansible.builtin.group:
            name: "{{ item.item.key }}"
            gid: "{{ item.item.value.gid }}"
            state: present
          loop: "{{ gid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc != 0

        - name: Ensure service users exist
          ansible.builtin.user:
            name: "{{ item.item.key }}"
            uid: "{{ item.item.value.uid }}"
            group: "{{ item.item.value.gid }}"
            shell: /usr/sbin/nologin
            system: true
            create_home: false
          loop: "{{ uid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc != 0
