---
# Section 2 — File Structure and Deployment
#
# Tags:
#   file-structure — Create directory tree and copy all rendered outputs.
#                    Use for initial install or full redeployment.
#   update         — Safe subset: scripts and static pages only.
#                    Does NOT redeploy service configs. Safe on live systems.
#   dns-record     — Re-deploy BIND9 zone and zones config only.
#
# Copies pre-rendered files from /tmp/core-template-render (localhost) to the target.
# /tmp/core-template-render is populated by 01-render-jinja.yml before this runs.
- name: Section 2 - File Structure and Deployment
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - "{{ playbook_dir }}/../advanced-vars.yaml"
    - "/tmp/core-template-render/vars.yaml"

  tasks:
    # ----------------------------------------------------------------
    # 2a — Scripts and meta (safe to auto-update)
    # ----------------------------------------------------------------
    - name: Section 2a - Ensure base destination directories exist
      tags: [file-structure, update]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
      loop:
        - "{{ deploy_base_dir }}/easyrsa"
        - "{{ deploy_base_dir }}/nginx/pki"

    - name: Section 2a - Sync core project files to target
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ repo_source }}/core/"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: '0750'
        directory_mode: '0750'

    - name: Section 2a - Copy resolved vars.yaml to target core dir
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/vars.yaml"
        dest: "{{ deploy_base_dir }}/core/vars.yaml"
        owner: root
        group: root
        mode: '0640'

    - name: Section 2a - Copy root-level project files to core dir
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: preserve
      with_fileglob:
        - "{{ repo_source }}/*"

    - name: Section 2a - Deploy rendered easyrsa scripts
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/easyrsa/sign-certs.sh"
        dest: "{{ deploy_base_dir }}/easyrsa/sign-certs.sh"
        owner: root
        group: root
        mode: '0750'

    - name: Section 2a - Deploy rendered nginx PKI page
      tags: [file-structure, update]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/nginx/pki/index.html"
        dest: "{{ deploy_base_dir }}/nginx/pki/index.html"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'

    # ----------------------------------------------------------------
    # 2b — Service directory tree and config files
    #      Requires review on operational systems — tagged files only
    # ----------------------------------------------------------------
    - name: Section 2b - Service directory and config deployment
      tags: [file-structure]
      block:
        - name: Check which service directories exist in repo
          ansible.builtin.stat:
            path: "{{ repo_source }}/{{ item.folder }}"
          loop: "{{ service_dirs }}"
          register: service_dir_stats
          delegate_to: localhost

        - name: Sync service directories that exist in repo
          ansible.builtin.copy:
            src: "{{ repo_source }}/{{ item.item.folder }}/"
            dest: "{{ deploy_base_dir }}/{{ item.item.folder }}/"
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0640'
            directory_mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: item.stat.exists and item.stat.isdir

        - name: Create service directories missing from repo
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/{{ item.item.folder }}"
            state: directory
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: not item.stat.exists

        - name: Deploy rendered nginx.conf
          ansible.builtin.copy:
            src: "/tmp/core-template-render/nginx/nginx.conf"
            dest: "{{ deploy_base_dir }}/nginx/nginx.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'

        - name: Deploy rendered docker-compose.yml
          ansible.builtin.copy:
            src: "/tmp/core-template-render/core/docker-compose.yml"
            dest: "{{ compose_file }}"
            owner: root
            group: root
            mode: '0640'

        - name: Deploy rendered BIND9 config files
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/{{ item }}"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones

        - name: Deploy rendered BIND9 keys config (restricted)
          ansible.builtin.copy:
            src: "/tmp/core-template-render/bind9/config/named.conf.keys"
            dest: "{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'

        - name: Deploy rendered OpenLDAP files
          ansible.builtin.copy:
            src: "/tmp/core-template-render/openldap/{{ item }}"
            dest: "{{ deploy_base_dir }}/openldap/{{ item }}"
            owner: "{{ service_users.ldap.uid }}"
            group: "{{ service_users.ldap.gid }}"
            mode: '0640'
          loop:
            - base.ldif
            - ous.ldif
            - groups.ldif
            - acl.ldif

    # ----------------------------------------------------------------
    # 2c — DNS zones (safe to re-deploy on update or dns-record)
    # ----------------------------------------------------------------
    - name: Section 2c - Deploy rendered BIND9 zone data files
      tags: [file-structure, update, dns-record]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/data/db.{{ item.key }}"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ item.key }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Section 2c - Deploy rendered named.conf.zones (dns-record)
      tags: [dns-record]
      ansible.builtin.copy:
        src: "/tmp/core-template-render/bind9/config/named.conf.zones"
        dest: "{{ deploy_base_dir }}/bind9/config/named.conf.zones"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
