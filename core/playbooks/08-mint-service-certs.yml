---
# Section 8 — Mint Service Certificates
#
# Mints all service TLS certificates via the running step-ca container
# (started by 07-bootstrap-containers.yml), then installs them.
#
# Certificate targets:
#   - BIND9 TLS cert    (hostname_bind9, SANs: ns.domain, 127.0.0.1)  → nginx + bind9/ssl/
#   - LDAP TLS cert     (hostname_ldap)                                 → nginx
#   - Step-CA TLS cert  (hostname_stepca)                               → nginx
#   - Certs TLS cert    (hostname_certs)                                → nginx
#   - Extra certs from extra_certs[] variable (if defined)
#
# All certs are installed under /opt/nginx/certs/<hostname>/ for nginx.
# BIND9 TLS cert is additionally installed to /opt/bind9/ssl/.
#
# After minting, the bootstrap stack is brought down. The full stack
# is started by 09-deploy-checks.yml.
#
# Replaces: 07-mint-service-certs.yml (cert sections only)
- name: Section 8 - Mint Service Certificates
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml

  tasks:
    - name: Section 8 - Mint Service Certificates
      tags: [pki, mint-certs]
      block:
        # ----------------------------------------------------------------
        # 8a — Define service certificate targets
        # ----------------------------------------------------------------
        - name: Define service certificate targets
          ansible.builtin.set_fact:
            service_cert_targets:
              - { cn: "{{ hostname_bind9 }}", safe: "bind9_svc", sans: ["{{ hostname_bind9 }}.{{ domain }}", "{{ hostname_bind9 }}", "ns.{{ domain }}", "127.0.0.1"] }
              - { cn: "{{ hostname_ldap }}",  safe: "ldap_svc",  sans: ["{{ hostname_ldap }}.{{ domain }}", "{{ hostname_ldap }}"] }
              - { cn: "{{ hostname_stepca }}", safe: "stepca_svc", sans: ["{{ hostname_stepca }}.{{ domain }}", "{{ hostname_stepca }}"] }
              - { cn: "{{ hostname_certs }}", safe: "certs_svc", sans: ["{{ hostname_certs }}.{{ domain }}", "{{ hostname_certs }}"] }

        # ----------------------------------------------------------------
        # 8b — Ensure cert output directories exist
        # ----------------------------------------------------------------
        - name: Ensure nginx cert directories exist
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}"
            state: directory
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0750'
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        - name: Ensure BIND9 TLS directory exists
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/bind9/ssl"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0700'

        # ----------------------------------------------------------------
        # 8c — Mint infrastructure service TLS certificates
        # ----------------------------------------------------------------
        - name: Mint service TLS certificates via step-ca
          ansible.builtin.shell:
            cmd: >
              docker compose -f {{ compose_file }} exec -T
              -u {{ service_users.step.uid }}:{{ service_users.step.gid }}
              step-ca
              step ca certificate "{{ item.cn }}"
              "/home/step/artifacts/{{ item.safe }}.crt"
              "/home/step/artifacts/{{ item.safe }}.key"
              --ca-url "https://127.0.0.1:{{ stepca_port }}"
              --root "/home/step/certs/root_ca.crt"
              --provisioner "admin"
              --provisioner-password-file "/home/step/secrets/password"
              --kty RSA --size 4096
              --not-after {{ cert_service_days * 24 }}h
              --san {{ item.cn }}
              {% for san in item.sans %}--san {{ san }} {% endfor %}
            chdir: "{{ deploy_base_dir }}"
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        # Bundle intermediate CA into each leaf cert to produce a fullchain
        - name: Bundle intermediate CA into service certificates
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              ARTIFACTS="{{ deploy_base_dir }}/stepca/data/artifacts"
              INT_CA="{{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt"
              CRT="${ARTIFACTS}/{{ item.safe }}.crt"
              # Append intermediate if the cert file contains only one certificate block
              cert_count=$(grep -c 'BEGIN CERTIFICATE' "$CRT" || true)
              if [ "$cert_count" -lt 2 ]; then
                cat "$INT_CA" >> "$CRT"
              fi
            executable: /bin/bash
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        # ----------------------------------------------------------------
        # 8d — Install service certs for nginx
        # ----------------------------------------------------------------
        - name: Install service certificates for nginx
          ansible.builtin.shell:
            cmd: |
              mv "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.crt" \
                 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
              mv "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.key" \
                 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chown {{ service_users.nginx.uid }}:{{ service_users.nginx.gid }} \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem" \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 640 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 644 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
            executable: /bin/bash
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        # ----------------------------------------------------------------
        # 8e — Mint and install dedicated BIND9 TLS certificate
        # ----------------------------------------------------------------
        - name: Mint dedicated BIND9 TLS certificate
          ansible.builtin.shell:
            cmd: >
              docker compose -f {{ compose_file }} exec -T
              -u {{ service_users.step.uid }}:{{ service_users.step.gid }}
              step-ca
              step ca certificate "{{ hostname_bind9 }}"
              "/home/step/artifacts/bind9_tls.crt" "/home/step/artifacts/bind9_tls.key"
              --ca-url "https://127.0.0.1:{{ stepca_port }}"
              --root "/home/step/certs/root_ca.crt"
              --provisioner "admin"
              --provisioner-password-file "/home/step/secrets/password"
              --kty RSA --size 4096
              --not-after {{ cert_service_days * 24 }}h
              --san {{ hostname_bind9 }}.{{ domain }} --san {{ hostname_bind9 }} --san ns.{{ domain }} --san 127.0.0.1
            chdir: "{{ deploy_base_dir }}"

        - name: Bundle intermediate CA into BIND9 TLS certificate
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              INT_CA="{{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt"
              CRT="{{ deploy_base_dir }}/stepca/data/artifacts/bind9_tls.crt"
              cert_count=$(grep -c 'BEGIN CERTIFICATE' "$CRT" || true)
              if [ "$cert_count" -lt 2 ]; then
                cat "$INT_CA" >> "$CRT"
              fi
            executable: /bin/bash

        - name: Install BIND9 TLS certificate and key
          ansible.builtin.shell:
            cmd: |
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9_tls.key {{ deploy_base_dir }}/bind9/ssl/privkey.pem
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9_tls.crt {{ deploy_base_dir }}/bind9/ssl/fullchain.pem
            executable: /bin/bash

        - name: Copy Root CA to BIND9 TLS dir
          ansible.builtin.copy:
            src: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            dest: "{{ deploy_base_dir }}/bind9/ssl/root_ca.crt"
            remote_src: true
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0644'

        - name: Set BIND9 TLS file permissions
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: "{{ item.mode }}"
          loop:
            - { path: "{{ deploy_base_dir }}/bind9/ssl/privkey.pem",  mode: "0600" }
            - { path: "{{ deploy_base_dir }}/bind9/ssl/fullchain.pem", mode: "0644" }

        # ----------------------------------------------------------------
        # 8f — Mint extra certificates (extra_certs variable)
        # ----------------------------------------------------------------
        - name: Mint extra certificates
          tags: [mint-certs]
          ansible.builtin.shell: |
            set -euo pipefail
            STEPCA_DATA="{{ deploy_base_dir }}/stepca/data"
            STEPCA_IMAGE="{{ image_stepca }}"
            STEP_UID={{ service_users.step.uid }}
            STEP_GID={{ service_users.step.gid }}

            CN="{{ item.cn }}"
            DAYS="{{ item.days | default(365) }}"
            OUT_DIR="{{ item.out_dir | default('') }}"

            {% if item.is_ca | default(false) %}
            CERT_TEMPLATE="/home/step/templates/certs/subca.tpl"
            SAN_ARGS=()
            EXTRA_ARGS=("--set" "pathLen={{ item.path_len | default(0) }}")
            {% else %}
            CERT_TEMPLATE="/home/step/templates/certs/leaf.tpl"
            SAN_ARGS=("--san" "$CN")
            {% for san in item.sans | default([]) %}
            SAN_ARGS+=("--san" "{{ san }}")
            {% endfor %}
            EXTRA_ARGS=()
            {% endif %}

            [[ "$(id -u)" -eq 0 ]] || { echo "ERROR: must be run as root."; exit 1; }

            if [ -n "$OUT_DIR" ]; then
              TARGET_DIR="$OUT_DIR"
            elif [ -n "${SUDO_USER:-}" ]; then
              TARGET_DIR=$(getent passwd "$SUDO_USER" | cut -d: -f6)
            else
              TARGET_DIR="$HOME"
            fi

            [ -d "$TARGET_DIR" ] || { echo "ERROR: Output directory does not exist: $TARGET_DIR"; exit 1; }

            SAFE_CN=$(echo "$CN" | tr './ ' '---')
            KEY_OUT="${TARGET_DIR}/${SAFE_CN}.key"
            CRT_OUT="${TARGET_DIR}/${SAFE_CN}.crt"

            ARTIFACTS="${STEPCA_DATA}/artifacts"
            mkdir -p "$ARTIFACTS"
            chown "${STEP_UID}:${STEP_GID}" "$ARTIFACTS"

            echo "Generating certificate for ${CN} (validity: ${DAYS} days)..."
            docker run --rm \
              -v "${STEPCA_DATA}:/home/step" \
              --user "${STEP_UID}:${STEP_GID}" \
              --entrypoint /usr/local/bin/step \
              "$STEPCA_IMAGE" \
              certificate create "$CN" \
              /home/step/artifacts/leaf.crt /home/step/artifacts/leaf.key \
              --ca /home/step/certs/intermediate_ca.crt \
              --ca-key /home/step/secrets/intermediate_ca_key \
              --no-password --insecure --force --bundle \
              --kty {{ item.kty | default('RSA') }} --size {{ item.size | default(4096) }} \
              --not-after "$(( DAYS * 24 ))h" \
              --template "$CERT_TEMPLATE" \
              "${SAN_ARGS[@]}" \
              "${EXTRA_ARGS[@]}"

            mv "${ARTIFACTS}/leaf.key" "$KEY_OUT"
            mv "${ARTIFACTS}/leaf.crt" "$CRT_OUT"

            if [ -n "${SUDO_USER:-}" ]; then
              SUDO_GID=$(id -g "$SUDO_USER")
              chown "${SUDO_USER}:${SUDO_GID}" "$KEY_OUT" "$CRT_OUT"
            fi
            chmod 0600 "$KEY_OUT"
            chmod 0644 "$CRT_OUT"

            echo "Certificate minted:"
            echo "  Key:  $KEY_OUT"
            echo "  Cert: $CRT_OUT"
            openssl x509 -in "$CRT_OUT" -noout -subject -dates -ext basicConstraints -ext subjectAltName 2>/dev/null || true
          args:
            executable: /bin/bash
          loop: "{{ extra_certs | default([]) }}"
          loop_control:
            label: "{{ item.cn }}"
          when: extra_certs | default([]) | length > 0

        # ----------------------------------------------------------------
        # 8g — Stop bootstrap containers
        # ----------------------------------------------------------------
        - name: Stop bootstrap stack (containers only, volumes preserved)
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} down"
