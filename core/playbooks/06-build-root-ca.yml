---
# Section 6 — Build Root CA Container
#
# Generates the root CA key and certificate on the target (idempotent),
# then builds a self-contained Docker image (root-ca:local) that embeds
# the root CA cert and exposes signing subcommands via sign-certs.sh.
#
# The root CA private key is injected at build time via Docker BuildKit
# --secret and is NEVER written to an image layer.
#
# At runtime, the key is bind-mounted read-only into the container.
# History and revocation logs are mounted to /opt/root-ca/{history,revokes}.
# Output certificates are written to a per-operation /out mount.
#
# SECURITY: Never push root-ca:local to any external registry.
#
# Replaces: 06-pki.yml (root CA generation only; step-ca config moves to 07)
- name: Section 6 - Build Root CA Container
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - /tmp/core-template-render/vars.yaml

  tasks:
    - name: Section 6 - Build Root CA Container
      tags: [pki, build-root-ca]
      block:
        # ----------------------------------------------------------------
        # 6a — Generate root CA key and self-signed certificate
        # ----------------------------------------------------------------
        - name: Generate root CA private key
          ansible.builtin.command:
            cmd: >
              openssl genpkey
              -algorithm RSA
              -pkeyopt rsa_keygen_bits:{{ cert_root_key_param }}
              -out {{ deploy_base_dir }}/stepca/data/secrets/root_ca.key
            creates: "{{ deploy_base_dir }}/stepca/data/secrets/root_ca.key"

        - name: Set root CA key permissions
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data/secrets/root_ca.key"
            owner: root
            group: root
            mode: '0600'

        - name: Generate root CA self-signed certificate
          ansible.builtin.command:
            cmd: >
              openssl req -new -x509
              -key {{ deploy_base_dir }}/stepca/data/secrets/root_ca.key
              -out {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              -days {{ cert_root_ca_days }}
              -{{ cert_root_digest }}
              -subj "/C={{ cert_country }}/ST={{ cert_province }}/L={{ cert_city }}/O={{ cert_org }}/OU={{ cert_ou }}/CN={{ ca_name }}"
              -addext "basicConstraints=critical,CA:TRUE"
              -addext "subjectKeyIdentifier=hash"
              -addext "keyUsage=critical,keyCertSign,cRLSign"
            creates: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"

        - name: Set root CA cert permissions
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            owner: root
            group: root
            mode: '0644'

        # ----------------------------------------------------------------
        # 6b — Prepare Docker build context
        # ----------------------------------------------------------------
        - name: Create build context directory
          ansible.builtin.file:
            path: /tmp/root-ca-build
            state: directory
            mode: '0700'

        - name: Copy root CA cert into build context
          ansible.builtin.copy:
            src: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            dest: /tmp/root-ca-build/root_ca.crt
            remote_src: true
            mode: '0644'

        - name: Copy Dockerfile into build context
          ansible.builtin.copy:
            src: "{{ repo_source }}/core/docker/root-ca/Dockerfile"
            dest: /tmp/root-ca-build/Dockerfile
            mode: '0644'

        - name: Copy sign-certs.sh into build context
          ansible.builtin.copy:
            src: "{{ repo_source }}/core/docker/root-ca/sign-certs.sh"
            dest: /tmp/root-ca-build/sign-certs.sh
            mode: '0755'

        - name: Copy intermediate_ext.cnf into build context
          ansible.builtin.copy:
            src: "{{ repo_source }}/core/docker/root-ca/intermediate_ext.cnf"
            dest: /tmp/root-ca-build/intermediate_ext.cnf
            mode: '0644'

        # ----------------------------------------------------------------
        # 6c — Build the root-ca:local image via BuildKit
        # ----------------------------------------------------------------
        - name: Build root-ca:local Docker image
          ansible.builtin.shell:
            cmd: >
              DOCKER_BUILDKIT=1 docker build
              --secret id=root_key,src={{ deploy_base_dir }}/stepca/data/secrets/root_ca.key
              -t root-ca:local
              /tmp/root-ca-build/
          environment:
            DOCKER_BUILDKIT: "1"
          changed_when: true

        # ----------------------------------------------------------------
        # 6d — Smoke test
        # ----------------------------------------------------------------
        - name: Smoke test root-ca:local container
          ansible.builtin.command:
            cmd: docker run --rm root-ca:local --version
          changed_when: false

        # ----------------------------------------------------------------
        # 6e — Clean up build context
        # ----------------------------------------------------------------
        - name: Remove temporary build context
          ansible.builtin.file:
            path: /tmp/root-ca-build
            state: absent
