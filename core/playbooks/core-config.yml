---
# Core Infrastructure Configuration — main entry point
#
# Imports each section playbook in sequence for a full install.
# Individual playbooks can be run directly for targeted operations:
#
#   ansible-playbook core/playbooks/04-target-file-structure.yml -e target_host=core --tags dns-record
#   ansible-playbook core/playbooks/07-bootstrap-containers.yml  -e target_host=core
#   ansible-playbook core/playbooks/08-mint-service-certs.yml    -e target_host=core
#   ansible-playbook core/playbooks/09-deploy-checks.yml         -e target_host=core -e start=true
#
# Prerequisite — run once before the installer:
#   bash core/pki/rootca.sh init
#
# Full install (all sections):
#   ansible-playbook core/playbooks/core-config.yml -e target_host=core
#
# Full install + leave stack running:
#   ansible-playbook core/playbooks/core-config.yml -e target_host=core -e start=true

- import_playbook: 00-controller-check.yml
- import_playbook: 01-gen-vars-and-render-jinja.yml
- import_playbook: 02-target-system-conditioning.yml
- import_playbook: 03-target-service-accounts.yml
- import_playbook: 04-target-file-structure.yml
- import_playbook: 05-target-network.yml
- import_playbook: 06-configure-stepca.yml
- import_playbook: 07-bootstrap-containers.yml
- import_playbook: 08-mint-service-certs.yml
- import_playbook: 09-start-and-configure.yml
- import_playbook: 10-deploy-checks-and-cleanup.yml
