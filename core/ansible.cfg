# =================================================================
# core-template Ansible configuration
# =================================================================
# Tested with:
#   ansible-core   2.20.4
#   ansible.posix  2.1.0
#   Python         3.12
#   Ubuntu         24.04
# =================================================================

[defaults]
# Pin Python interpreter — suppresses discovery warning
interpreter_python = /usr/bin/python3

# Disable legacy fact injection (deprecated in 2.20, removed in 2.24)
# All tasks must use ansible_facts['key'] instead of ansible_key
inject_facts_as_vars = False

# =================================================================
# Known upstream deprecations (not suppressible per-module)
# =================================================================
# ansible.posix.acl 2.1.0 imports 'to_native' from the deprecated
# path ansible.module_utils._text. This warning comes from the
# collection itself, not from this project's code. No fix is
# available as of 2.1.0. Track: ansible.posix >= 2.2.0.
# =================================================================
