---
- name: Section 10c - Extra TSIG Keys
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - vars.yaml

  pre_tasks:
    - name: Pre-render vars.yaml (resolves Jinja2 in dict keys)
      tags: [always]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/vars.yaml"
        dest: "/tmp/.core-vars-rendered.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "/tmp/.core-vars-rendered.yaml"

    - name: Compute LDAP facts from domain
      tags: [always]
      ansible.builtin.set_fact:
        ldap_domain_components: "{{ domain.split('.') }}"
        ldap_base_dn: "{{ domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

  tasks:
    - name: Section 10c - Extra TSIG Keys
      tags: [tsig-keys]
      block:
        - name: Add TSIG key
          ansible.builtin.shell: |
            set -euo pipefail
            KEYS_FILE="{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            ZONES_FILE="{{ deploy_base_dir }}/bind9/config/named.conf.zones"
            KEY_NAME="{{ item.name }}"

            if grep -q "key \"${KEY_NAME}\"" "$KEYS_FILE" 2>/dev/null; then
              echo "Key '${KEY_NAME}' already exists — skipped."
              exit 0
            fi

            SECRET=$(openssl rand -base64 32)

            printf '\nkey "%s" {\n    algorithm {{ item.algorithm | default("hmac-sha256") }};\n    secret "%s";\n};\n' \
              "$KEY_NAME" "$SECRET" >> "$KEYS_FILE"
            chown {{ service_users.bind.uid }}:{{ service_users.bind.gid }} "$KEYS_FILE"
            chmod 600 "$KEYS_FILE"

            {% set key_domain = item.domain | default(domain) %}
            {% for record in item.records %}
            sed -i "/managed outside of Ansible/a\\        grant \"${KEY_NAME}\" name _acme-challenge.{{ record }}.{{ key_domain }}. TXT;" "$ZONES_FILE"
            {% endfor %}
            chown {{ service_users.bind.uid }}:{{ service_users.bind.gid }} "$ZONES_FILE"

            OUT_FILE="{{ item.out | default('/opt/' ~ item.name ~ '/rfc2136.ini') }}"
            mkdir -p "$(dirname "$OUT_FILE")"
            {
              echo "# RFC2136 credentials for TSIG key: ${KEY_NAME}"
              echo "# Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo "dns_rfc2136_server = {{ ip_bind9 }}"
              echo "dns_rfc2136_port = {{ bind_dns_port }}"
              echo "dns_rfc2136_name = ${KEY_NAME}"
              echo "dns_rfc2136_secret = ${SECRET}"
              echo "dns_rfc2136_algorithm = HMAC-SHA256"
              echo "dns_rfc2136_base_domain = {{ key_domain }}"
            } > "$OUT_FILE"
            chmod 600 "$OUT_FILE"
            echo "[+] TSIG key '${KEY_NAME}' added. Credentials: ${OUT_FILE}"
          args:
            executable: /bin/bash
          loop: "{{ tsig_keys | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          register: tsig_key_result
          changed_when: "'already exists' not in tsig_key_result.stdout"
          when: tsig_keys | rejectattr('primary', 'defined') | list | length > 0

        - name: Check if bind9 container is running
          ansible.builtin.command:
            cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
          register: bind9_running
          failed_when: false
          changed_when: false

        - name: Reload BIND9 after adding TSIG keys
          ansible.builtin.command:
            cmd: "docker exec bind9 rndc reload"
          when: >
            tsig_keys | rejectattr('primary', 'defined') | list | length > 0 and
            (tsig_key_result.results | selectattr('changed') | list | length > 0) and
            bind9_running.rc == 0 and
            bind9_running.stdout | trim == 'true'
