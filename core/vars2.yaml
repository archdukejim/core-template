oct1: 192
oct2: 168
subnet_number: 7
subnet_ip_prefix: "{{ oct1 }}.{{ oct2 }}.{{ subnet_number }}"
subnet_name: "sub{{ '%03d'|format(subnet_number) }}" 
tld: internal
# Domain will be rendered as: sub007.internal using zero-padding
domain: "{{ subnet_name }}.{{ tld }}"

dns_raw:
  A:
    - name: "{{ subnet_name }}devfs01"
      ip: "{{ subnet_ip_prefix }}.100"
    - name: &dockerhost1 "{{ subnet_name }}host1"
      ip: "{{ subnet_ip_prefix }}.181"
    - name: &dockerhost2 "{{ subnet_name }}host2"
      ip: "{{ subnet_ip_prefix }}.182"
    - name: &dockerhost3 "{{ subnet_name }}host2"
      ip: "{{ subnet_ip_prefix }}.183"
    - name: rtr-mgmt
      ip: "{{ subnet_ip_prefix }}.129"
  CNAME:
    - name: ca
      canonical: *dockerhost1
    - name: dns
      canonical: *dockerhost1
    - name: ldap
      canonical: *dockerhost1
    - name: keycloak
      canonical: *dockerhost1
    - name: gitlab
      canonical: *dockerhost2
    - name: sonatype
      canonical: *dockerhost2
    - name: ubuntu
      canonical: *dockerhost2
    - name: chat
      canonical: *dockerhost3

ldap:
  organizational_units:
    - name: accounts
      description: User Accounts
    - name: groups
      description: Security Groups
    - name: admins
      description: Privileged accounts
      parent: accounts
      uid_range: "1101-1999"
    - name: users
      description: Regular User accounts
      parent: accounts
      uid_range: "5001-50000"
    - name: hosts
      description: Computer objects
      uid_range: "2000-4900"
  groups:
    - name: admins
      gidNumber: 1100
      permissions:
      - read
      - write
      - modify
    - name: users
      gidNumber: 5000
      permissions:
      - read