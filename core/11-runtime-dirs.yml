---
- name: Section 11 - Service Runtime Directories
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - vars.yaml

  pre_tasks:
    - name: Pre-render vars.yaml (resolves Jinja2 in dict keys)
      tags: [always]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/vars.yaml"
        dest: "/tmp/.core-vars-rendered.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "/tmp/.core-vars-rendered.yaml"

    - name: Compute LDAP facts from domain
      tags: [always]
      ansible.builtin.set_fact:
        ldap_domain_components: "{{ domain.split('.') }}"
        ldap_base_dn: "{{ domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

  tasks:
    - name: Section 11 - Service Runtime Directories
      tags: [files]
      block:
        - name: Ensure BIND9 writable directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0750'
          loop:
            - "{{ deploy_base_dir }}/bind9/data"
            - "{{ deploy_base_dir }}/bind9/log"
            - "{{ deploy_base_dir }}/bind9/cache"
