---
- name: Section 8 - PKI Bootstrap
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - vars.yaml

  pre_tasks:
    - name: Pre-render vars.yaml (resolves Jinja2 in dict keys)
      tags: [always]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/vars.yaml"
        dest: "/tmp/.core-vars-rendered.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "/tmp/.core-vars-rendered.yaml"

    - name: Compute LDAP facts from domain
      tags: [always]
      ansible.builtin.set_fact:
        ldap_domain_components: "{{ domain.split('.') }}"
        ldap_base_dn: "{{ domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

  tasks:
    - name: Section 8 - PKI Bootstrap
      tags: [pki, stepca]
      block:
        - name: Ensure Step-CA directory structure
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0700'
          loop:
            - "{{ deploy_base_dir }}/stepca/data/secrets"
            - "{{ deploy_base_dir }}/stepca/data/artifacts"
            - "{{ deploy_base_dir }}/stepca/data/certs"
            - "{{ deploy_base_dir }}/stepca/data/config"
            - "{{ deploy_base_dir }}/stepca/data/templates/certs"

        - name: Render Step-CA leaf certificate template
          ansible.builtin.template:
            src: "{{ repo_source }}/stepca/templates/certs/leaf.tpl.j2"
            dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/leaf.tpl"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0640'

        - name: Render Step-CA subordinate CA certificate template
          ansible.builtin.template:
            src: "{{ repo_source }}/stepca/templates/certs/subca.tpl.j2"
            dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/subca.tpl"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0640'

        - name: Generate CA password if missing
          ansible.builtin.shell:
            cmd: "openssl rand -base64 32 > {{ deploy_base_dir }}/stepca/data/secrets/password"
            creates: "{{ deploy_base_dir }}/stepca/data/secrets/password"

        - name: Set password file ownership and permissions
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data/secrets/password"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0600'

        - name: Generate Root CA via EasyRSA
          ansible.builtin.command:
            cmd: >
              bash {{ deploy_base_dir }}/easyrsa/sign-certs.sh
              --generate-rootca
              --crt-path {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              --expire-days {{ cert_root_ca_days }}
            creates: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"

        - name: Check if Step-CA is initialized
          ansible.builtin.stat:
            path: "{{ deploy_base_dir }}/stepca/data/config/ca.json"
          register: ca_json

        - name: Initialize Step-CA
          when: not ca_json.stat.exists
          block:
            - name: Move Root CA aside to prevent Step-CA overwrite
              ansible.builtin.command:
                cmd: "mv {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt /tmp/root_ca.crt.bak"

            - name: Run Step-CA init
              community.docker.docker_container:
                name: step_ca_init
                image: "{{ image_stepca }}"
                volumes:
                  - "{{ deploy_base_dir }}/stepca/data:/home/step"
                user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
                entrypoint: /usr/local/bin/step
                command: >
                  ca init --name="{{ ca_name }}" --dns="{{ hostname_stepca }}" --address=":9000"
                  --provisioner="admin" --password-file="/home/step/secrets/password"
                  --provisioner-password-file="/home/step/secrets/password"
                detach: false
                cleanup: true

            - name: Restore real Root CA
              ansible.builtin.command:
                cmd: "mv /tmp/root_ca.crt.bak {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"

        - name: Fix Step-CA data ownership before CSR generation
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        - name: Create Intermediate CSR (RSA)
          community.docker.docker_container:
            name: step_ca_int_csr
            image: "{{ image_alpine_tools }}"
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            entrypoint: sh
            command: >
              -c "openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:{{ cert_intermediate_key_param }}
              -out /home/step/secrets/intermediate_ca_key &&
              chmod 600 /home/step/secrets/intermediate_ca_key &&
              openssl req -new -key /home/step/secrets/intermediate_ca_key
              -{{ cert_intermediate_digest }}
              -subj '/C={{ cert_country }}/ST={{ cert_province }}/L={{ cert_city }}/O={{ cert_org }}/OU=Certificate Issuing Authority/CN=Intermediate CA'
              -out /home/step/artifacts/intermediate.csr &&
              chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              /home/step/secrets/intermediate_ca_key /home/step/artifacts/intermediate.csr"
            detach: false
            cleanup: true
          when: cert_intermediate_key_type == "rsa"

        - name: Create Intermediate CSR (EC)
          community.docker.docker_container:
            name: step_ca_int_csr
            image: "{{ image_alpine_tools }}"
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            entrypoint: sh
            command: >
              -c "openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:{{ cert_intermediate_key_param }}
              -out /home/step/secrets/intermediate_ca_key &&
              chmod 600 /home/step/secrets/intermediate_ca_key &&
              openssl req -new -key /home/step/secrets/intermediate_ca_key
              -subj '/C={{ cert_country }}/ST={{ cert_province }}/L={{ cert_city }}/O={{ cert_org }}/OU=Certificate Issuing Authority/CN=Intermediate CA'
              -out /home/step/artifacts/intermediate.csr &&
              chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              /home/step/secrets/intermediate_ca_key /home/step/artifacts/intermediate.csr"
            detach: false
            cleanup: true
          when: cert_intermediate_key_type != "rsa"

        - name: Sign Intermediate CSR via EasyRSA
          ansible.builtin.command:
            cmd: >
              bash {{ deploy_base_dir }}/easyrsa/sign-certs.sh
              --csr-path {{ deploy_base_dir }}/stepca/data/artifacts/intermediate.csr
              --crt-path {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              --chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              --expire-days {{ cert_intermediate_days }}

        - name: Update ca.json certificate paths and dnsNames
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              cfg['root'] = '/home/step/certs/root_ca.crt'
              cfg['crt']  = '/home/step/certs/intermediate_ca.crt'
              cfg['key']  = '/home/step/secrets/intermediate_ca_key'
              cfg['dnsNames'] = ['{{ hostname_stepca }}']
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        - name: Set Step-CA certificate lifetimes in ca.json
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              auth = cfg['authority']
              # Authority-level max: enables subordinate CA issuance when allowed
              {% if stepca_cert_allow_subordinate_ca | bool %}
              auth.setdefault('claims', {})
              auth['claims']['maxTLSCertDuration'] = '{{ stepca_cert_max_lifetime_hours }}'
              {% endif %}
              # ACME provisioner: default lifetime and x509 template for leaf certs
              for p in auth.get('provisioners', []):
                  if p.get('type') == 'ACME':
                      p.setdefault('claims', {})
                      p['claims']['defaultTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p['claims']['maxTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p.setdefault('options', {})
                      p['options']['x509'] = {
                          'templateFile': '/home/step/templates/certs/leaf.tpl'
                      }
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        - name: Set Step-CA data ownership
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        - name: Verify Intermediate Certificate chain
          ansible.builtin.command:
            cmd: >
              openssl verify -CAfile {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
          changed_when: false
