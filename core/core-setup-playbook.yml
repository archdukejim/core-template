---
- name: Remake Bash Script in Ansible
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - install-vars.yml

  tasks:
    - name: Section 1 - OS Validation
      tags: [preconditioning, validation, always]
      block:
        - name: Ensure target OS is Ubuntu
          ansible.builtin.assert:
            that:
              - ansible_distribution == "Ubuntu"
            fail_msg: "CRITICAL: This playbook is only compatible with Ubuntu. Detected: {{ ansible_distribution }}"

        - name: Version Warning for Ubuntu versions other than 24.04
          ansible.builtin.debug:
            msg: "WARNING: You are running Ubuntu {{ ansible_distribution_version }}. Optimized for 24.04."
          when: ansible_distribution_version != "24.04"

    - name: Section 2 - Core Dependency Setup
      tags: [preconditioning, pkg_mgmt]
      block:
        - name: Install prerequisite system packages
          ansible.builtin.package:
            name: [acl, openssl, ca-certificates, curl, gnupg]
            state: present

    - name: Section 3 - Docker Engine Installation & Verification
      tags: [preconditioning, docker_engine]
      block:
        - name: Check if Docker is installed
          ansible.builtin.command: docker --version
          register: docker_installed
          ignore_errors: true
          changed_when: false

        - name: Install Docker from official repository if missing
          when: docker_installed.rc != 0
          block:
            - name: Add Docker GPG key
              ansible.builtin.apt_key:
                url: https://download.docker.com
                state: present

            - name: Add Docker repository (Ubuntu 24.04 Noble)
              ansible.builtin.apt_repository:
                repo: "deb [arch=amd64] https://download.docker.com noble stable"
                state: present

            - name: Install Docker Engine and Python SDK
              ansible.builtin.package:
                name:
                  - docker-ce
                  - docker-ce-cli
                  - containerd.io
                  - docker-buildx-plugin
                  - docker-compose-plugin
                  - python3-docker
                state: present
                update_cache: true

        - name: Ensure Docker service is running and enabled
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Verify Docker API responsiveness
          ansible.builtin.command: docker info
          changed_when: false
          register: docker_info
          failed_when: "'Containers' not in docker_info.stdout"

    - name: Section 4 - Environment Cleanup
      tags: [preconditioning, cleanup, docker]
      block:
        - name: Stop existing project containers
          community.docker.docker_container:
            name: "{{ item }}"
            state: stopped
          loop: "{{ project_containers }}"
          failed_when: false

    - name: Section 5 - Network Preconditioning (Systemd-resolved)
      tags: [preconditioning, systemd_dns, network]
      block:
        - name: Create resolved config directory
          ansible.builtin.file:
            path: /etc/systemd/resolved.conf.d/
            state: directory
            mode: '0755'

        - name: Configure stub listener
          ansible.builtin.copy:
            dest: /etc/systemd/resolved.conf.d/adguard-bind.conf
            content: |
              [Resolve]
              DNS={{ dns_server }}
              DNSStubListener=no
            mode: '0644'
          register: resolved_config

        - name: Symlink resolv.conf
          ansible.builtin.file:
            src: /run/systemd/resolve/resolv.conf
            dest: /etc/resolv.conf
            state: link
            force: true

        - name: Restart systemd-resolved
          ansible.builtin.systemd:
            name: systemd-resolved
            state: restarted
          when: resolved_config.changed

    - name: Section 6 - Identity Preconditioning (Service Accounts)
      tags: [preconditioning, account_setup, users]
      block:
        - name: Ensure service groups exist
          ansible.builtin.group:
            name: "{{ item.key }}"
            gid: "{{ item.value }}"
            state: present
          loop: "{{ service_users | dict2items }}"

        - name: Ensure service users exist
          ansible.builtin.user:
            name: "{{ item.key }}"
            uid: "{{ item.value }}"
            group: "{{ item.key }}"
            shell: /usr/sbin/nologin
            system: true
          loop: "{{ service_users | dict2items }}"

    # NEW LOGIC FOR THE 'CORE' FOLDER
    - name: Sync core project files
      ansible.builtin.copy:
        src: "{{ repo_source }}/core/"
        dest: "{{ target_base }}/core/"
        owner: root
        group: root
        mode: '0750'
        directory_mode: '0750'
      tags: [files]

    # SYNC SERVICE DIRECTORIES
    - name: Sync service directories
      ansible.builtin.copy:
        src: "{{ repo_source }}/{{ item.folder }}/"
        dest: "{{ target_base }}/{{ item.folder }}/"
        owner: "{{ service_users[item.owner] }}"
        group: "{{ service_users[item.owner] }}"
        mode: '0640'
        directory_mode: '0750'
      loop: "{{ service_dirs }}"
      tags: [files]

    - name: Bootstrap PKI and Step-CA
      tags: [pki, stepca]
      block:
        - name: Ensure Step-CA directory structure exists
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.step }}" # Direct reference
            group: "{{ service_users.step }}"
            mode: '0700'
          loop:
            - "{{ target_base }}/stepca/data/secrets"
            - "{{ target_base }}/stepca/data/artifacts"
            - "{{ target_base }}/stepca/data/certs"

        - name: Generate CA password if missing
          ansible.builtin.shell:
            cmd: "openssl rand -base64 32 > {{ target_base }}/stepca/data/secrets/password"
            creates: "{{ target_base }}/stepca/data/secrets/password"

        - name: Set password file permissions
          ansible.builtin.file:
            path: "{{ target_base }}/stepca/data/secrets/password"
            owner: "{{ service_users.step }}"
            group: "{{ service_users.step }}"
            mode: '0600'

        - name: Generate Root CA via EasyRSA script
          ansible.builtin.command:
            cmd: "bash {{ target_base }}/easyrsa/sign-certs.sh --generate-rootca --crt-path {{ target_base }}/stepca/data/certs/root_ca.crt"
            creates: "{{ target_base }}/stepca/data/certs/root_ca.crt"

        - name: Check if Step-CA is initialized
          ansible.builtin.stat:
            path: "{{ target_base }}/stepca/data/config/ca.json"
          register: ca_json

        - name: Initialize Step-CA
          when: not ca_json.stat.exists
          community.docker.docker_container:
            name: step_ca_init
            image: smallstep/step-ca:latest
            volumes:
              - "{{ target_base }}/stepca/data:/home/step"
            user: "{{ service_users.step }}:{{ service_users.step }}"
            entrypoint: /usr/local/bin/step
            command: >
              ca init --name="{{ ca_name }}" --dns="{{ url_stepca }}" --address=":9000"
              --provisioner="admin" --password-file="/home/step/secrets/password"
              --provisioner-password-file="/home/step/secrets/password"
            detach: false
            cleanup: true

        - name: Create Intermediate CSR
          community.docker.docker_container:
            name: step_ca_int_csr
            image: smallstep/step-ca:latest
            volumes:
              - "{{ target_base }}/stepca/data:/home/step"
            user: "{{ service_users.step }}:{{ service_users.step }}"
            entrypoint: /usr/local/bin/step
            command: >
              certificate create "Intermediate CA"
              /home/step/artifacts/intermediate.csr /home/step/secrets/intermediate_ca_key
              --csr --force --no-password --insecure
            detach: false
            cleanup: true

        - name: Sign Intermediate CSR via EasyRSA script
          ansible.builtin.command:
            cmd: >
              bash {{ target_base }}/easyrsa/sign-certs.sh 
              --csr-path {{ target_base }}/stepca/data/artifacts/intermediate.csr
              --crt-path {{ target_base }}/stepca/data/certs/intermediate_ca.crt
              --chown {{ service_users.step }}:{{ service_users.step }}

        - name: Update ca.json paths surgically
          ansible.builtin.replace:
            path: "{{ target_base }}/stepca/data/config/ca.json"
            regexp: '"{{ item.key }}": ".*"'
            replace: '"{{ item.key }}": "{{ item.value }}"'
          loop:
            - { key: 'root', value: '/home/step/certs/root_ca.crt' }
            - { key: 'crt', value: '/home/step/certs/intermediate_ca.crt' }
            - { key: 'key', value: '/home/step/secrets/intermediate_ca_key' }

        - name: Verify Intermediate Certificate
          ansible.builtin.command:
            cmd: "openssl verify -CAfile {{ target_base }}/stepca/data/certs/root_ca.crt {{ target_base }}/stepca/data/certs/intermediate_ca.crt"
          changed_when: false
