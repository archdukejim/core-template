---
- name: Core Infrastructure Configuration
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - vars.yaml

  pre_tasks:
    - name: Pre-render vars.yaml (resolves Jinja2 in dict keys)
      tags: [always]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/vars.yaml"
        dest: "/tmp/.core-vars-rendered.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "/tmp/.core-vars-rendered.yaml"

    - name: Compute LDAP facts from domain
      tags: [always]
      ansible.builtin.set_fact:
        ldap_domain_components: "{{ domain.split('.') }}"
        ldap_base_dn: "{{ domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

  tasks:
    # =================================================================
    # SECTION 1 — OS Validation
    # =================================================================
    - name: Section 1 - OS Validation
      tags: [preconditioning, validation, always]
      block:
        - name: Ensure target OS is Ubuntu
          ansible.builtin.assert:
            that:
              - ansible_facts["distribution"] == "Ubuntu"
            fail_msg: "This playbook requires Ubuntu. Detected: {{ ansible_facts['distribution'] }}"

        - name: Warn if not Ubuntu 24.04
          ansible.builtin.debug:
            msg: "WARNING: Running Ubuntu {{ ansible_facts['distribution_version'] }}. Optimized for 24.04."
          when: ansible_facts["distribution_version"] != "24.04"

        - name: Check Ansible version is within tested range
          ansible.builtin.assert:
            that:
              - ansible_version.full is version('2.17', '>=')
              - ansible_version.full is version('2.21', '<')
            fail_msg: >-
              Ansible {{ ansible_version.full }} is outside the tested range (2.17 – 2.20.x).
              This playbook may not work correctly. Please install a supported version.
          when: false  # set to true to hard-fail; default is warn only

        - name: Warn if Ansible version is outside tested range
          ansible.builtin.debug:
            msg: >-
              WARNING: Ansible {{ ansible_version.full }} has not been tested with this playbook.
              Tested range: 2.17 – 2.20.x. Proceed with caution.
          when: ansible_version.full is not version('2.17', '>=') or
                ansible_version.full is not version('2.21', '<')

    # =================================================================
    # SECTION 2 — Core Dependencies
    # =================================================================
    - name: Section 2 - Core Dependency Setup
      tags: [preconditioning, pkg_mgmt]
      block:
        - name: Install prerequisite packages from offline bundle
          when: offline_prereqs_dir is defined
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              DEB_DIR="{{ offline_prereqs_dir }}/apt"
              mapfile -t _debs < <(find "$DEB_DIR" -name "*.deb" 2>/dev/null | sort)
              [ "${#_debs[@]}" -gt 0 ] || { echo "No .deb files found in ${DEB_DIR}"; exit 1; }
              echo "Installing ${#_debs[@]} packages from bundle..."
              dpkg -i --force-depends "${_debs[@]}" 2>&1 | \
                grep -v '^\(Reading database\|Preparing to unpack\|Unpacking\|Setting up\|Processing triggers\)' || true
              apt-get install -f -y --no-install-recommends \
                -o Dir::Cache::Archives="${DEB_DIR}" \
                -o APT::Get::AllowUnauthenticated=true 2>/dev/null || true
            executable: /bin/bash
          changed_when: true

        - name: Install prerequisite system packages
          when: offline_prereqs_dir is not defined
          ansible.builtin.apt:
            name:
              - acl
              - openssl
              - ca-certificates
              - curl
              - gnupg
              - ufw
              - libssl-dev
            state: present
            update_cache: true

    # =================================================================
    # SECTION 3 — Docker Engine
    # =================================================================
    - name: Section 3 - Docker Engine Installation
      tags: [preconditioning, docker_engine]
      block:
        - name: Check if Docker is installed
          ansible.builtin.command: docker --version
          register: docker_installed
          ignore_errors: true
          changed_when: false

        - name: Install Docker from official repository
          when: docker_installed.rc != 0 and offline_prereqs_dir is not defined
          block:
            - name: Create keyrings directory
              ansible.builtin.file:
                path: /etc/apt/keyrings
                state: directory
                mode: '0755'

            - name: Download Docker GPG key
              ansible.builtin.get_url:
                url: https://download.docker.com/linux/ubuntu/gpg
                dest: /etc/apt/keyrings/docker.asc
                mode: '0644'

            - name: Add Docker repository
              ansible.builtin.apt_repository:
                repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
                state: present

            - name: Install Docker Engine and Python SDK
              ansible.builtin.apt:
                name:
                  - docker-ce
                  - docker-ce-cli
                  - containerd.io
                  - docker-buildx-plugin
                  - docker-compose-plugin
                  - python3-docker
                state: present
                update_cache: true

        - name: Ensure Docker service is running and enabled
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Verify Docker API responsiveness
          ansible.builtin.command: docker info
          changed_when: false
          register: docker_info
          failed_when: "'Containers' not in docker_info.stdout"

        - name: Load Docker images from offline bundle
          when: offline_prereqs_dir is defined
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              IMG_DIR="{{ offline_prereqs_dir }}/images"
              loaded=0
              for tar in "${IMG_DIR}"/*.tar; do
                [ -f "$tar" ] || continue
                echo "Loading $(basename "$tar")..."
                docker load -i "$tar"
                (( loaded++ )) || true
              done
              echo "Loaded ${loaded} image(s) from bundle."
            executable: /bin/bash
          changed_when: true

    # =================================================================
    # SECTION 4 — Environment Cleanup
    # =================================================================
    - name: Section 4 - Environment Cleanup
      tags: [preconditioning, cleanup]
      block:
        - name: Remove existing project containers
          community.docker.docker_container:
            name: "{{ item }}"
            state: absent
          loop: "{{ project_containers }}"
          failed_when: false

    # =================================================================
    # SECTION 5 — Network Preconditioning
    # =================================================================
    - name: Section 5 - Network Preconditioning
      tags: [preconditioning, network]
      block:
        - name: Create resolved config directory
          ansible.builtin.file:
            path: /etc/systemd/resolved.conf.d/
            state: directory
            mode: '0755'

        - name: Disable systemd-resolved stub listener (use public DNS during bootstrap)
          ansible.builtin.copy:
            dest: /etc/systemd/resolved.conf.d/core-dns.conf
            content: |
              [Resolve]
              DNS=1.1.1.1
              DNSStubListener=no
            mode: '0644'
          register: resolved_config

        - name: Symlink resolv.conf to systemd-resolved
          ansible.builtin.file:
            src: /run/systemd/resolve/resolv.conf
            dest: /etc/resolv.conf
            state: link
            force: true

        - name: Restart systemd-resolved
          ansible.builtin.systemd:
            name: systemd-resolved
            state: restarted
          when: resolved_config.changed

    # =================================================================
    # SECTION 5.5 — Firewall Hardening (LAN-only, no internet exposure)
    # =================================================================
    - name: Section 5.5 - Firewall Hardening
      tags: [preconditioning, network, firewall]
      block:
        - name: Set UFW default deny incoming
          community.general.ufw:
            direction: incoming
            default: deny

        - name: Set UFW default allow outgoing
          community.general.ufw:
            direction: outgoing
            default: allow

        - name: Allow SSH from LAN
          community.general.ufw:
            rule: allow
            port: '22'
            proto: tcp
            src: '{{ lan_cidr }}'

        - name: Allow DNS (TCP/UDP) from LAN
          community.general.ufw:
            rule: allow
            port: '53'
            proto: "{{ item }}"
            src: '{{ lan_cidr }}'
          loop: [tcp, udp]

        - name: Allow HTTP from LAN
          community.general.ufw:
            rule: allow
            port: '80'
            proto: tcp
            src: '{{ lan_cidr }}'

        - name: Allow HTTPS from LAN
          community.general.ufw:
            rule: allow
            port: '443'
            proto: tcp
            src: '{{ lan_cidr }}'

        - name: Allow DoT from LAN
          community.general.ufw:
            rule: allow
            port: '853'
            proto: tcp
            src: '{{ lan_cidr }}'

        - name: Allow LDAP/LDAPS from LAN
          community.general.ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
            src: '{{ lan_cidr }}'
          loop: ['389', '636']

        - name: Enable UFW
          community.general.ufw:
            state: enabled

    # =================================================================
    # SECTION 6 — Service Accounts
    # =================================================================
    - name: Section 6 - Identity Preconditioning
      tags: [preconditioning, users]
      block:
        - name: Check if UIDs are already in use
          ansible.builtin.command:
            cmd: "getent passwd {{ item.value.uid }}"
          loop: "{{ service_users | dict2items }}"
          register: uid_check
          changed_when: false
          failed_when: false

        - name: Fail if UID is taken by a different user
          ansible.builtin.fail:
            msg: >-
              UID {{ item.item.value.uid }} is already in use by '{{ item.stdout.split(':')[0] }}'
              but service '{{ item.item.key }}' expects to own it.
              Either free the UID or update service_users in vars.yaml.
          loop: "{{ uid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc == 0
            - item.stdout.split(':')[0] != item.item.key

        - name: Check if GIDs are already in use
          ansible.builtin.command:
            cmd: "getent group {{ item.value.gid }}"
          loop: "{{ service_users | dict2items }}"
          register: gid_check
          changed_when: false
          failed_when: false

        - name: Fail if GID is taken by a different group
          ansible.builtin.fail:
            msg: >-
              GID {{ item.item.value.gid }} is already in use by '{{ item.stdout.split(':')[0] }}'
              but service '{{ item.item.key }}' expects to own it.
              Either free the GID or update service_users in vars.yaml.
          loop: "{{ gid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc == 0
            - item.stdout.split(':')[0] != item.item.key

        - name: Ensure service groups exist
          ansible.builtin.group:
            name: "{{ item.item.key }}"
            gid: "{{ item.item.value.gid }}"
            state: present
          loop: "{{ gid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc != 0

        - name: Ensure service users exist
          ansible.builtin.user:
            name: "{{ item.item.key }}"
            uid: "{{ item.item.value.uid }}"
            group: "{{ item.item.value.gid }}"
            shell: /usr/sbin/nologin
            system: true
            create_home: false
          loop: "{{ uid_check.results }}"
          when:
            - item.item.value.uid | int != 0
            - item.rc != 0

    # =================================================================
    # SECTION 7 — File Synchronization
    #
    # Tags:
    #   files  — Full sync: copies ALL repo files + renders ALL templates.
    #            Use for initial install or when you explicitly want to
    #            overwrite configs. DANGEROUS on operational systems.
    #   update — Safe subset: renders only scripts (.sh) and static
    #            pages. Does NOT touch service configs (BIND9, nginx,
    #            docker-compose, AdGuard). Safe for live systems.
    #
    # Usage:
    #   --tags files          Full sync (install / rebuild)
    #   --tags update         Scripts only (safe for production)
    #   --check --diff        Dry-run: show what would change
    # =================================================================

    # -----------------------------------------------------------------
    # 7a — Scripts & meta files (safe to auto-update)
    # Tagged 'update' so they run with both --tags files AND --tags update
    # -----------------------------------------------------------------
    - name: Section 7a - Ensure script destination directories exist
      tags: [files, update]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
      loop:
        - "{{ deploy_base_dir }}/easyrsa"
        - "{{ deploy_base_dir }}/nginx/pki"

    - name: Section 7a - Sync core project files (scripts, playbook, vars)
      tags: [files, update]
      ansible.builtin.copy:
        src: "{{ repo_source }}/core/"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: '0750'
        directory_mode: '0750'

    - name: Section 7a - Save pre-rendered vars.yaml to target
      tags: [files, update]
      ansible.builtin.template:
        src: "{{ repo_source }}/core/vars.yaml"
        dest: "{{ deploy_base_dir }}/core/vars.yaml"
        owner: root
        group: root
        mode: '0640'

    - name: Section 7a - Copy root-level project files to core
      tags: [files, update]
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ deploy_base_dir }}/core/"
        owner: root
        group: root
        mode: preserve
      with_fileglob:
        - "{{ repo_source }}/*"

    - name: Section 7a - Render sign-certs.sh from Jinja2 template
      tags: [files, update]
      ansible.builtin.template:
        src: "{{ repo_source }}/easyrsa/sign-certs.sh.j2"
        dest: "{{ deploy_base_dir }}/easyrsa/sign-certs.sh"
        owner: root
        group: root
        mode: '0750'

    - name: Section 7a - Render PKI info page from Jinja2 template
      tags: [files, update]
      ansible.builtin.template:
        src: "{{ repo_source }}/nginx/pki/index.html.j2"
        dest: "{{ deploy_base_dir }}/nginx/pki/index.html"
        owner: "{{ service_users.nginx.uid }}"
        group: "{{ service_users.nginx.gid }}"
        mode: '0644'

    # -----------------------------------------------------------------
    # 7b — Config files (require manual review on operational systems)
    # Only tagged 'files' — skipped by --tags update
    # -----------------------------------------------------------------
    - name: Section 7b - Config sync
      tags: [files]
      block:
        - name: Check which service directories exist in repo
          ansible.builtin.stat:
            path: "{{ repo_source }}/{{ item.folder }}"
          loop: "{{ service_dirs }}"
          register: service_dir_stats
          delegate_to: localhost

        - name: Sync service directories that exist in repo
          ansible.builtin.copy:
            src: "{{ repo_source }}/{{ item.item.folder }}/"
            dest: "{{ deploy_base_dir }}/{{ item.item.folder }}/"
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0640'
            directory_mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: item.stat.exists and item.stat.isdir

        - name: Create service directories missing from repo
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/{{ item.item.folder }}"
            state: directory
            owner: "{{ (service_users[item.item.owner] | default({})).uid | default(0) }}"
            group: "{{ (service_users[item.item.owner] | default({})).gid | default(0) }}"
            mode: '0750'
          loop: "{{ service_dir_stats.results }}"
          when: not item.stat.exists

        - name: Render nginx.conf from Jinja2 template
          ansible.builtin.template:
            src: "{{ repo_source }}/nginx/nginx.conf.j2"
            dest: "{{ deploy_base_dir }}/nginx/nginx.conf"
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0640'

        - name: Render docker-compose.yml from Jinja2 template
          ansible.builtin.template:
            src: "{{ repo_source }}/core/docker-compose.yml.j2"
            dest: "{{ compose_file }}"
            owner: root
            group: root
            mode: '0640'

        - name: Render BIND9 config templates
          ansible.builtin.template:
            src: "{{ repo_source }}/bind9/config/{{ item }}.j2"
            dest: "{{ deploy_base_dir }}/bind9/config/{{ item }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0640'
          loop:
            - named.conf
            - named.conf.acl
            - named.conf.logs
            - named.conf.options
            - named.conf.tls
            - named.conf.zones

        - name: Render BIND9 keys config (restricted permissions)
          ansible.builtin.template:
            src: "{{ repo_source }}/bind9/config/named.conf.keys.j2"
            dest: "{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'

        - name: Render LDAP templates
          ansible.builtin.template:
            src: "{{ repo_source }}/openldap/{{ item }}.j2"
            dest: "{{ deploy_base_dir }}/openldap/{{ item }}"
            owner: "{{ service_users.ldap.uid }}"
            group: "{{ service_users.ldap.gid }}"
            mode: '0640'
          loop:
            - base.ldif
            - ous.ldif
            - groups.ldif
            - acl.ldif

    # -----------------------------------------------------------------
    # 7b+ — DNS zone data (safe to re-render on update or dns-record)
    # -----------------------------------------------------------------
    - name: Section 7b - Render BIND9 zone data files
      tags: [files, update, dns-record]
      ansible.builtin.template:
        src: "{{ repo_source }}/bind9/data/zone.j2"
        dest: "{{ deploy_base_dir }}/bind9/data/db.{{ item.key }}"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'
      vars:
        zone_name: "{{ item.key }}"
        zone_records: "{{ item.value }}"
      loop: "{{ dns | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Section 7b - Render named.conf.zones (new zones from dns-record)
      tags: [dns-record]
      ansible.builtin.template:
        src: "{{ repo_source }}/bind9/config/named.conf.zones.j2"
        dest: "{{ deploy_base_dir }}/bind9/config/named.conf.zones"
        owner: "{{ service_users.bind.uid }}"
        group: "{{ service_users.bind.gid }}"
        mode: '0640'

    # -----------------------------------------------------------------
    # 7c — Cleanup (runs with both files and update)
    # -----------------------------------------------------------------
    - name: Section 7c - Remove Jinja2 source templates from install directories
      tags: [files, update]
      ansible.builtin.shell:
        cmd: "find {{ deploy_base_dir }} -name '*.j2' -type f -delete"
      changed_when: true

    # =================================================================
    # SECTION 8 — PKI Bootstrap
    # =================================================================
    - name: Section 8 - PKI Bootstrap
      tags: [pki, stepca]
      block:
        - name: Ensure Step-CA directory structure
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0700'
          loop:
            - "{{ deploy_base_dir }}/stepca/data/secrets"
            - "{{ deploy_base_dir }}/stepca/data/artifacts"
            - "{{ deploy_base_dir }}/stepca/data/certs"
            - "{{ deploy_base_dir }}/stepca/data/config"
            - "{{ deploy_base_dir }}/stepca/data/templates/certs"

        - name: Render Step-CA leaf certificate template
          ansible.builtin.template:
            src: "{{ repo_source }}/stepca/templates/certs/leaf.tpl.j2"
            dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/leaf.tpl"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0640'

        - name: Render Step-CA subordinate CA certificate template
          ansible.builtin.template:
            src: "{{ repo_source }}/stepca/templates/certs/subca.tpl.j2"
            dest: "{{ deploy_base_dir }}/stepca/data/templates/certs/subca.tpl"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0640'

        - name: Generate CA password if missing
          ansible.builtin.shell:
            cmd: "openssl rand -base64 32 > {{ deploy_base_dir }}/stepca/data/secrets/password"
            creates: "{{ deploy_base_dir }}/stepca/data/secrets/password"

        - name: Set password file ownership and permissions
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data/secrets/password"
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            mode: '0600'

        - name: Generate Root CA via EasyRSA
          ansible.builtin.command:
            cmd: >
              bash {{ deploy_base_dir }}/easyrsa/sign-certs.sh
              --generate-rootca
              --crt-path {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              --expire-days {{ cert_root_ca_days }}
            creates: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"

        - name: Check if Step-CA is initialized
          ansible.builtin.stat:
            path: "{{ deploy_base_dir }}/stepca/data/config/ca.json"
          register: ca_json

        - name: Initialize Step-CA
          when: not ca_json.stat.exists
          block:
            - name: Move Root CA aside to prevent Step-CA overwrite
              ansible.builtin.command:
                cmd: "mv {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt /tmp/root_ca.crt.bak"

            - name: Run Step-CA init
              community.docker.docker_container:
                name: step_ca_init
                image: smallstep/step-ca:latest
                volumes:
                  - "{{ deploy_base_dir }}/stepca/data:/home/step"
                user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
                entrypoint: /usr/local/bin/step
                command: >
                  ca init --name="{{ ca_name }}" --dns="{{ hostname_stepca }}" --address=":9000"
                  --provisioner="admin" --password-file="/home/step/secrets/password"
                  --provisioner-password-file="/home/step/secrets/password"
                detach: false
                cleanup: true

            - name: Restore real Root CA
              ansible.builtin.command:
                cmd: "mv /tmp/root_ca.crt.bak {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"

        - name: Fix Step-CA data ownership before CSR generation
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        - name: Create Intermediate CSR (RSA)
          community.docker.docker_container:
            name: step_ca_int_csr
            image: alpine:latest
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            entrypoint: sh
            command: >
              -c "apk add --no-cache openssl > /dev/null 2>&1 &&
              openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:{{ cert_intermediate_key_param }}
              -out /home/step/secrets/intermediate_ca_key &&
              chmod 600 /home/step/secrets/intermediate_ca_key &&
              openssl req -new -key /home/step/secrets/intermediate_ca_key
              -{{ cert_intermediate_digest }}
              -subj '/C={{ cert_country }}/ST={{ cert_province }}/L={{ cert_city }}/O={{ cert_org }}/OU=Certificate Issuing Authority/CN=Intermediate CA'
              -out /home/step/artifacts/intermediate.csr &&
              chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              /home/step/secrets/intermediate_ca_key /home/step/artifacts/intermediate.csr"
            detach: false
            cleanup: true
          when: cert_intermediate_key_type == "rsa"

        - name: Create Intermediate CSR (EC)
          community.docker.docker_container:
            name: step_ca_int_csr
            image: alpine:latest
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            entrypoint: sh
            command: >
              -c "apk add --no-cache openssl > /dev/null 2>&1 &&
              openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:{{ cert_intermediate_key_param }}
              -out /home/step/secrets/intermediate_ca_key &&
              chmod 600 /home/step/secrets/intermediate_ca_key &&
              openssl req -new -key /home/step/secrets/intermediate_ca_key
              -subj '/C={{ cert_country }}/ST={{ cert_province }}/L={{ cert_city }}/O={{ cert_org }}/OU=Certificate Issuing Authority/CN=Intermediate CA'
              -out /home/step/artifacts/intermediate.csr &&
              chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              /home/step/secrets/intermediate_ca_key /home/step/artifacts/intermediate.csr"
            detach: false
            cleanup: true
          when: cert_intermediate_key_type != "rsa"

        - name: Sign Intermediate CSR via EasyRSA
          ansible.builtin.command:
            cmd: >
              bash {{ deploy_base_dir }}/easyrsa/sign-certs.sh
              --csr-path {{ deploy_base_dir }}/stepca/data/artifacts/intermediate.csr
              --crt-path {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              --chown {{ service_users.step.uid }}:{{ service_users.step.gid }}
              --expire-days {{ cert_intermediate_days }}

        - name: Update ca.json certificate paths and dnsNames
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              cfg['root'] = '/home/step/certs/root_ca.crt'
              cfg['crt']  = '/home/step/certs/intermediate_ca.crt'
              cfg['key']  = '/home/step/secrets/intermediate_ca_key'
              cfg['dnsNames'] = ['{{ hostname_stepca }}']
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        - name: Set Step-CA certificate lifetimes in ca.json
          ansible.builtin.shell:
            cmd: |
              python3 -c "
              import json
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'r') as f:
                  cfg = json.load(f)
              auth = cfg['authority']
              # Authority-level max: enables subordinate CA issuance when allowed
              {% if stepca_cert_allow_subordinate_ca | bool %}
              auth.setdefault('claims', {})
              auth['claims']['maxTLSCertDuration'] = '{{ stepca_cert_max_lifetime_hours }}'
              {% endif %}
              # ACME provisioner: default lifetime and x509 template for leaf certs
              for p in auth.get('provisioners', []):
                  if p.get('type') == 'ACME':
                      p.setdefault('claims', {})
                      p['claims']['defaultTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p['claims']['maxTLSCertDuration'] = '{{ cert_acme_lifetime_hours }}'
                      p.setdefault('options', {})
                      p['options']['x509'] = {
                          'templateFile': '/home/step/templates/certs/leaf.tpl'
                      }
              with open('{{ deploy_base_dir }}/stepca/data/config/ca.json', 'w') as f:
                  json.dump(cfg, f, indent='\t')
              "
          changed_when: true

        - name: Set Step-CA data ownership
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/stepca/data"
            state: directory
            owner: "{{ service_users.step.uid }}"
            group: "{{ service_users.step.gid }}"
            recurse: true

        - name: Verify Intermediate Certificate chain
          ansible.builtin.command:
            cmd: >
              openssl verify -CAfile {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
          changed_when: false

    # =================================================================
    # SECTION 9 — BIND9 TSIG Keys & Static TLS
    # =================================================================
    - name: Section 9 - BIND9 Infrastructure
      tags: [pki, bind9, tsig]
      block:
        - name: Set primary TSIG key fact
          ansible.builtin.set_fact:
            tsig_primary: "{{ tsig_keys | selectattr('primary', 'defined') | selectattr('primary', 'equalto', true) | first }}"

        - name: Generate shared TSIG secret
          ansible.builtin.command:
            cmd: openssl rand -base64 32
          register: tsig_secret
          changed_when: false

        - name: Write BIND9 TSIG key file
          ansible.builtin.copy:
            dest: "{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            content: |
              key "{{ tsig_primary.name }}" {
                  algorithm {{ tsig_primary.algorithm }};
                  secret "{{ tsig_secret.stdout }}";
              };
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0600'

        - name: Ensure BIND9 TLS directory exists
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/bind9/ssl"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0700'

        - name: Mint static TLS certificate for BIND9
          community.docker.docker_container:
            name: bind9_tls_mint
            image: smallstep/step-ca:latest
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
            entrypoint: /usr/local/bin/step
            command: >
              certificate create "{{ hostname_bind9 }}"
              "/home/step/artifacts/bind9.crt" "/home/step/artifacts/bind9.key"
              --ca "/home/step/certs/intermediate_ca.crt"
              --ca-key "/home/step/secrets/intermediate_ca_key"
              --no-password --insecure --force
              --not-after {{ cert_service_days * 24 }}h
              --template /home/step/templates/certs/leaf.tpl
              --san {{ hostname_bind9 }} --san ns.{{ domain }} --san 127.0.0.1
            detach: false
            cleanup: true

        - name: Move BIND9 TLS key
          ansible.builtin.command:
            cmd: >
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9.key
              {{ deploy_base_dir }}/bind9/ssl/privkey.pem

        - name: Move BIND9 TLS cert
          ansible.builtin.command:
            cmd: >
              mv {{ deploy_base_dir }}/stepca/data/artifacts/bind9.crt
              {{ deploy_base_dir }}/bind9/ssl/cert.pem

        - name: Build BIND9 fullchain
          ansible.builtin.shell:
            cmd: >
              cat {{ deploy_base_dir }}/bind9/ssl/cert.pem
              {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              > {{ deploy_base_dir }}/bind9/ssl/fullchain.pem

        - name: Remove standalone cert (fullchain replaces it)
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/bind9/ssl/cert.pem"
            state: absent

        - name: Distribute Root CA to BIND9 TLS dir
          ansible.builtin.copy:
            src: "{{ deploy_base_dir }}/stepca/data/certs/root_ca.crt"
            dest: "{{ deploy_base_dir }}/bind9/ssl/root_ca.crt"
            remote_src: true
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0644'

        - name: Set BIND9 TLS file permissions
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: "{{ item.mode }}"
          loop:
            - { path: "{{ deploy_base_dir }}/bind9/ssl/privkey.pem", mode: "0600" }
            - { path: "{{ deploy_base_dir }}/bind9/ssl/fullchain.pem", mode: "0644" }

    # =================================================================
    # SECTION 10c — Extra TSIG Keys
    # =================================================================
    - name: Section 10c - Extra TSIG Keys
      tags: [tsig-keys]
      block:
        - name: Add TSIG key
          ansible.builtin.shell: |
            set -euo pipefail
            KEYS_FILE="{{ deploy_base_dir }}/bind9/config/named.conf.keys"
            ZONES_FILE="{{ deploy_base_dir }}/bind9/config/named.conf.zones"
            KEY_NAME="{{ item.name }}"

            if grep -q "key \"${KEY_NAME}\"" "$KEYS_FILE" 2>/dev/null; then
              echo "Key '${KEY_NAME}' already exists — skipped."
              exit 0
            fi

            SECRET=$(openssl rand -base64 32)

            printf '\nkey "%s" {\n    algorithm {{ item.algorithm | default("hmac-sha256") }};\n    secret "%s";\n};\n' \
              "$KEY_NAME" "$SECRET" >> "$KEYS_FILE"
            chown {{ service_users.bind.uid }}:{{ service_users.bind.gid }} "$KEYS_FILE"
            chmod 600 "$KEYS_FILE"

            {% set key_domain = item.domain | default(domain) %}
            {% for record in item.records %}
            sed -i "/managed outside of Ansible/a\\        grant \"${KEY_NAME}\" name _acme-challenge.{{ record }}.{{ key_domain }}. TXT;" "$ZONES_FILE"
            {% endfor %}
            chown {{ service_users.bind.uid }}:{{ service_users.bind.gid }} "$ZONES_FILE"

            OUT_FILE="{{ item.out | default('/opt/' ~ item.name ~ '/rfc2136.ini') }}"
            mkdir -p "$(dirname "$OUT_FILE")"
            {
              echo "# RFC2136 credentials for TSIG key: ${KEY_NAME}"
              echo "# Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo "dns_rfc2136_server = {{ ip_bind9 }}"
              echo "dns_rfc2136_port = {{ bind_dns_port }}"
              echo "dns_rfc2136_name = ${KEY_NAME}"
              echo "dns_rfc2136_secret = ${SECRET}"
              echo "dns_rfc2136_algorithm = HMAC-SHA256"
              echo "dns_rfc2136_base_domain = {{ key_domain }}"
            } > "$OUT_FILE"
            chmod 600 "$OUT_FILE"
            echo "[+] TSIG key '${KEY_NAME}' added. Credentials: ${OUT_FILE}"
          args:
            executable: /bin/bash
          loop: "{{ tsig_keys | rejectattr('primary', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          register: tsig_key_result
          changed_when: "'already exists' not in tsig_key_result.stdout"
          when: tsig_keys | rejectattr('primary', 'defined') | list | length > 0

        - name: Check if bind9 container is running
          ansible.builtin.command:
            cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
          register: bind9_running
          failed_when: false
          changed_when: false

        - name: Reload BIND9 after adding TSIG keys
          ansible.builtin.command:
            cmd: "docker exec bind9 rndc reload"
          when: >
            tsig_keys | rejectattr('primary', 'defined') | list | length > 0 and
            (tsig_key_result.results | selectattr('changed') | list | length > 0) and
            bind9_running.rc == 0 and
            bind9_running.stdout | trim == 'true'

    # =================================================================
    # SECTION 10d — Certificate Minting
    # =================================================================
    - name: Section 10d - Certificate Minting
      tags: [mint-certs]
      block:
        - name: Mint certificate
          ansible.builtin.shell: |
            set -euo pipefail
            STEPCA_DATA="{{ deploy_base_dir }}/stepca/data"
            STEPCA_IMAGE="smallstep/step-ca:latest"
            STEP_UID={{ service_users.step.uid }}
            STEP_GID={{ service_users.step.gid }}

            CN="{{ item.cn }}"
            DAYS="{{ item.days | default(365) }}"
            OUT_DIR="{{ item.out_dir | default('') }}"

            {% if item.is_ca | default(false) %}
            CERT_TEMPLATE="/home/step/templates/certs/subca.tpl"
            SAN_ARGS=()
            EXTRA_ARGS=("--set" "pathLen={{ item.path_len | default(0) }}")
            {% else %}
            CERT_TEMPLATE="/home/step/templates/certs/leaf.tpl"
            SAN_ARGS=("--san" "$CN")
            {% for san in item.sans | default([]) %}
            SAN_ARGS+=("--san" "{{ san }}")
            {% endfor %}
            EXTRA_ARGS=()
            {% endif %}

            [[ "$(id -u)" -eq 0 ]] || { echo "ERROR: must be run as root."; exit 1; }

            if [ -n "$OUT_DIR" ]; then
              TARGET_DIR="$OUT_DIR"
            elif [ -n "${SUDO_USER:-}" ]; then
              TARGET_DIR=$(getent passwd "$SUDO_USER" | cut -d: -f6)
            else
              TARGET_DIR="$HOME"
            fi

            [ -d "$TARGET_DIR" ] || { echo "ERROR: Output directory does not exist: $TARGET_DIR"; exit 1; }

            SAFE_CN=$(echo "$CN" | tr './ ' '---')
            KEY_OUT="${TARGET_DIR}/${SAFE_CN}.key"
            CRT_OUT="${TARGET_DIR}/${SAFE_CN}.crt"

            [ -f "${STEPCA_DATA}/certs/intermediate_ca.crt" ]  || { echo "ERROR: Intermediate CA cert not found."; exit 1; }
            [ -f "${STEPCA_DATA}/secrets/intermediate_ca_key" ] || { echo "ERROR: Intermediate CA key not found."; exit 1; }
            [ -f "$STEPCA_DATA/templates/certs/$(basename "$CERT_TEMPLATE")" ] \
              || { echo "ERROR: Template not found: $CERT_TEMPLATE. Run Ansible Section 8 first."; exit 1; }

            ARTIFACTS="${STEPCA_DATA}/artifacts"
            mkdir -p "$ARTIFACTS"
            chown "${STEP_UID}:${STEP_GID}" "$ARTIFACTS"

            echo "Generating certificate for ${CN} (validity: ${DAYS} days)..."
            docker run --rm \
              -v "${STEPCA_DATA}:/home/step" \
              --user "${STEP_UID}:${STEP_GID}" \
              --entrypoint /usr/local/bin/step \
              "$STEPCA_IMAGE" \
              certificate create "$CN" \
              /home/step/artifacts/leaf.crt /home/step/artifacts/leaf.key \
              --ca /home/step/certs/intermediate_ca.crt \
              --ca-key /home/step/secrets/intermediate_ca_key \
              --no-password --insecure --force \
              --not-after "$(( DAYS * 24 ))h" \
              --template "$CERT_TEMPLATE" \
              "${SAN_ARGS[@]+"${SAN_ARGS[@]}"}" \
              "${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}"

            mv "${ARTIFACTS}/leaf.key" "$KEY_OUT"
            mv "${ARTIFACTS}/leaf.crt" "$CRT_OUT"

            if [ -n "${SUDO_USER:-}" ]; then
              SUDO_GID=$(id -g "$SUDO_USER")
              chown "${SUDO_USER}:${SUDO_GID}" "$KEY_OUT" "$CRT_OUT"
            fi
            chmod 0600 "$KEY_OUT"
            chmod 0644 "$CRT_OUT"

            echo ""
            echo "Certificate minted:"
            echo "  Key:  $KEY_OUT"
            echo "  Cert: $CRT_OUT"
            openssl x509 -in "$CRT_OUT" -noout -subject -dates -ext basicConstraints -ext subjectAltName 2>/dev/null || true
          args:
            executable: /bin/bash
          loop: "{{ extra_certs | default([]) }}"
          loop_control:
            label: "{{ item.cn }}"
          when: extra_certs | default([]) | length > 0

    # =================================================================
    # SECTION 10e — DNS Record Reload
    # =================================================================
    - name: Section 10e - Reload BIND9 after DNS record changes
      tags: [dns-record]
      block:
        - name: Check if bind9 container is running (dns-record)
          ansible.builtin.command:
            cmd: "docker inspect --format={{ '{{' }}.State.Running{{ '}}' }} bind9"
          register: bind9_running_dns
          failed_when: false
          changed_when: false

        - name: Reload BIND9 zones
          ansible.builtin.command:
            cmd: "docker exec bind9 rndc reload"
          register: rndc_result
          changed_when: true
          failed_when: rndc_result.rc != 0
          when: bind9_running_dns.rc == 0 and bind9_running_dns.stdout | trim == 'true'

        - name: Show rndc reload output
          ansible.builtin.debug:
            msg: "{{ rndc_result.stdout }}"
          when: rndc_result is not skipped and rndc_result.stdout | default('') | length > 0

    # =================================================================
    # SECTION 11 — Service Runtime Directories
    # =================================================================
    - name: Section 11 - Service Runtime Directories
      tags: [files]
      block:
        - name: Ensure BIND9 writable directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ service_users.bind.uid }}"
            group: "{{ service_users.bind.gid }}"
            mode: '0750'
          loop:
            - "{{ deploy_base_dir }}/bind9/data"
            - "{{ deploy_base_dir }}/bind9/log"
            - "{{ deploy_base_dir }}/bind9/cache"

    # =================================================================
    # SECTION 13 — Service Certificate Issuance (offline, via Step-CA)
    # =================================================================
    - name: Section 13 - Service Certificate Issuance
      tags: [pki, bootstrap]
      block:
        - name: Start BIND9 and Step-CA for bootstrap
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} up -d bind9 step-ca"

        - name: Wait for BIND9 and Step-CA to become healthy
          ansible.builtin.shell:
            cmd: >
              test "$(docker inspect -f '{{ '{{' }}.State.Health.Status{{ '}}' }}' bind9)" = "healthy" &&
              test "$(docker inspect -f '{{ '{{' }}.State.Health.Status{{ '}}' }}' step-ca)" = "healthy"
          register: health_check
          until: health_check.rc == 0
          retries: 30
          delay: 5
          changed_when: false

        - name: Verify BIND9 zone file syntax
          ansible.builtin.command:
            cmd: docker exec -u {{ service_users.bind.uid }} bind9 named-checkzone {{ item }} /var/lib/bind/db.{{ item }}
          register: bind9_zone_check
          changed_when: false
          loop: "{{ dns.keys() | list }}"
          loop_control:
            label: "{{ item }}"

        - name: Define service certificate targets
          ansible.builtin.set_fact:
            service_cert_targets:
              - { cn: "{{ hostname_bind9 }}", safe: "bind9_svc" }
              - { cn: "{{ hostname_ldap }}",  safe: "ldap_svc"  }
              - { cn: "{{ hostname_stepca }}", safe: "stepca_svc" }

        - name: Ensure nginx cert directories exist
          ansible.builtin.file:
            path: "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}"
            state: directory
            owner: "{{ service_users.nginx.uid }}"
            group: "{{ service_users.nginx.gid }}"
            mode: '0750'
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        - name: Mint service TLS certificates offline
          community.docker.docker_container:
            name: "svc_cert_{{ item.safe }}"
            image: smallstep/step-ca:latest
            volumes:
              - "{{ deploy_base_dir }}/stepca/data:/home/step"
            user: "{{ service_users.step.uid }}:{{ service_users.step.gid }}"
            entrypoint: /usr/local/bin/step
            command: >
              certificate create "{{ item.cn }}"
              "/home/step/artifacts/{{ item.safe }}.crt"
              "/home/step/artifacts/{{ item.safe }}.key"
              --ca "/home/step/certs/intermediate_ca.crt"
              --ca-key "/home/step/secrets/intermediate_ca_key"
              --no-password --insecure --force
              --not-after {{ cert_service_days * 24 }}h
              --template /home/step/templates/certs/leaf.tpl
              --san {{ item.cn }}
            detach: false
            cleanup: true
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

        - name: Install service certificates for nginx
          ansible.builtin.shell:
            cmd: |
              cat "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.crt" \
                  "{{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt" \
                  > "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
              mv "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.key" \
                 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              rm -f "{{ deploy_base_dir }}/stepca/data/artifacts/{{ item.safe }}.crt"
              chown {{ service_users.nginx.uid }}:{{ service_users.nginx.gid }} \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem" \
                "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 640 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/privkey.pem"
              chmod 644 "{{ deploy_base_dir }}/nginx/certs/{{ item.cn }}/fullchain.pem"
            executable: /bin/bash
          loop: "{{ service_cert_targets }}"
          loop_control:
            label: "{{ item.cn }}"

    # =================================================================
    # SECTION 14 — Final Verification & Shutdown
    # =================================================================
    - name: Section 14 - Verification and Cleanup
      tags: [verify]
      block:
        - name: Wait for certificate propagation
          ansible.builtin.pause:
            seconds: 3

        - name: Verify service certificates
          ansible.builtin.shell:
            cmd: >-
              openssl verify
              -CAfile {{ deploy_base_dir }}/stepca/data/certs/root_ca.crt
              -untrusted {{ deploy_base_dir }}/stepca/data/certs/intermediate_ca.crt
              {{ deploy_base_dir }}/nginx/certs/{{ item }}/fullchain.pem
          loop:
            - "{{ hostname_bind9 }}"
            - "{{ hostname_ldap }}"
            - "{{ hostname_stepca }}"
          register: cert_verify
          changed_when: false
          failed_when: cert_verify.rc != 0

        - name: Shut down bootstrap stack
          ansible.builtin.command:
            cmd: "docker compose -f {{ compose_file }} down"

        - name: Clean up any orphaned Step-CA containers
          ansible.builtin.shell:
            cmd: "docker ps -q --filter 'ancestor=smallstep/step-ca:latest' | xargs -r docker stop"
          changed_when: false
          failed_when: false

        - name: Installation complete
          ansible.builtin.debug:
            msg: "Core infrastructure installation complete. Run 'docker compose up -d' from {{ deploy_base_dir }}/core/ to start services."

    # =================================================================
    # SECTION 15 — Start Services (opt-in: pass -e start_services=true)
    # =================================================================
    - name: Section 15 - Start Docker Compose stack
      tags: [compose-up]
      when: start_services | default(false) | bool
      block:
        - name: Start full compose stack
          community.docker.docker_compose_v2:
            project_src: "{{ deploy_base_dir }}/core"
            state: present
          register: compose_result

        - name: Show compose startup summary
          ansible.builtin.debug:
            msg: >-
              Started {{ compose_result.containers | selectattr('State', 'equalto', 'running') | list | length }}
              container(s):
              {{ compose_result.containers | selectattr('State', 'equalto', 'running') | map(attribute='Name') | join(', ') }}