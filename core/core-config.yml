---
# Core Infrastructure Configuration — main entry point
#
# Imports each section playbook in sequence for a full install.
# Individual playbooks can be run directly for targeted operations:
#
#   ansible-playbook core/08-pki.yml          -e target_host=core
#   ansible-playbook core/10d-mint-certs.yml  -e target_host=core -e @extra_certs.yml
#   ansible-playbook core/07-files.yml        -e target_host=core --tags update
#
# Full install (all sections):
#   ansible-playbook core/core-config.yml     -e target_host=core

- import_playbook: 01-validate.yml
- import_playbook: 02-dependencies.yml
- import_playbook: 03-docker.yml
- import_playbook: 04-cleanup.yml
- import_playbook: 05-network.yml
- import_playbook: 06-service-accounts.yml
- import_playbook: 07-files.yml
- import_playbook: 08-pki.yml
- import_playbook: 09-bind9-tsig.yml
- import_playbook: 10c-tsig-extra.yml
- import_playbook: 10d-mint-certs.yml
- import_playbook: 10e-dns-reload.yml
- import_playbook: 11-runtime-dirs.yml
- import_playbook: 13-service-certs.yml
- import_playbook: 14-verify.yml
- import_playbook: 15-start-services.yml
