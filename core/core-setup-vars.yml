# ===================================================================
# Core Infrastructure Variables
# ===================================================================

# --- Paths ---
repo_source: "/home/default_admin/home-core"
target_base: "/opt"
compose_file: "{{ target_base }}/core/docker-compose.yml"

# --- Host DNS (used during bootstrap before BIND9 is running) ---
dns_server: "192.168.4.2"

# --- Firewall ---
lan_cidr: "192.168.0.0/16"

# --- Network Infrastructure ---
domain_top: "internal"
core_subnet: "172.30.255.0/24"

ip_nginx: "172.30.255.10"
ip_adguard: "172.30.255.20"
ip_bind9: "172.30.255.30"
ip_stepca: "172.30.255.40"
ip_ldap: "172.30.255.50"

url_nginx: "core-proxy.{{ domain_top }}"
url_adguard: "adguard.{{ domain_top }}"
url_bind9: "dns.{{ domain_top }}"
url_stepca: "ca.{{ domain_top }}"
url_ldap: "ldap.{{ domain_top }}"

# --- BIND9 ---
bind_dns_port: 5353

# --- Step-CA ---
ca_name: "Church Family CA"
stepca_port: 9000

# --- Localization ---
system_timezone: "America/New_York"

# --- Certbot / ACME ---
tsig_key_name: "acme_dns-01"
tsig_algorithm: "hmac-sha256"
acme_email: "admin@home.internal"
certbot_domains:
  - "adguard.{{ domain_top }}"
  - "ldap.{{ domain_top }}"
  - "ca.{{ domain_top }}"

# --- Containers to stop during setup ---
project_containers:
  - nginx
  - adguardhome
  - certbot
  - step-ca
  - openldap
  - bind9

# --- Service User Mapping (UID:GID) ---
# These map to container-internal user expectations.
# Chosen to avoid conflicts with system accounts and
# align with well-known port numbers where practical.
service_users:
  nginx: 443
  bind: 53
  step: 135
  ldap: 389
  certbot: 0
  adguard: 153

# --- Directory-to-Owner Mapping ---
# 'folder' matches the repo subdirectory name
# 'owner' matches a key in service_users above
service_dirs:
  - { folder: "nginx", owner: "nginx" }
  - { folder: "adguardhome", owner: "adguard" }
  - { folder: "bind9", owner: "bind" }
  - { folder: "stepca", owner: "step" }
  - { folder: "openldap", owner: "ldap" }
  - { folder: "certbot", owner: "certbot" }
  - { folder: "easyrsa", owner: "root" }
