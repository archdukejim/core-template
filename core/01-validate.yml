---
- name: Section 1 - OS Validation
  hosts: "{{ target_host }}"
  become: true
  vars_files:
    - vars.yaml

  pre_tasks:
    - name: Pre-render vars.yaml (resolves Jinja2 in dict keys)
      tags: [always]
      ansible.builtin.template:
        src: "{{ playbook_dir }}/vars.yaml"
        dest: "/tmp/.core-vars-rendered.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Reload resolved vars
      tags: [always]
      ansible.builtin.include_vars:
        file: "/tmp/.core-vars-rendered.yaml"

    - name: Compute LDAP facts from domain
      tags: [always]
      ansible.builtin.set_fact:
        ldap_domain_components: "{{ domain.split('.') }}"
        ldap_base_dn: "{{ domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

  tasks:
    - name: Section 1 - OS Validation
      tags: [preconditioning, validation, always]
      block:
        - name: Ensure target OS is Ubuntu
          ansible.builtin.assert:
            that:
              - ansible_facts["distribution"] == "Ubuntu"
            fail_msg: "This playbook requires Ubuntu. Detected: {{ ansible_facts['distribution'] }}"

        - name: Warn if not Ubuntu 24.04
          ansible.builtin.debug:
            msg: "WARNING: Running Ubuntu {{ ansible_facts['distribution_version'] }}. Optimized for 24.04."
          when: ansible_facts["distribution_version"] != "24.04"

        - name: Check Ansible version is within tested range
          ansible.builtin.assert:
            that:
              - ansible_version.full is version('2.17', '>=')
              - ansible_version.full is version('2.21', '<')
            fail_msg: >-
              Ansible {{ ansible_version.full }} is outside the tested range (2.17 – 2.20.x).
              This playbook may not work correctly. Please install a supported version.
          when: false  # set to true to hard-fail; default is warn only

        - name: Warn if Ansible version is outside tested range
          ansible.builtin.debug:
            msg: >-
              WARNING: Ansible {{ ansible_version.full }} has not been tested with this playbook.
              Tested range: 2.17 – 2.20.x. Proceed with caution.
          when: ansible_version.full is not version('2.17', '>=') or
                ansible_version.full is not version('2.21', '<')
