# ============================================================
# CORE TEMPLATE — ADVANCED / INFRASTRUCTURE CONFIGURATION
#
# System-level settings that are rarely changed.
# User-facing settings (domain, IPs, DNS records, LDAP) are in
# /custom-vars.yaml at the repo root.
# ============================================================

system_timezone: America/New_York

# ============================================================
# FILESYSTEM
# ============================================================
deploy_base_dir: /opt
repo_source: '{{ playbook_dir | dirname | dirname }}'

# ============================================================
# SERVICE HOSTNAMES  (computed from custom-vars domain)
# ============================================================
hostname_nginx: nginx.{{ domain }}
hostname_bind9: dns.{{ domain }}
hostname_stepca: ca.{{ domain }}
hostname_certs: certificates.{{ domain }}
hostname_ldap: ldap.{{ domain }}

# ============================================================
# NETWORK BOOTSTRAP
# ============================================================
# use_host_dns: true  — use the host's existing DNS resolver (default).
#                       dns_server in custom-vars.yaml is ignored.
# use_host_dns: false — configure systemd-resolved to use dns_server
#                       during setup (useful if the host's resolver can't
#                       reach what setup.sh needs).
use_host_dns: true
dns_server: 10.0.0.1

# ============================================================
# SERVICE IPs  (Docker container addresses on core_subnet)
# ============================================================
core_subnet: 10.255.0.0/24
ip_nginx: 10.255.0.10
ip_bind9: 10.255.0.30
ip_stepca: 10.255.0.40
ip_ldap: 10.255.0.50

# ============================================================
# DOCKER IMAGES
# ============================================================
image_nginx: nginx:latest
image_bind9: ubuntu/bind9:latest
image_stepca: smallstep/step-ca:latest
image_alpine_tools: core-alpine-tools:latest
image_openldap: osixia/openldap:latest

# ============================================================
# DOCKER / SERVICE INFRASTRUCTURE
# ============================================================
compose_file: '{{ deploy_base_dir }}/core/docker-compose.yml'
project_containers:
- nginx
- step-ca
- bind9
service_dirs:
- folder: nginx
  owner: nginx
- folder: bind9
  owner: bind
- folder: stepca
  owner: step
- folder: openldap
  owner: ldap
- folder: easyrsa
  owner: root
service_users:
  bind:
    gid: 53
    uid: 53
  ldap:
    gid: 389
    uid: 389
  nginx:
    gid: 443
    uid: 443
  step:
    gid: 135
    uid: 135

# ============================================================
# CERTIFICATES / PKI  (technical params — identity is in custom-vars)
# ============================================================
#
# Root CA and intermediate CA are generated OFFLINE by core/pki/rootca.sh.
# The root CA key is never deployed to the target.
# The installer expects pre-generated artifacts in pki_artifacts_dir.
#
# Adjust these before running rootca.sh init:
cert_root_ca_days: 7300
cert_root_digest: sha512
cert_root_key_type: rsa           # rsa | ec | ed25519
cert_root_key_param: '4096'       # RSA: 2048/3072/4096 | EC: P-256/P-384/P-521 | Ed25519: (ignored)
cert_intermediate_days: 5475
cert_intermediate_digest: sha512
cert_intermediate_key_type: rsa   # rsa | ec | ed25519
cert_intermediate_key_param: '4096'
cert_service_days: 5475           # 15-year leaf TLS certs for all service-tier nginx endpoints

# PKI artifacts path (local — relative to repo root, gitignored)
# Generated by ./root-ca.sh init; override with: -e pki_artifacts_dir=/path/to/dir
pki_artifacts_dir: "{{ repo_source }}/root-ca/output"

# ============================================================
# STEP-CA
# ============================================================
stepca_port: 9000
stepca_cert_allow_subordinate_ca: true
stepca_cert_max_lifetime_hours: "{{ cert_service_days * 24 }}h"  # derived from cert_service_days — keeps provisioner cap in sync
cert_acme_lifetime_hours: 2160h        # default lifetime for ACME-issued leaf certs (90 days)

# ============================================================
# DNS — BIND9
# ============================================================
bind_dns_port: 5353
bind9_doh_port: 8053
bind_acls:
  acme-updaters:
  - '{{ core_subnet }}'
  dns-resolvers:
  - 127.0.0.1
  - '{{ lan_cidr }}'
  - '{{ core_subnet }}'

# ============================================================
# TSIG KEYS
# record_types: controls which DNS record types this key may update via BIND9 update-policy.
# primary: true  — key grants subdomain _acme-challenge <record_types> (ACME DNS-01).
# (no primary)   — key grants zonesub <record_types> (broader zone update rights).
# ============================================================
tsig_keys:
- name: acme_dns-01
  algorithm: hmac-sha256
  domain: '{{ domain }}'
  primary: true
  record_types: [TXT]

# ============================================================
# NGINX BACKENDS
# ============================================================
nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}

# ============================================================
# LDAP GROUPS
# ============================================================
ldap_groups:
- gidNumber: 1100
  name: admins
  permissions:
  - read
  - write
  - modify
- gidNumber: 5000
  name: users
  permissions:
  - read

# ============================================================
# LDAP ORGANIZATIONAL UNITS
# ============================================================
ldap_organizational_units:
- description: User Accounts
  name: accounts
- description: Security Groups
  name: groups
- description: Privileged accounts
  name: admins
  parent: accounts
  uid_range: 1101-1999
- description: Regular User accounts
  name: users
  parent: accounts
  uid_range: 5001-50000
- description: Computer objects
  name: hosts
  uid_range: 2000-4900

