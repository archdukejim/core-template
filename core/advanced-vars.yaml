# ============================================================
# CORE TEMPLATE — ADVANCED / INFRASTRUCTURE CONFIGURATION
#
# System-level settings that are rarely changed.
# User-facing settings (domain, IPs, DNS records, LDAP) are in
# /custom-vars.yaml at the repo root.
# ============================================================

# ============================================================
# FILESYSTEM
# ============================================================
deploy_base_dir: /opt
repo_source: '{{ playbook_dir | dirname | dirname }}'

# ============================================================
# SERVICE HOSTNAMES  (computed from custom-vars domain)
# ============================================================
hostname_nginx: core-proxy.{{ domain }}
hostname_bind9: dns.{{ domain }}
hostname_stepca: ca.{{ domain }}
hostname_ldap: ldap.{{ domain }}

# ============================================================
# DOCKER IMAGES
# ============================================================
image_nginx: nginx:latest
image_bind9: ubuntu/bind9:latest
image_stepca: smallstep/step-ca:latest
image_alpine_tools: core-alpine-tools:latest

# ============================================================
# DOCKER / SERVICE INFRASTRUCTURE
# ============================================================
compose_file: '{{ deploy_base_dir }}/core/docker-compose.yml'
project_containers:
- nginx
- step-ca
- openldap
- bind9
service_dirs:
- folder: nginx
  owner: nginx
- folder: bind9
  owner: bind
- folder: stepca
  owner: step
- folder: openldap
  owner: ldap
- folder: easyrsa
  owner: root
service_users:
  bind:
    gid: 53
    uid: 53
  ldap:
    gid: 389
    uid: 389
  nginx:
    gid: 443
    uid: 443
  step:
    gid: 135
    uid: 135

# ============================================================
# CERTIFICATES / PKI  (technical params — identity is in custom-vars)
# ============================================================
cert_root_ca_days: 7300
cert_root_digest: sha256
cert_root_key_type: rsa
cert_root_key_param: '4096'
cert_intermediate_days: 5475
cert_intermediate_digest: sha256
cert_intermediate_key_type: rsa
cert_intermediate_key_param: '4096'
cert_service_days: 5475           # 15-year leaf TLS certs for all service-tier nginx endpoints

# ============================================================
# STEP-CA
# ============================================================
stepca_port: 9000
stepca_cert_allow_subordinate_ca: true
stepca_cert_max_lifetime_hours: 87600h
cert_acme_lifetime_hours: 2160h        # default lifetime for ACME-issued leaf certs (90 days)

# ============================================================
# DNS — BIND9
# ============================================================
bind_dns_port: 5353
bind9_doh_port: 8053
bind_acls:
  acme-updaters:
  - '{{ core_subnet }}'
  dns-resolvers:
  - 127.0.0.1
  - '{{ lan_cidr }}'
  - '{{ core_subnet }}'

# ============================================================
# NGINX BACKENDS
# ============================================================
nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}
