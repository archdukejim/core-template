# ============================================================
# CORE TEMPLATE — CONFIGURATION
# ============================================================
domain: example.com
hostname: core-server
friendly_name: "Example Org"
vendor: ""

# ============================================================
# NETWORK & DNS
# ============================================================
lan_cidr: 192.168.1.0/24
lan_gateway: 192.168.1.1
host_ip: 192.168.1.100
core_subnet: 10.255.0.0/24

dns:
  dynamic_zone_var:
    zone_authority: true


# ============================================================
# CERTIFICATES / PKI
# ============================================================
ca_name: Example Org CA
cert_country: US
cert_province: State
cert_city: City
cert_org: Example Org
cert_ou: IT

# Uncomment to use your own pre-generated root/intermediate CAs instead of letting Step-CA mint one
# byoc: true
# root_cert_name: root_ca
# ca_crt_path: "/path/to/root_ca.crt"
# ica_crt_path: "/path/to/ica.crt"
# ica_key_path: "/path/to/ica.key"

# ============================================================
# FEATURE FLAGS
# ============================================================
install_keycloak: true

# ============================================================
# HEAVY WORKLOADS
# ============================================================
# Uncomment to move the Keycloak and Postgres databases to an external volume or separate disk.
# keycloak_data_dir: /mnt/ext_drive/keycloak/data
# postgres_data_dir: /mnt/ext_drive/postgres/data
