# ============================================================
# CORE TEMPLATE — CONFIGURATION
# ============================================================
domain: example.com
hostname: core-server
friendly_name: "Example Org"
system_timezone: America/New_York

# ============================================================
# NETWORK & DNS
# ============================================================
lan_cidr: 192.168.1.0/24
lan_gateway: 192.168.1.1
host_ip: 192.168.1.100
core_subnet: 10.255.0.0/24
use_host_dns: true
dns_server: 10.0.0.1
bind_dns_port: 5353
bind9_doh_port: 8053

dns:
  dynamic_zone_var:
    zone_authority: true
    A:
    - { ip: "{{ host_ip }}", name: "{{ hostname }}" }
    - { ip: 192.168.1.10, name: server1 }
    - { ip: 192.168.1.11, name: app-host }
    CNAME:
    - { canonical: "{{ hostname }}", name: ca }
    - { canonical: "{{ hostname }}", name: certificates }
    - { canonical: "{{ hostname }}", name: dns }
    - { canonical: "{{ hostname }}", name: ldap }
    - { canonical: app-host, name: myapp, tsig: acme_app-host }

bind_acls:
  acme-updaters: [ '{{ core_subnet }}' ]
  dns-resolvers: [ 127.0.0.1, '{{ lan_cidr }}', '{{ core_subnet }}' ]

tsig_keys:
- { name: acme_nas25-apps, algorithm: hmac-sha256, domain: '{{ domain }}', record_types: [TXT] }

# ============================================================
# CERTIFICATES / PKI
# ============================================================
ca_name: Example Org CA
cert_country: US
cert_province: State
cert_city: City
cert_org: Example Org
cert_ou: IT

byoc: false
ca_crt_path: "/home/default_admin/output/root_ca.crt"
ica_crt_path: "/home/default_admin/output/ica.crt"

pki_artifacts_dir: "{{ repo_source }}/root-ca/output"
cert_root_ca_days: 3650
cert_root_digest: sha512
cert_root_key_type: rsa
cert_root_key_param: '4096'
cert_intermediate_days: 1825
cert_intermediate_digest: sha512
cert_intermediate_key_type: rsa
cert_intermediate_key_param: '4096'
cert_service_days: 1825

stepca_port: 9000
stepca_cert_allow_subordinate_ca: true
stepca_cert_max_lifetime_hours: "{{ cert_service_days * 24 }}h"
cert_acme_lifetime_hours: 2160h

# ============================================================
# INFRASTRUCTURE
# ============================================================
deploy_base_dir: /opt
repo_source: '{{ playbook_dir | dirname | dirname }}'
compose_file: '{{ deploy_base_dir }}/core/docker-compose.yml'

hostname_nginx: nginx.{{ domain }}
hostname_bind9: dns.{{ domain }}
hostname_stepca: ca.{{ domain }}
hostname_certs: certificates.{{ domain }}
hostname_ldap: ldap.{{ domain }}

ip_nginx: 10.255.0.10
ip_bind9: 10.255.0.30
ip_stepca: 10.255.0.40
ip_ldap: 10.255.0.50

image_nginx: nginx:latest
image_bind9: ubuntu/bind9:latest
image_stepca: smallstep/step-ca:latest
image_openldap: osixia/openldap:latest

project_containers: [ nginx, step-ca, bind9 ]

service_dirs:
- { folder: nginx, owner: nginx }
- { folder: bind9, owner: bind }
- { folder: stepca, owner: step }
- { folder: openldap, owner: ldap }

service_users:
  bind: {uid: 53, gid: 53}
  ldap: {uid: 389, gid: 389}
  nginx: {uid: 443, gid: 443}
  step: {uid: 135, gid: 135}

nginx_backend_ldap: openldap:389
nginx_backend_stepca: https://step-ca:{{ stepca_port }}

# ============================================================
# LDAP
# ============================================================
ldap_groups:
- { gidNumber: 1100, name: admins, permissions: [read, write, modify] }
- { gidNumber: 5000, name: users, permissions: [read] }

ldap_organizational_units:
- { name: accounts, description: User Accounts }
- { name: groups, description: Security Groups }
- { name: admins, description: Privileged accounts, parent: accounts, uid_range: 1101-1999 }
- { name: users, description: Regular User accounts, parent: accounts, uid_range: 5001-50000 }
- { name: hosts, description: Computer objects, uid_range: 2000-4900 }
