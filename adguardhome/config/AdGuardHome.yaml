schema_version: 31 # Ensures the parser uses the modern schema
bind_host: 0.0.0.0
bind_port: 80
auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: "en" # Ensure this is a string, not a list
theme: "auto"

# Fixed Users Section
users:
  - name: "admin"
    password: "$2a$10$f8vU8yH.yR2C9f1S2G2S2.yR2C9f1S2G2S2.yR2C9f1S2G2S2"

dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  statistics_interval: 1
  querylog_enabled: true
  upstream_dns:
    - "1.1.1.1"
    - "8.8.8.8"
    - "8.8.4.4"
tls:
  enabled: false