schema_version: 32
http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:80  # <--- This forces it to Port 80
  session_ttl: 720h
users:
  - name: "admin"
    password: "$2b$10$6aJ4cVHky8oZzQukjJgUJuOoI1MSV8zFclaaKwvXMP4IeX.X4urym" #<--- "password"
auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: "en"
theme: auto
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  ratelimit: 300
  # ... (Rest of your DNS settings stay identical) ...
  upstream_dns:
    - "[/internal/]172.30.255.30:5353"
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  # ... (Rest of your cache/optimistic settings stay identical) ...
  bootstrap_dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
tls:
  enabled: true       # <--- CHANGE 1: Set to false until Certbot runs
  force_https: false   # <--- CHANGE 2: Set to false to avoid redirect loops
  server_name: adguard.internal
  port_https: 443
  port_dns_over_tls: 853
  certificate_path: /etc/letsencrypt/live/adguard.internal/fullchain.pem
  private_key_path: /etc/letsencrypt/live/adguard.internal/privkey.pem


filtering:
  filtering_enabled: true
  rewrites_enabled: true
  # Add your new .internal rewrites here later
  rewrites:
    - domain: portainer.-j-j.family
      answer: 192.168.7.11
      enabled: true
    - domain: apps.j-j.family
      answer: 192.168.7.12
      enabled: true
    - domain: nas25.j-j.family
      answer: 192.168.7.10
      enabled: true
    - domain: '*.j-j.family'
      answer: apps.j-j.family
      enabled: true