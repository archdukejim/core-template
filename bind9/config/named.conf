// 0. ACLS (So ACLs can be appplied)
include "/etc/bind/named.conf.acl";

// 1. KEYS FIRST (So other blocks can reference them)
include "/etc/bind/named.conf.keys";

// 2. TLS PROFILES (Must exist before 'options' uses them)
include "/etc/bind/named.conf.tls";

// 3. GLOBAL OPTIONS (The "brain" of the server)
include "/etc/bind/named.conf.options";

// 4. LOGGING (Independent, but usually here)
include "/etc/bind/named.conf.logging";

// 5. LOCAL ZONES (The actual DNS data)
include "/etc/bind/named.conf.local";