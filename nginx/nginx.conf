# Global settings
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    multi_accept on;
    worker_connections  16384;
}

# DNS / LDAP stream proxies
stream {
    resolver 127.0.0.11 valid=30s;

    # DNS - UDP
    server {
        listen 53 udp reuseport;
        set $adguard_dns "adguardhome:53";
        proxy_pass $adguard_dns;
        proxy_responses 1;
        proxy_timeout 1s;
        proxy_buffer_size 16k;
    }

    # DNS - TCP
    server {
        listen 53;
        set $adguard_dns_tcp "adguardhome:53";
        proxy_pass $adguard_dns_tcp;
        proxy_timeout 3s;
    }

    # DNS over TLS (DoT) — nginx terminates TLS, forwards plain DNS to AdGuard
    server {
        listen 853 ssl;
        set $adguard_dot "adguardhome:53";
        proxy_pass $adguard_dot;
        ssl_certificate     /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        proxy_timeout 10s;
    }

    # LDAP - plain TCP
    server {
        listen 389;
        set $ldap_backend "openldap:389";
        proxy_pass $ldap_backend;
        proxy_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # LDAPS — nginx terminates TLS, forwards plain LDAP to backend
    server {
        listen 636 ssl;
        set $ldaps_backend "openldap:389";
        proxy_pass $ldaps_backend;
        ssl_certificate     /etc/letsencrypt/live/ldap.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ldap.internal/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        proxy_timeout 10s;
        proxy_connect_timeout 5s;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Non-root user (UID 2000) temp paths
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    resolver 127.0.0.11 valid=30s;

    # HTTP — health check, ACME passthrough, redirect everything else to HTTPS
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            return 200 'OK';
        }

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — AdGuard Home UI + DNS-over-HTTPS
    server {
        listen 443 ssl;
        server_name adguard.internal;

        ssl_certificate     /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        set $adguard_backend "http://adguardhome:80";

        location / {
            proxy_pass $adguard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }

        location /dns-query {
            proxy_pass $adguard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Step-CA — pass HTTPS through to Step-CA's native TLS on port 9000
    server {
        listen 443 ssl;
        server_name ca.internal;

        ssl_certificate     /etc/letsencrypt/live/ca.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ca.internal/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        set $stepca_backend "https://step-ca:9000";

        location / {
            proxy_pass $stepca_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }
    }
}
