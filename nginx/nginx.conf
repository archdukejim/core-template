# Global settings
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

# DNS Proxy (TCP and UDP)
stream {
    upstream adguard_dns_tcp { server adguardhome:53; }
    upstream adguard_dns_udp { server adguardhome:53; }
    upstream adguard_dot     { server adguardhome:853; }

    # Standard DNS
    server { listen 53;           proxy_pass adguard_dns_tcp; }
    server { listen 53 udp;       proxy_pass adguard_dns_udp; }

    # DNS over TLS
    server {
        listen 853 ssl;
        proxy_pass adguard_dot;
        ssl_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        proxy_timeout 10s;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    upstream adguard_web { server adguardhome:443; }

# Block 1: The Redirector (HTTP -> HTTPS)
    server {
        listen 80;
        # List all subdomains or use a wildcard so Certbot can verify any of them
        server_name *.internal internal;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

# Block 2: The Proxy (HTTPS)
    server {
        listen 443 ssl;
        server_name adguard.internal;

        ssl_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;

        location / {
            proxy_pass https://adguard_web;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Crucial for AdGuard's dashboard)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # SSL backend verification
            proxy_ssl_server_name on;
            proxy_ssl_verify off; 
            proxy_ssl_trusted_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        }
        location /dns-query {
            proxy_pass https://adguard_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # DoH requires specific content types
            proxy_set_header Accept application/dns-message;
            proxy_set_header Content-Type application/dns-message;
        }
    }
}
