# Global settings
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    multi_accept on;
    worker_connections  16384;
}

# DNS Proxy (TCP and UDP)
stream {
    # Unified upstream for Port 53 (Target is the same container)
    upstream adguard_dns {
        server adguardhome:53;
    }
    
    upstream adguard_dot {
        server adguardhome:853;
    }

    # Standard DNS - UDP
    # CRITICAL FIX: Added proxy_responses and short timeout
    server {
        listen 53 udp reuseport;
        proxy_pass adguard_dns;
        proxy_responses 1;  # Tells NGINX to close session after 1 packet received
        proxy_timeout 1s;   # Fail fast if backend is silent (Default is 10m)
        proxy_buffer_size 16k;    # Ensure enough space for large DNSSEC records
    }

    # Standard DNS - TCP
    server {
        listen 53;
        proxy_pass adguard_dns;
        proxy_timeout 3s;   # Timeout for TCP queries as well
    }

    # DNS over TLS (DoT)
    server {
        listen 853 ssl;
        proxy_pass adguard_dot;
        
        ssl_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        proxy_timeout 10s;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Explicit resolver to prevent upstream resolution errors
    resolver 127.0.0.11 valid=30s; 

    upstream adguard_web { 
        server adguardhome:443; 
    }



# Block 1: The Redirector (HTTP -> HTTPS)



    server {
        listen 80 default_server;
        server_name _;

        # Internal Docker Health Check
        location /health {
            access_log off;
            return 200 'OK';
        }

        # ACME Challenge (Certbot)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Global Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

# Block 2: The Proxy (HTTPS)
    server {
        listen 443 ssl;
        server_name adguard.internal;

        ssl_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;

        location / {
            proxy_pass https://adguard_web;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # SSL backend verification
            proxy_ssl_server_name on;
            proxy_ssl_verify off; 
            proxy_ssl_trusted_certificate /etc/letsencrypt/live/adguard.internal/fullchain.pem;
        }

        location /dns-query {
            proxy_pass https://adguard_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Accept application/dns-message;
            proxy_set_header Content-Type application/dns-message;
        }
    }
}
