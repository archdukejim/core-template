# Global settings
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    multi_accept on;
    worker_connections  16384;
}

# DNS Proxy (TCP and UDP)
stream {
    # 1. Define the Docker internal DNS resolver (Required for variables)
    resolver 127.0.0.11 valid=30s;

    # Standard DNS - UDP
    server {
        listen 53 udp reuseport;
        set $adguard_dns "adguardhome:53"; 
        proxy_pass $adguard_dns;
        
        proxy_responses 1;
        proxy_timeout 1s;
        proxy_buffer_size 16k;
    }

    # Standard DNS - TCP
    server {
        listen 53;
        set $adguard_dns_tcp "adguardhome:53";
        proxy_pass $adguard_dns_tcp;
        
        proxy_timeout 3s;
    }

    # DNS over TLS (DoT)
    # server {
    #     listen 853 ssl;
    #     set $adguard_dot "adguardhome:853";
    #     proxy_pass $adguard_dot;
        
    #     ssl_certificate     /etc/letsencrypt/live/adguard.internal/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/adguard.internal/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
        
    #     proxy_timeout 10s;
    # }

    # LDAP Upstream (TCP)
    # Using variables to prevent boot-time resolution errors
    server {
        listen 389;
        resolver 127.0.0.11 valid=30s;
        set $ldap_backend "openldap:389";
        proxy_pass $ldap_backend;
        
        proxy_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # # LDAPS (Encrypted - TCP)
    # server {
    #     listen 636 ssl;
    #     resolver 127.0.0.11 valid=30s;
    #     set $ldaps_backend "openldap:389"; # Note: Proxying to internal plain port is common
    #     proxy_pass $ldaps_backend;

    #     ssl_certificate     /etc/letsencrypt/live/ldap.internal/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/ldap.internal/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
        
    #     proxy_timeout 10s;
    #     proxy_connect_timeout 5s;
    # }

}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Fix for Non-Root User (UID 2000) permissions
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Internal Docker DNS (required for variables to work)
    resolver 127.0.0.11 valid=30s; 

    # --- TEMPORARY BOOTSTRAP PROXY (Port 80) ---
    server {
        listen 80 default_server;
        server_name adguard.internal _;

        # Keep health check active
        location /health {
            access_log off;
            return 200 'OK';
        }

        # Keep ACME challenge active for when you run Certbot
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Direct Proxy to AdGuard Home
        location / {
            # Using the variable trick to ensure Nginx boots even if AdGuard is slow
            set $adguard_web "http://adguardhome:80";
            proxy_pass $adguard_web;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ensure large DNS/UI requests aren't buffered too small
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }
    }

